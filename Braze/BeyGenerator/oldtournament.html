<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament Bracket</title>
<style>
    :root {
        --primary: #ff9800;
        --primary-glow: rgba(255, 152, 0, 0.5);
        --bg-dark: #0a0a0a;
        --card-bg: #1a1a1a;
        --win-green: #2ecc71;
        --lose-red: #e74c3c;
    }

    body {
        margin: 0;
        background: radial-gradient(circle at top, #1a1a2e, #000);
        font-family: 'Segoe UI', Roboto, sans-serif;
        color: #fff;
        overflow-x: hidden;
        min-height: 100vh;
    }

    #audioUnlock {
        position: fixed; inset: 0; background: rgba(0,0,0,0.95);
        z-index: 9999; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
    }

    h1 {
        text-align: center; text-transform: uppercase; letter-spacing: 4px;
        color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); margin: 20px 0;
        cursor: default; 
        user-select: none;
    }

    #copyToast {
        visibility: hidden;
        min-width: 250px;
        background-color: #333;
        color: #fff;
        text-align: center;
        border-radius: 4px;
        padding: 16px;
        position: fixed;
        z-index: 1000;
        left: 50%;
        bottom: 30px;
        transform: translateX(-50%);
        font-size: 14px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        border: 1px solid var(--primary);
    }

    #copyToast.show {
        visibility: visible;
        animation: fadein 0.5s, fadeout 0.5s 2.5s;
    }

    @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

    .action-btn {
        display: block; margin: 10px auto; padding: 12px 30px;
        font-size: 14px; border-radius: 50px; border: 2px solid var(--primary);
        background: transparent; color: var(--primary); cursor: pointer;
        transition: all 0.3s ease; font-weight: bold; text-transform: uppercase;
        width: 80%;
    }
    .action-btn:hover:not(:disabled) { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary-glow); }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; color: #555; }
    
    .swap-btn { border-color: #888; color: #888; font-size: 12px; padding: 8px 20px; }
    .swap-btn:hover { border-color: #fff; color: #fff; }

    .participant-grid {
        display: grid; grid-template-columns: repeat(10, 110px); gap: 10px;
        justify-content: center; padding: 20px; margin: 0 auto; max-width: 1600px;
    }

    .participant { width: 110px; height: 160px; perspective: 1000px; }
    .card {
        width: 100%; height: 100%; border-radius: 12px; position: relative;
        transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        border: 1px solid rgba(255,255,255,0.1); background: var(--card-bg);
    }
    
    @keyframes selectedGlow {
        0%, 100% { box-shadow: 0 0 15px var(--primary-glow); border-color: var(--primary); }
        50% { box-shadow: 0 0 30px var(--primary); border-color: #ffb74d; }
    }

    #selectionSection {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 100vh;
}

::-webkit-scrollbar {
    display: none;
}

    
    .participant.selected .card { transform: rotateY(180deg); animation: selectedGlow 2s ease-in-out infinite; }
    .participant.active .card { border-color: #fff; box-shadow: 0 0 25px #fff; transform: scale(1.1); z-index: 10; }
    
    .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px; overflow: hidden; }
    .card-back { transform: rotateY(180deg); background: var(--card-bg); }
    .card-face img { width: 100%; height: 100%; object-fit: cover; }
    .participant-name {
        position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9));
        padding: 6px 0 2px; font-size: 10px; font-weight: bold; text-align: center;
    }

    #tournamentSection { display: none; opacity: 0; transition: opacity 1s; width: 100%; }
    
    .bracket-container {
        display: flex; justify-content: center; align-items: center; 
        width: 100%; min-height: 90vh; position: relative; z-index: 2;
        transition: transform 0.5s;
    }

    .bracket-container { --match-width: 220px; --match-gap: 80px; --round-height: 600px; }
    .bracket-container.compact { --match-width: 180px; --match-gap: 30px; --round-height: 750px; transform: scale(0.9); }

    .side-bracket { display: flex; gap: var(--match-gap); }
    #rightBracket { flex-direction: row-reverse; }

    .center-bracket {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        margin: 0 var(--match-gap); gap: 20px;
    }

    .round { display: flex; flex-direction: column; justify-content: space-around; height: var(--round-height); }

    .match {
        background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px); border-radius: 10px; padding: 10px;
        width: var(--match-width); cursor: pointer; transition: transform 0.2s, border-color 0.2s; 
        position: relative; z-index: 5;
    }
    .match:hover { border-color: var(--primary); transform: scale(1.05); }

    .player {
        display: flex; align-items: center; gap: 15px; 
        padding: 6px; border-radius: 6px; margin: 6px 0; background: rgba(0,0,0,0.4); 
    }
    
    .player img { width: 45px; height: 75px; border-radius: 4px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
    .player span { font-size: 14px; font-weight: bold; }
    .player.win { background: var(--win-green); color: #fff; }
    .player.lose { opacity: 0.4; filter: grayscale(1); background: var(--lose-red); }

    #championBox {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 15px; border-radius: 16px; border: 3px solid var(--primary);
        background: radial-gradient(circle, rgba(255,152,0,0.15) 0%, #000 90%);
        width: 180px; opacity: 0.5; transition: opacity 0.5s, transform 0.5s;
    }
    #championBox.active { opacity: 1; transform: scale(1.05); animation: selectedGlow 3s infinite; }
    #championBox h3 { margin: 0 0 5px; color: var(--primary); font-size: 12px; letter-spacing: 3px; }
    #championBox img { width: 140px; height: 250px; border-radius: 8px; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); }
    #championBox h2 { margin: 15px 0 0; font-size: 22px; text-shadow: 0 2px 4px #000; }

    svg#lines { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 1; }

    #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; }
    #modalBox {
        background: #1e1e1e; width: 350px; margin: 5vh auto; padding: 25px; border-radius: 16px;
        border: 1px solid var(--primary); text-align: center; max-height: 85vh; overflow-y: auto;
    }
    
    .bench-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        margin-top: 15px; padding: 5px;
    }
    .bench-item {
        background: #2a2a2a; border-radius: 8px; padding: 5px; cursor: pointer;
        border: 1px solid transparent; transition: 0.2s;
    }
    .bench-item:hover { border-color: var(--primary); background: #333; }
    .bench-item img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
    .bench-item span { font-size: 10px; display: block; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div id="audioUnlock">
    <h2 style="color:white; margin-bottom:10px;">Tournament System</h2>
    <p style="color:#aaa; margin-bottom:30px;">Click below to enable audio and load assets.</p>
    <button class="action-btn" onclick="unlockAudio()">Initialize System</button>
</div>

<div id="copyToast">Participants Data Copied!</div>

<div id="selectionSection">
    <h1 id="selectHeader">Summon Bladers</h1>
    <div class="participant-grid" id="participantGrid"></div>
    <div style="display:flex; justify-content:center; gap:20px;">
        <button class="action-btn" id="selectBtn" style="width: auto;">Summon</button>
        <button class="action-btn enter-btn" id="enterBtn" style="display:none; width: auto; border-color: #ff4444; color: #ff4444;">Battle</button>
    </div>
</div>

<div id="tournamentSection">
    <h1>Golden Crown Cup <br> -01- </h1>
    <div style="position: relative; width: 100%;">
        <svg id="lines"></svg>
        <div id="bracketRoot" class="bracket-container">
            <div id="leftBracket" class="side-bracket"></div>
            <div id="centerBracket" class="center-bracket">
                <div id="championBox">
                    <h3>CHAMPION</h3>
                    <img src="shadow.png">
                    <h2 id="champName">?</h2>
                </div>
                <div id="finalMatch" class="match" onclick="openWinnerModal(this)" style="width: 220px; border-color: #fff; margin-top:30px;">
                    <div class="player"><img><span>Finalist 1</span></div>
                    <div class="player"><img><span>Finalist 2</span></div>
                </div>
            </div>
            <div id="rightBracket" class="side-bracket"></div>
        </div>
    </div>
</div>

<div id="modal">
    <div id="modalBox">
        <div id="modalStep1">
            <h2 style="color: var(--primary); margin-top:0;">Match Action</h2>
            <p style="color: #888; margin-bottom: 20px;">Choose a winner or replace a player.</p>
            <div id="matchControls"></div>
        </div>
        <div id="modalStep2" style="display: none;">
            <h2 style="color: var(--primary); margin-top:0;">Select Replacement</h2>
            <p style="color: #888;">Available Benched Bladers:</p>
            <div id="benchGrid" class="bench-grid"></div>
        </div>
        <button onclick="closeModal()" style="background:transparent; color:#888; border:none; margin-top:20px; cursor:pointer; font-weight: bold;">CLOSE</button>
    </div>
</div>

<script>
const PLAYER_COUNT = 8; 

const participants = [
 {name:"Aiko",src:"avatars/Aiko.png",sound:["selectVoices/Aiko_1.MP3","selectVoices/Aiko_2.MP3"]},
 {name:"Darian",src:"avatars/Darian.png",sound:["selectVoices/Darian_1.MP3","selectVoices/Darian_2.MP3","selectVoices/Darian_3.MP3"]},
 {name:"Darius",src:"avatars/Darius.png",sound:["selectVoices/Darius_1.MP3","selectVoices/Darius_2.MP3"]},
 {name:"Haruka",src:"avatars/Haruka.png",sound:["selectVoices/Haruka_1.MP3","selectVoices/Haruka_2.MP3","selectVoices/Haruka_3.MP3"]},
 {name:"Jaren",src:"avatars/Jaren.png",sound:["selectVoices/Jaren_1.MP3","selectVoices/Jaren_2.MP3","selectVoices/Jaren_3.MP3"]},
 {name:"Kael",src:"avatars/Kael.png",sound:["selectVoices/Kael_1.MP3","selectVoices/Kael_2.MP3","selectVoices/Kael_3.MP3"]},
 {name:"Kaito",src:"avatars/Kaito.png",sound:["selectVoices/Kaito_1.MP3","selectVoices/Kaito_2.MP3","selectVoices/Kaito_3.MP3"]},
 {name:"Lucian",src:"avatars/Lucian.png",sound:["selectVoices/Lucian_1.MP3","selectVoices/Lucian_2.MP3"]},
 {name:"Mei",src:"avatars/Mei.png",sound:["selectVoices/Mei_1.MP3","selectVoices/Mei_2.MP3","selectVoices/Mei_3.MP3"]},
 {name:"Natsumi",src:"avatars/Natsumi.png",sound:["selectVoices/Natsumi_1.MP3","selectVoices/Natsumi_2.MP3"]},
 {name:"Renji",src:"avatars/Renji.png",sound:["selectVoices/Renji_1.MP3","selectVoices/Renji_2.MP3"]},
 {name:"Ronan",src:"avatars/Ronan.png",sound:["selectVoices/Ronan_2.MP3","selectVoices/Ronan_3.MP3"]},
 {name:"Rose",src:"avatars/Rose.png",sound:["selectVoices/Rose_1.MP3","selectVoices/Rose_2.MP3"]},
 {name:"Ruddy",src:"avatars/Ruddy.png",sound:["selectVoices/Ruddy_1.MP3","selectVoices/Ruddy_2.MP3","selectVoices/Ruddy_3.MP3"]},
 {name:"Ryomaru",src:"avatars/Ryomaru.png",sound:["selectVoices/Ryomaru_1.MP3","selectVoices/Ryomaru_2.MP3","selectVoices/Ryomaru_3.MP3","selectVoices/Ryomaru_4.MP3"]},
 {name:"Sasha",src:"avatars/Sasha.png",sound:["selectVoices/Sasha_1.MP3","selectVoices/Sasha_2.MP3","selectVoices/Sasha_3.MP3"]},
 {name:"Stephanie",src:"avatars/Stephanie.png",sound:["selectVoices/Stephanie_1.MP3","selectVoices/Stephanie_2.MP3","selectVoices/Stephanie_3.MP3"]},
 {name:"Victor",src:"avatars/Victor.png",sound:["selectVoices/Victor_1.MP3","selectVoices/Victor_2.MP3","selectVoices/Victor_3.MP3"]},
 {name:"Wolf",src:"avatars/Wolf.png",sound:["selectVoices/Wolf_1.MP3","selectVoices/Wolf_2.MP3"]},
 {name:"Zera",src:"avatars/Zera.png",sound:["selectVoices/Zera_1.MP3","selectVoices/Zera_2.MP3","selectVoices/Zera_3.MP3"]}
];

const voicePool = {};
const selectionSFX = new Audio("effects/selection.MP3");
let selected = [];
let rolling = false;
let currentMatchEl = null;
let swapTargetIdx = null;

const headerTitle = document.getElementById("selectHeader");
headerTitle.textContent = `Summon ${PLAYER_COUNT} Bladers`;

headerTitle.onclick = () => {
    if (selected.length !== PLAYER_COUNT) return;
    const dataToCopy = selected.map(p => ({ name: p.name, src: p.src }));
    navigator.clipboard.writeText(JSON.stringify(dataToCopy)).then(() => { showToast(); });
};

function showToast() {
    const x = document.getElementById("copyToast");
    x.className = "show";
    setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function unlockAudio() {
    selectionSFX.play().then(() => { selectionSFX.pause(); selectionSFX.currentTime = 0; }).catch(()=>{});
    participants.forEach(p => {
        voicePool[p.name] = p.sound.map(path => {
            const a = new Audio(path); a.preload = "auto"; a.load(); return a;
        });
    });
    shuffleArray(participants);
    renderGrid();
    document.getElementById("audioUnlock").style.display = "none";
}

function renderGrid() {
    const grid = document.getElementById("participantGrid");
    grid.innerHTML = "";
    participants.forEach(p => {
        const div = document.createElement("div");
        div.className = "participant";
        div.dataset.name = p.name;
        div.innerHTML = `<div class="card"><div class="card-face card-front"><img src="shadow.png"></div><div class="card-face card-back"><img src="${p.src}"><div class="participant-name">${p.name}</div></div></div>`;
        grid.appendChild(div);
    });
}

document.getElementById("selectBtn").onclick = () => {
    if (rolling || selected.length >= PLAYER_COUNT) return;
    rolling = true;
    document.getElementById("selectBtn").disabled = true;

    const cards = Array.from(document.querySelectorAll(".participant:not(.selected)"));
    let activeCard;
    
    const spin = setInterval(() => {
        cards.forEach(c => c.classList.remove("active"));
        activeCard = cards[Math.floor(Math.random() * cards.length)];
        activeCard.classList.add("active");
        const tick = selectionSFX.cloneNode();
        tick.volume = 0.3;
        tick.play().catch(()=>{});
    }, 150);

    setTimeout(() => {
        clearInterval(spin);
        activeCard.classList.remove("active");
        activeCard.classList.add("selected");
        const chosenData = participants.find(p => p.name === activeCard.dataset.name);
        selected.push(chosenData);
        
        selectionSFX.volume = 1;
        selectionSFX.play();
        setTimeout(() => {
            const pool = voicePool[chosenData.name];
            if(pool && pool.length) pool[Math.floor(Math.random()*pool.length)].play();
            rolling = false;
            if (selected.length < PLAYER_COUNT) document.getElementById("selectBtn").disabled = false;
            else {
                document.getElementById("selectBtn").style.display = "none";
                document.getElementById("enterBtn").style.display = "block";
            }
        }, 800);
    }, 2000);
};

document.getElementById("enterBtn").onclick = () => {
    document.getElementById("selectionSection").style.display = "none";
    const ts = document.getElementById("tournamentSection");
    ts.style.display = "block";
    setTimeout(() => ts.style.opacity = 1, 100);
    
    if(PLAYER_COUNT === 16) {
        document.getElementById("bracketRoot").classList.add("compact");
        buildSplitBracket(3);
    } else {
        document.getElementById("bracketRoot").classList.remove("compact");
        buildSplitBracket(2);
    }
};

function buildSplitBracket(rounds) {
    createSideRounds("leftBracket", rounds);
    createSideRounds("rightBracket", rounds);
    const shuffled = [...selected].sort(() => 0.5 - Math.random());
    const half = PLAYER_COUNT / 2;
    fillSideRoundOne("leftBracket", shuffled.slice(0, half));
    fillSideRoundOne("rightBracket", shuffled.slice(half, PLAYER_COUNT));
    setTimeout(drawLines, 500);
}

function createSideRounds(containerId, rounds) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    for(let r=0; r<rounds; r++) {
        const roundDiv = document.createElement("div");
        roundDiv.className = "round";
        roundDiv.dataset.roundId = r; 
        const matchCount = Math.pow(2, rounds - 1 - r);
        for(let m=0; m<matchCount; m++) {
            const div = document.createElement("div");
            div.className = "match";
            div.innerHTML = `<div class="player"><img><span>-</span></div><div class="player"><img><span>-</span></div>`;
            div.onclick = () => openWinnerModal(div);
            roundDiv.appendChild(div);
        }
        container.appendChild(roundDiv);
    }
}

function fillSideRoundOne(containerId, players) {
    const r1 = document.querySelector(`#${containerId} .round[data-round-id="0"]`);
    const matches = r1.querySelectorAll(".match");
    matches.forEach((m, i) => {
        updatePlayer(m.querySelectorAll(".player")[0], players[i*2]);
        updatePlayer(m.querySelectorAll(".player")[1], players[i*2+1]);
    });
}

function updatePlayer(slot, data) {
    if(!data) return;
    slot.querySelector("img").src = data.src;
    slot.querySelector("span").textContent = data.name;
    slot.dataset.name = data.name;
}

function openWinnerModal(match) {
    const players = match.querySelectorAll(".player");
    if(!players[0].dataset.name || players[0].dataset.name === "-") return;
    currentMatchEl = match;

    document.getElementById("modalStep1").style.display = "block";
    document.getElementById("modalStep2").style.display = "none";
    
    const controls = document.getElementById("matchControls");
    controls.innerHTML = "";

    players.forEach((p, idx) => {
        const group = document.createElement("div");
        group.style.marginBottom = "15px";

        const winBtn = document.createElement("button");
        winBtn.className = "action-btn";
        winBtn.textContent = `Win: ${p.dataset.name}`;
        winBtn.onclick = () => selectWinner(idx);

        const swapBtn = document.createElement("button");
        swapBtn.className = "action-btn swap-btn";
        swapBtn.textContent = `Replace ${p.dataset.name}`;
        swapBtn.onclick = () => openBench(idx);

        group.appendChild(winBtn);
        group.appendChild(swapBtn);
        controls.appendChild(group);
    });

    document.getElementById("modal").style.display = "block";
}

function openBench(idx) {
    swapTargetIdx = idx;
    document.getElementById("modalStep1").style.display = "none";
    document.getElementById("modalStep2").style.display = "block";

    const grid = document.getElementById("benchGrid");
    grid.innerHTML = "";

    const benched = participants.filter(p => !selected.some(s => s.name === p.name));

    benched.forEach(p => {
        const item = document.createElement("div");
        item.className = "bench-item";
        item.innerHTML = `<img src="${p.src}"><span>${p.name}</span>`;
        item.onclick = () => performSwap(p);
        grid.appendChild(item);
    });
}

function performSwap(newPlayerData) {
    const players = currentMatchEl.querySelectorAll(".player");
    const oldName = players[swapTargetIdx].dataset.name;

    selected = selected.map(p => p.name === oldName ? newPlayerData : p);
    updatePlayer(players[swapTargetIdx], newPlayerData);
    
    drawLines();
    closeModal();
}

function closeModal() { document.getElementById("modal").style.display = "none"; }

function selectWinner(idx) {
    const players = currentMatchEl.querySelectorAll(".player");
    players.forEach((p, i) => {
        p.classList.remove("win", "lose");
        p.classList.add(i === idx ? "win" : "lose");
    });
    const winnerData = { name: players[idx].dataset.name, src: players[idx].querySelector("img").src };
    advance(winnerData);
    closeModal();
}

function advance(data) {
    const currentRound = currentMatchEl.parentElement;
    if(currentMatchEl.id === "finalMatch") {
        const champBox = document.getElementById("championBox");
        champBox.classList.add("active");
        champBox.querySelector("img").src = data.src;
        champBox.querySelector("#champName").textContent = data.name;
        return;
    }
    const roundIndex = parseInt(currentRound.dataset.roundId);
    const totalSideRounds = Math.log2(PLAYER_COUNT / 2);
    if (roundIndex < totalSideRounds - 1) {
        const nextRound = currentRound.nextElementSibling;
        const matches = Array.from(currentRound.querySelectorAll(".match"));
        const currentMatchIdx = matches.indexOf(currentMatchEl);
        const nextMatch = nextRound.querySelectorAll(".match")[Math.floor(currentMatchIdx / 2)];
        const slot = currentMatchIdx % 2;
        updatePlayer(nextMatch.querySelectorAll(".player")[slot], data);
    } else {
        const bracketSide = currentRound.parentElement.id;
        const finalMatch = document.getElementById("finalMatch");
        const slotIdx = (bracketSide === "leftBracket") ? 0 : 1;
        updatePlayer(finalMatch.querySelectorAll(".player")[slotIdx], data);
    }
}

function drawLines() {
    const svg = document.getElementById("lines");
    const container = document.querySelector("#tournamentSection > div"); 
    svg.setAttribute("width", container.offsetWidth);
    svg.setAttribute("height", container.offsetHeight);
    svg.innerHTML = "";
    const containerRect = container.getBoundingClientRect();

    function getRelativePos(el, side) {
        const r = el.getBoundingClientRect();
        return { x: (side === 'right' ? r.right : r.left) - containerRect.left, y: r.top - containerRect.top + r.height/2 };
    }

    function drawPath(start, end) {
        const midX = start.x + (end.x - start.x) / 2;
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const d = `M ${start.x} ${start.y} L ${midX} ${start.y} L ${midX} ${end.y} L ${end.x} ${end.y}`;
        p.setAttribute("d", d);
        p.setAttribute("stroke", "rgba(255, 152, 0, 0.3)");
        p.setAttribute("fill", "none");
        p.setAttribute("stroke-width", "2");
        svg.appendChild(p);
    }

    ["leftBracket", "rightBracket"].forEach(id => {
        const rounds = document.querySelectorAll(`#${id} .round`);
        for(let i=0; i < rounds.length - 1; i++) {
            const curr = rounds[i].querySelectorAll(".match");
            const next = rounds[i+1].querySelectorAll(".match");
            curr.forEach((m, idx) => {
                const target = next[Math.floor(idx/2)];
                if (id === "leftBracket") drawPath(getRelativePos(m, 'right'), getRelativePos(target, 'left'));
                else drawPath(getRelativePos(m, 'left'), getRelativePos(target, 'right'));
            });
        }
    });

    const finalMatch = document.getElementById("finalMatch");
    const leftLast = document.querySelector("#leftBracket .round:last-child .match");
    const rightLast = document.querySelector("#rightBracket .round:last-child .match");
    if(leftLast && finalMatch) drawPath(getRelativePos(leftLast, 'right'), getRelativePos(finalMatch, 'left'));
    if(rightLast && finalMatch) drawPath(getRelativePos(rightLast, 'left'), getRelativePos(finalMatch, 'right'));
}

window.addEventListener("resize", () => setTimeout(drawLines, 100));
</script>
</body>
</html>
