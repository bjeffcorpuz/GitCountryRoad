<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tournament App</title>

<style>
html, body {
    margin: 0;
    min-height: 100%;
    background: radial-gradient(circle at top, #141414, #000);
    font-family: Arial, sans-serif;
    color: #fff;
}

/* HEADERS */
h1 {
    text-align: center;
    color: orange;
    margin: 25px 0 30px;
    font-size: 22px;
}

/* BUTTONS */
.action-btn {
    display: block;
    margin: 20px auto;
    padding: 10px 26px;
    font-size: 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: orange;
    color: #000;
}

.enter-btn {
    background: darkred;
    color: #fff;
}

.action-btn:disabled {
    opacity: .4;
    cursor: not-allowed;
}

/* SECTIONS */
#selectionSection {
    transition: opacity 1s ease;
}

#tournamentSection {
    display: none;
    opacity: 0;
    transition: opacity 1s ease;
}

/* GRID */
.participant-grid {
    display: grid;
    grid-template-columns: repeat(5, 120px);
    gap: 26px;
    justify-content: center;
    margin-bottom: 40px;
}

.participant-grid.final {
    grid-template-columns: repeat(4, 120px);
}

/* PARTICIPANT CARD */
.participant {
    width: 120px;
    height: 180px;
    perspective: 1000px;
}

.card {
    width: 100%;
    height: 100%;
    border-radius: 10px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .8s cubic-bezier(.4,.2,.2,1);
}

.participant.selected .card {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 10px;
    overflow: hidden;
}

.card-front img,
.card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-back {
    transform: rotateY(180deg);
}

/* NAME */
.participant-name {
    position: absolute;
    bottom: 6px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    font-weight: bold;
    color: #fff;
    text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000,
         0 0 6px #000;
}

/* HIGHLIGHTS */
.participant.active .card-front {
    box-shadow: 0 0 26px 6px orange;
}

.participant.selected .card {
    box-shadow: 0 0 30px 6px #ffb347;
}

/* TOURNAMENT */
.wrapper {
    position: relative;
    padding: 0 60px 60px;
}

svg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}

.bracket {
    position: relative;
    display: flex;
    gap: 140px;
    z-index: 2;
}

.round {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.match {
    background: #fff;
    border-radius: 8px;
    padding: 6px;
    width: 220px;
    margin: 30px 0;
    cursor: pointer;
}

.player {
    display: flex;
    align-items: center;
    background: #3a3a3a;
    padding: 8px 12px;
    border-radius: 5px;
    margin: 6px 0;
    font-size: 14px;
    color: #fff;
}

/* PLAYER IMAGE + NAME */
.player-left {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 20px;
    width: 100%;
}

.player-left img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    flex-shrink: 0;
}

.player-name {
    font-weight: bold;
    text-align: left;
}

/* WIN / LOSE COLORS */
.player.win {
    background: #1f8b24;
}

.player.lose {
    background: #5a0f0f;
}

/* MODAL */
#modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 10;
}

#modalBox {
    background: #fff;
    color: #000;
    width: 300px;
    margin: 15% auto;
    padding: 20px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div id="selectionSection">
<h1>Select Participants</h1>
<div class="participant-grid" id="participantGrid"></div>
<button class="action-btn" id="selectBtn">Select Participants</button>
<button class="action-btn enter-btn" id="enterBtn" style="display:none;">Enter Tournament</button>
</div>

<div id="tournamentSection">
<h1>Tournament Bracket</h1>

<div class="wrapper">
<svg id="lines"></svg>

<div class="bracket">
    <div class="round" id="r1"></div>

    <div class="round" id="r2">
        <div class="match">
            <div class="player"><div class="player-left"><img src="shadow.png"><div class="player-name">-</div></div></div>
            <div class="player"><div class="player-left"><img src="shadow.png"><div class="player-name">-</div></div></div>
        </div>
        <div class="match">
            <div class="player"><div class="player-left"><img src="shadow.png"><div class="player-name">-</div></div></div>
            <div class="player"><div class="player-left"><img src="shadow.png"><div class="player-name">-</div></div></div>
        </div>
    </div>

    <div class="round" id="r3">
        <div class="match">
            <div class="player"><div class="player-left"><img src="shadow.png"><div class="player-name">-</div></div></div>
            <div class="player"><div class="player-left"><img src="shadow.png"><div class="player-name">-</div></div></div>
        </div>
    </div>
</div>
</div>
</div>

<div id="modal">
<div id="modalBox">
<h3>Select Winner</h3>
<div id="choices"></div>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>

/* PARTICIPANTS (UNCHANGED) */
const participants = [
 {name:"Aiko",src:"avatars/Aiko.png",sound:["selectVoices/Aiko_1.MP3","selectVoices/Aiko_2.MP3"]},
 {name:"Darian",src:"avatars/Darian.png",sound:["selectVoices/Darian_1.MP3","selectVoices/Darian_2.MP3","selectVoices/Darian_3.MP3"]},
 {name:"Darius",src:"avatars/Darius.png",sound:["selectVoices/Darius_1.MP3","selectVoices/Darius_2.MP3"]},
 {name:"Haruka",src:"avatars/Haruka.png",sound:["selectVoices/Haruka_1.MP3","selectVoices/Haruka_2.MP3","selectVoices/Haruka_3.MP3"]},
 {name:"Jaren",src:"avatars/Jaren.png",sound:["selectVoices/Jaren_1.MP3","selectVoices/Jaren_2.MP3","selectVoices/Jaren_3.MP3"]},
 {name:"Kael",src:"avatars/Kael.png",sound:["selectVoices/Kael_1.MP3","selectVoices/Kael_2.MP3","selectVoices/Kael_3.MP3"]},
 {name:"Kaito",src:"avatars/Kaito.png",sound:["selectVoices/Kaito_1.MP3","selectVoices/Kaito_2.MP3","selectVoices/Kaito_3.MP3"]},
 {name:"Lucian",src:"avatars/Lucian.png",sound:["selectVoices/Lucian_1.MP3","selectVoices/Lucian_2.MP3"]},
 {name:"Mei",src:"avatars/Mei.png",sound:["selectVoices/Mei_1.MP3","selectVoices/Mei_2.MP3","selectVoices/Mei_3.MP3"]},
 {name:"Natsumi",src:"avatars/Natsumi.png",sound:["selectVoices/Natsumi_1.MP3","selectVoices/Natsumi_2.MP3"]},
 {name:"Renji",src:"avatars/Renji.png",sound:["selectVoices/Renji_1.MP3","selectVoices/Renji_2.MP3"]},
 {name:"Ronan",src:"avatars/Ronan.png",sound:["selectVoices/Ronan_2.MP3","selectVoices/Ronan_3.MP3"]},
 {name:"Rose",src:"avatars/Rose.png",sound:["selectVoices/Rose_1.MP3","selectVoices/Rose_2.MP3"]},
 {name:"Ruddy",src:"avatars/Ruddy.png",sound:["selectVoices/Ruddy_1.MP3","selectVoices/Ruddy_2.MP3","selectVoices/Ruddy_3.MP3"]},
 {name:"Ryomaru",src:"avatars/Ryomaru.png",sound:["selectVoices/Ryomaru_1.MP3","selectVoices/Ryomaru_2.MP3","selectVoices/Ryomaru_3.MP3","selectVoices/Ryomaru_4.MP3"]},
 {name:"Sasha",src:"avatars/Sasha.png",sound:["selectVoices/Sasha_1.MP3","selectVoices/Sasha_2.MP3","selectVoices/Sasha_3.MP3"]},
 {name:"Stephanie",src:"avatars/Stephanie.png",sound:["selectVoices/Stephanie_1.MP3","selectVoices/Stephanie_2.MP3","selectVoices/Stephanie_3.MP3"]},
 {name:"Victor",src:"avatars/Victor.png",sound:["selectVoices/Victor_1.MP3","selectVoices/Victor_2.MP3","selectVoices/Victor_3.MP3"]},
 {name:"Wolf",src:"avatars/Wolf.png",sound:["selectVoices/Wolf_1.MP3","selectVoices/Wolf_2.MP3"]},
 {name:"Zera",src:"avatars/Zera.png",sound:["selectVoices/Zera_1.MP3","selectVoices/Zera_2.MP3","selectVoices/Zera_3.MP3"]}
];

const grid = document.getElementById("participantGrid");
const selectBtn = document.getElementById("selectBtn");
const enterBtn = document.getElementById("enterBtn");

let selected = [];
let rolling = false;
let currentMatch = null;

/* RENDER */
function render() {
    grid.innerHTML = "";
    participants.forEach(p => {
        const d = document.createElement("div");
        d.className = "participant";
        d.dataset.name = p.name;

        if (selected.includes(p)) d.classList.add("selected");

        d.innerHTML = `
        <div class="card">
            <div class="card-face card-front">
                <img src="shadow.png">
            </div>
            <div class="card-face card-back">
                <img src="${p.src}">
                ${selected.includes(p) ? `<div class="participant-name">${p.name}</div>` : ""}
            </div>
        </div>`;
        grid.appendChild(d);
    });
}
render();

/* SELECTION (UNCHANGED) */
selectBtn.onclick = () => {
    if (rolling || selected.length >= 8) return;
    rolling = true;
    selectBtn.disabled = true;

    const cards = [...document.querySelectorAll(".participant")].filter(c => !c.classList.contains("selected"));
    let active;

    const spin = setInterval(() => {
        cards.forEach(c => c.classList.remove("active"));
        active = cards[Math.floor(Math.random() * cards.length)];
        active.classList.add("active");
    }, 160);

    setTimeout(() => {
        clearInterval(spin);
        active.classList.remove("active");
        active.classList.add("selected");

        const chosen = participants.find(p => p.name === active.dataset.name);
        selected.push(chosen);

        const sounds = chosen.sound;
        const audio = new Audio(sounds[Math.floor(Math.random() * sounds.length)]);
        audio.onended = () => {
            rolling = false;
            selectBtn.disabled = false;
            if (selected.length === 8) finalize();
        };
        audio.play();

        render();
    }, 2000);
};

/* FINALIZE */
function finalize() {
    [...grid.children].forEach(el => {
        if (!el.classList.contains("selected")) el.remove();
    });

    grid.classList.add("final");
    selectBtn.style.display = "none";
    enterBtn.style.display = "block";
}

/* ENTER TOURNAMENT */
enterBtn.onclick = () => {
    const selection = document.getElementById("selectionSection");
    selection.style.opacity = 0;

    setTimeout(() => {
        selection.style.display = "none";

        const tournament = document.getElementById("tournamentSection");
        tournament.style.display = "block";
        requestAnimationFrame(() => tournament.style.opacity = 1);

        populateRoundOne();
        setTimeout(drawLines, 200);
    }, 1000);
};

/* ROUND 1 */
function populateRoundOne() {
    const r1 = document.getElementById("r1");
    r1.innerHTML = "";

    const shuffled = [...selected].sort(() => Math.random() - 0.5);

    for (let i = 0; i < 8; i += 2) {
        const m = document.createElement("div");
        m.className = "match";
        m.innerHTML = `
        <div class="player">
            <div class="player-left">
                <img src="${shuffled[i].src}">
                <div class="player-name">${shuffled[i].name}</div>
            </div>
        </div>

        <div class="player">
            <div class="player-left">
                <img src="${shuffled[i+1].src}">
                <div class="player-name">${shuffled[i+1].name}</div>
            </div>
        </div>
        `;
        r1.appendChild(m);
    }

    attachMatchEvents();
}

/* MATCH LOGIC */
function attachMatchEvents() {
    document.querySelectorAll(".match").forEach(match => {
        match.onclick = () => {
            const players = [...match.querySelectorAll(".player")];
            if (!players[0].textContent.trim()) return;

            currentMatch = match;
            const c = document.getElementById("choices");
            c.innerHTML = "";

            players.forEach((p,i) => {
                const b = document.createElement("button");
                b.textContent = p.querySelector(".player-name").textContent.trim();
                b.onclick = () => selectWinner(i);
                c.appendChild(b);
            });

            document.getElementById("modal").style.display = "block";
        };
    });
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function selectWinner(i) {
    const players = currentMatch.querySelectorAll(".player");

    players.forEach((p,idx) => {
        p.classList.remove("win","lose");
        p.classList.add(idx === i ? "win" : "lose");
    });

    const winnerName = players[i].querySelector(".player-name").textContent.trim();
    const winnerData = participants.find(p => p.name === winnerName);

    advance(winnerData, currentMatch);
    closeModal();
}

function advance(winnerData, match) {
    const round = match.closest(".round");
    const next = round.nextElementSibling;

    /* IF FINAL ROUND → SHOW CHAMPION ON RIGHT SIDE */
    if (!next) {

        let championBox = document.getElementById("championBox");

        if (!championBox) {
            championBox = document.createElement("div");
            championBox.id = "championBox";

            /* KEY FIX — ABSOLUTE RIGHT POSITION */
            championBox.style.position = "absolute";
            championBox.style.left = "1100px";
            championBox.style.top = "50%";
            championBox.style.transform = "translateY(-75%)";

            championBox.style.display = "flex";
            championBox.style.alignItems = "center";
            championBox.style.gap = "20px";
            championBox.style.fontWeight = "bold";
            championBox.style.fontSize = "20px";

            championBox.innerHTML = `
                <span>Winner</span>
                <img style="width:70px;border-radius:8px;">
                <span id="championName"></span>
            `;

            document.querySelector(".wrapper").appendChild(championBox);
        }

        championBox.querySelector("img").src = winnerData.src;
        championBox.querySelector("#championName").textContent = winnerData.name;

        return;
    }

    /* NORMAL ADVANCE */
    const matches = [...round.querySelectorAll(".match")];
    const idx = matches.indexOf(match);
    const target = next.querySelectorAll(".match")[Math.floor(idx / 2)];
    const slot = idx % 2;

    target.querySelectorAll(".player")[slot].innerHTML = `
    <div class="player-left">
        <img src="${winnerData.src}">
        <div class="player-name">${winnerData.name}</div>
    </div>
    `;
}


/* LINES */
function drawLines() {
    const svg = document.getElementById("lines");
    svg.innerHTML = "";

    const wrapper = document.querySelector(".wrapper");
    const w = wrapper.getBoundingClientRect();

    svg.setAttribute("width", wrapper.offsetWidth);
    svg.setAttribute("height", wrapper.offsetHeight);

    const NS = "http://www.w3.org/2000/svg";

    function line(x1,y1,x2,y2){
        const l=document.createElementNS(NS,"line");
        l.setAttribute("x1",x1);
        l.setAttribute("y1",y1);
        l.setAttribute("x2",x2);
        l.setAttribute("y2",y2);
        l.setAttribute("stroke","#fff");
        l.setAttribute("stroke-width","3");
        svg.appendChild(l);
    }

    function posR(e){
        const r=e.getBoundingClientRect();
        return {x:r.right-w.left,y:r.top-w.top+r.height/2};
    }

    function posL(e){
        const r=e.getBoundingClientRect();
        return {x:r.left-w.left,y:r.top-w.top+r.height/2};
    }

    const r1=[...document.querySelectorAll("#r1 .match")];
    const r2=[...document.querySelectorAll("#r2 .match")];
    const f=document.querySelector("#r3 .match");

    for(let i=0;i<r1.length;i+=2){
        const a=posR(r1[i]);
        const b=posR(r1[i+1]);
        const t=posL(r2[i/2]);
        const x=t.x-40;
        line(a.x,a.y,x,a.y);
        line(b.x,b.y,x,b.y);
        line(x,a.y,x,b.y);
        line(x,t.y,t.x,t.y);
    }

    const a=posR(r2[0]);
    const b=posR(r2[1]);
    const fx=posL(f);
    const x=a.x+40;
    const mid=(a.y+b.y)/2;
    line(a.x,a.y,x,a.y);
    line(b.x,b.y,x,b.y);
    line(x,a.y,x,b.y);
    line(x,mid,fx.x,mid);
}

window.addEventListener("resize", drawLines);

</script>
</body>
</html>
