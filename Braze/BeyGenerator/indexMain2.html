<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyblade Builder</title>
<script src="data.js"></script>
<style>
/* ================= STYLES ================= */
/* Hide scrollbar for Chrome, Safari and Opera */
html::-webkit-scrollbar, body::-webkit-scrollbar {
  display: none;
}

/* Hide scrollbar for IE, Edge and Firefox */
html, body {
  -ms-overflow-style: none;  /* IE and Edge */
  scrollbar-width: none;  /* Firefox */
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: radial-gradient(circle at top, #0c0c10, #1b1b2f);
  margin: 0;
  padding: 20px;
  color: #fff;
  text-align: center;
  min-height: 100vh;
}

/* === LIVELY TITLE STYLES (Shadow Only) === */
h1 {
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #ff9800 !important;
    text-shadow: 0 0 15px #ff9800 !important;
    margin: 20px 0;
  cursor: pointer; /* Indicates it's clickable */
  

}

h1:active {
    opacity: 0.7;
}

@keyframes glowPulse {
  0% {
    text-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
    filter: hue-rotate(0deg);
  }
  100% {
    text-shadow: 0 0 50px rgba(0, 212, 255, 0.6), 0 0 20px rgba(255, 153, 0, 0.4);
    filter: hue-rotate(15deg);
  }
}

/* === CONTROLS === */
#controls {
  margin-bottom: 40px;
  min-height: 60px; 
}

button {
    display: block;
    margin: 10px auto;
    padding: 12px 30px;
    font-size: 14px;
    border-radius: 50px;
    border: 2px solid #ff9800;
    background: transparent;
    color: #ff9800;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: bold;
    text-transform: uppercase;
    width: 20%;
}

button:hover {
    background: #ff9800;
    color: #000;
    box-shadow: 0 0 20px #ff9800;
}

/* === LOADING SPINNER === */
#loading {
    display: none; /* Hidden by default */
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255, 255, 255, 0.1);
    border-top: 5px solid #00d4ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
}

.loading-text {
    font-size: 1.2rem;
    font-weight: bold;
    color: #00d4ff;
    letter-spacing: 2px;
    animation: blink 1.5s infinite;
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }


/* === GENERATION CONTAINER === */
#results-container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 1800px;
  margin: 0 auto;
  text-align: left;
}

/* === ROWS === */
.blader-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  padding: 15px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 4px;
  border-left: 5px solid #444;
  opacity: 0;
  transform: translateY(20px);
  /* UPDATED: Added transitions for the highlight effects */
  transition: opacity 0.5s, transform 0.5s, background 0.5s, box-shadow 0.5s, border-left-color 0.5s;
}

.blader-row.visible {
  opacity: 1;
  transform: translateY(0);
}

/* === CARDS === */
.card-wrapper {
  perspective: 1000px;
  width: 200px;  
  /* Increased Height to 290px to prevent cutting */
  height: 290px; 
}

.card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.card-hidden .card { transform: rotateY(90deg); opacity: 0; }
.card-reveal .card { transform: rotateY(0deg); opacity: 1; }

/* General Face Style */
.face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 8px;
  align-items: center;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  overflow: hidden;
  background: #222;
  border: 1px solid #444;
  padding: 8px; 
  box-sizing: border-box;
}

/* === BLADER CARD STYLES === */
.blader-face {
  background: #151515;
  border: 1px solid #0ff;
  padding: 0;
  justify-content: center; 
}

.blader-face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  margin: 0;
  border-radius: 0;
}

.blader-name-overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.8);
  color: #0ff;
  font-weight: bold;
  font-size: 14px;
  text-align: center;
  padding: 8px 0;
  text-transform: uppercase;
}

/* === SYSTEM / PARTS STYLES === */

/* Top Category Label (e.g., "Main Blade") with Effect */
.card-category-top {
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: 8px; 
  text-align: center;
  width: 100%;
  letter-spacing: 1.5px;
  
  /* Gradient Text Effect */
  background: linear-gradient(90deg, #888, #ddd, #888);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  
  /* Slight Glow */
  text-shadow: 0 0 5px rgba(255,255,255,0.2);
  
  /* Border below to separate header */
  padding-bottom: 4px;
  border-bottom: 1px solid #444;
}

/* Image Container */
.img-container {
    height: 110px; 
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 5px;
    margin-top: 10px;
}

.img-container img {
    max-height: 100%;
    max-width: 95%;
    object-fit: contain;
}

/* System Image Special Case */
.system-face .img-container { height: 100%; margin: 0; }
.system-face img { height: 140px; }


/* Specific Part Name (e.g., "SharkScale") - Below Image */
.part-specific-name {
  font-size: 16px;
  font-weight: bold;
  color: #00d4ff; /* Cyan/Blue style */
  margin-bottom: 10px; 
  text-align: center;
  width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Stats Container - Pushed to bottom */
.mini-stats {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 4px; 
  margin-top: auto; 
}

.stat-row {
  display: flex;
  align-items: center;
  font-size: 12px;
  color: #ccc;
  width: 100%;
}

.stat-label { 
  width: 40px; 
  font-weight: bold; 
  text-align: left;
}

.stat-val-text {
  width: 25px;
  text-align: right;
  margin-right: 8px;
  font-family: monospace;
  color: #fff;
}

.stat-bar-bg { 
  flex-grow: 1; 
  height: 5px; 
  background: #444; 
  border-radius: 3px; 
}

.stat-bar-fill { 
  height: 100%; 
  background: linear-gradient(90deg, #00c6ff, #0072ff); 
  border-radius: 3px; 
}

/* === CHART & NAME === */
.bey-full-name {
  width: 100%;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  padding: 10px 4px; 
  border-top: 1px solid #444;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  background: #151515;
}

/* Dynamic Colors */
.text-ux { color: #ffaa00; }
.text-bx { color: #00c6ff; }
.text-cx { color: #ff0044; }

/* === JSON OUTPUT BOX === */
#data-output-container {
    display: none;
    width: 80%;
    margin: 0 auto 30px auto;
}

#data-textarea {
    width: 100%;
    height: 150px;
    background: #000;
    color: #0f0;
    border: 1px solid #333;
    padding: 10px;
    font-family: monospace;
    border-radius: 5px;
}

/* === ROWS === */
.blader-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  padding: 15px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 4px;
  border-left: 5px solid #444;
  opacity: 0;
  transform: translateY(20px);
  /* UPDATED: Added transitions for the highlight effects */
  transition: opacity 0.5s, transform 0.5s, background 0.5s, box-shadow 0.5s, border-left-color 0.5s;
}

.blader-row.visible {
  opacity: 1;
  transform: translateY(0);
}

/* NEW: Highlight effect for the currently generating row */
.blader-row.focused {
  opacity: 1 !important;
  transform: translateY(0) scale(1.02);
  box-shadow: 0 0 25px rgba(0, 212, 255, 0.25);
  border-left: 5px solid #00d4ff;
  background: rgba(255, 255, 255, 0.1);
  z-index: 10;
  position: relative;
}

/* NEW: Dim effect for rows not currently generating */
.blader-row.dimmed {
  opacity: 0.25 !important;
  transform: translateY(0) scale(0.98);
  filter: grayscale(40%);
}

/* Add this to your <style> block */

.card-hidden .card {
    opacity: 0;
    transform: translateY(-100px) rotateX(20deg);
}

.card-reveal .card {
    animation: heavyImpact 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
}

@keyframes heavyImpact {
    0% {
        opacity: 0;
        transform: translateY(-100px) rotateX(20deg);
    }
    60% {
        opacity: 1;
        transform: translateY(15px) rotateX(-10deg); /* Overshoots the drop */
    }
    80% {
        transform: translateY(-5px) rotateX(5deg); /* Bounces back up slightly */
    }
    100% {
        opacity: 1;
        transform: translateY(0) rotateX(0deg); /* Locks in */
    }
}



</style>
</head>
<body>

  <h1 id="app-title">Blade Assembly</h1>

  <div id="data-output-container">
      <textarea id="data-textarea" readonly></textarea>
  </div>

  <div id="controls">
    <button id="generateBtn">Bestow the Parts</button>
    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Randomizing...</div>
    </div>
  </div>

  <div id="results-container"></div>

<script>
/* ================= DATA ================= */
// Added the "type" property to the bladers array. 
// You can adjust these values as needed.
//["Def", "Atk", "Sta", "AtkDef", "AtkSta", "DefSta", "all"]
const bladers = [
    {"name":"Victor","src":"avatars/Victor.png","type":"all"},
    {"name":"Kael","src":"avatars/Kael.png","type":"AtkDef"},
    {"name":"Ryomaru","src":"avatars/Ryomaru.png","type":"Sta"},
    {"name":"Renji","src":"avatars/Renji.png","type":"AtkDef"},
    {"name":"Darius","src":"avatars/Darius.png","type":"Def"},
    {"name":"Natsumi","src":"avatars/Natsumi.png","type":"all"},
    {"name":"Stephanie","src":"avatars/Stephanie.png","type":"AtkDef"},
    {"name":"Kaito","src":"avatars/Kaito.png","type":"AtkSta"}
]

// THRESHOLDS
const blades_minAtk = 30;
const blades_minDef = 30;
const blades_minSta = 25;

// NEW: Over Blade Thresholds
const over_minAtk = 1;
const over_minDef = 1;
const over_minSta = 1;

const assist_minAtk = 13;
const assist_minDef = 15;
const assist_minSta = 10;

const ratchet_minAtk = 11;
const ratchet_minDef = 10;
const ratchet_minSta = 8;

const bit_minAtk = 30;
const bit_minDef = 25;
const bit_minSta = 20;

// NEW: Metal Blade Thresholds
const metal_minAtk = 1;
const metal_minDef = 1;
const metal_minSta = 1;

// BAN LIST
let removeBlade = ["HellsHammer","KnightMail","PhoenixWing","MummyCurse","ShelterDrake","Break","StormSpriggan","WeissTiger"];

let poolSystem, poolBlades, poolRatchets, poolChips, poolAssist, poolBits, poolMetalBlades;
let generatedBeyblades = []; 

    function resetPools() {
    poolSystem = [...masterSystem];
    
    // Ban list filter
    poolBlades = masterBlades.filter(bladeItem => {
        const checkItem = Array.isArray(bladeItem) ? bladeItem[0] : bladeItem;
        return !removeBlade.includes(checkItem.displayName);
    });

    poolRatchets = [...masterRatchets];
    poolChips = [...masterChips];
    poolAssist = [...masterAssist];
    poolBits = [...masterBits];
    poolMetalBlades = [...masterMetalBlade]; 
    
    generatedBeyblades = []; 
}

/* ================= LOGIC ================= */

function getRandomItem(pool, remove = true) {
    if (!pool || pool.length === 0) return null;
    const index = Math.floor(Math.random() * pool.length);
    let item = pool[index];
    let actualItem = Array.isArray(item) ? item[Math.floor(Math.random() * item.length)] : item;
    if (remove) pool.splice(index, 1);
    return { item: actualItem, raw: item };
}

function filterPoolByType(pool, partCategory, type) {
    if (!pool || pool.length === 0) return pool;
    if (!type || type === "all") return pool;

    let workingPool = pool;
    if (partCategory === "ratchet") {
        workingPool = pool.filter(item => {
            const checkItem = Array.isArray(item) ? item[0] : item;
            return checkItem.bit !== "No";
        });
        if (workingPool.length === 0) workingPool = pool;
    }

    let scoredPool = workingPool.map(item => {
        const checkItem = Array.isArray(item) ? item[0] : item;
        
        // --- NEW: DYNAMIC THRESHOLD ASSIGNMENT ---
        let minAtk = 0, minDef = 0, minSta = 0;
        
        if (partCategory === "blade") {
            if (checkItem.blade === "Over") {
                // If it's an Over Blade, use the Over thresholds
                minAtk = over_minAtk; minDef = over_minDef; minSta = over_minSta;
            } else {
                // Otherwise, use the standard Main Blade thresholds
                minAtk = blades_minAtk; minDef = blades_minDef; minSta = blades_minSta;
            }
        } else if (partCategory === "metalBlade") {
            minAtk = metal_minAtk; minDef = metal_minDef; minSta = metal_minSta;
        } else if (partCategory === "assist") {
            minAtk = assist_minAtk; minDef = assist_minDef; minSta = assist_minSta;
        } else if (partCategory === "ratchet") {
            minAtk = ratchet_minAtk; minDef = ratchet_minDef; minSta = ratchet_minSta;
        } else if (partCategory === "bit") {
            minAtk = bit_minAtk; minDef = bit_minDef; minSta = bit_minSta;
        }

        let atk = checkItem.atk || 0;
        let def = checkItem.def || 0;
        let sta = checkItem.sta || 0;

        let nAtk = minAtk > 0 ? atk / minAtk : 0;
        let nDef = minDef > 0 ? def / minDef : 0;
        let nSta = minSta > 0 ? sta / minSta : 0;

        let passes = false;
        let aiScore = 0;

        if (type === "Atk") passes = atk >= minAtk;
        else if (type === "Def") passes = def >= minDef;
        else if (type === "Sta") passes = sta >= minSta;
        else if (type === "AtkDef") {
            passes = (atk >= minAtk || def >= minDef);
            aiScore = (nAtk + nDef) - Math.abs(nAtk - nDef); 
        } else if (type === "AtkSta") {
            passes = (atk >= minAtk || sta >= minSta);
            aiScore = (nAtk + nSta) - Math.abs(nAtk - nSta);
        } else if (type === "DefSta") {
            passes = (def >= minDef || sta >= minSta);
            aiScore = (nDef + nSta) - Math.abs(nDef - nSta);
        }

        return { original: item, passes: passes, score: aiScore };
    });

    let validItems = scoredPool.filter(x => x.passes);

    if (validItems.length === 0) return workingPool;

    if (type === "AtkDef" || type === "AtkSta" || type === "DefSta") {
        validItems.sort((a, b) => b.score - a.score);
        let topTierCount = Math.max(3, Math.ceil(validItems.length * 0.5));
        validItems = validItems.slice(0, topTierCount);
    }

    return validItems.map(x => x.original);
}


function generateFullBeyblade(bladerType) {

    // 1. Randomize the order of systems to try (e.g., it might try CX, then UX, then BX)
    let availableSystems = [...poolSystem].sort(() => 0.5 - Math.random());

    // 2. Loop through the systems. If one fails, it moves to the next one!
    for (let i = 0; i < availableSystems.length; i++) {
        const system = availableSystems[i];

        // --- CREATE BACKUPS OF THE POOLS ---
        // We take a snapshot of the pools. If this system fails to build a complete
        // Beyblade, we restore the pools so no parts are accidentally deleted.
        let backupChips = [...poolChips];
        let backupBlades = [...poolBlades];
        let backupMetal = [...poolMetalBlades];
        let backupAssist = [...poolAssist];
        let backupRatchets = [...poolRatchets];
        let backupBits = [...poolBits];

        let errorFound = false;
        let chip = null, blade = null, metalBlade = null, assist = null, ratchet = null, bit = null;

        // --- CHIP SELECTION ---
        if(system.name === "CX") {
            const chipRes = getRandomItem(poolChips, true);
            if(!chipRes) errorFound = true;
            else chip = chipRes.item;
        }

        // --- BLADE SELECTION ---
        if (!errorFound) {
            let validBlades = poolBlades.filter(b => {
                const check = Array.isArray(b) ? b[0] : b;
                return check.system === system.name;
            });
            
            validBlades = filterPoolByType(validBlades, "blade", bladerType);
            if(validBlades.length === 0) errorFound = true;
            else {
                const bladeIndex = Math.floor(Math.random() * validBlades.length);
                let rawBlade = validBlades[bladeIndex];
                blade = Array.isArray(rawBlade) ? rawBlade[Math.floor(Math.random() * rawBlade.length)] : rawBlade;
                
                const realIndex = poolBlades.indexOf(rawBlade);
                if(realIndex > -1) poolBlades.splice(realIndex, 1);
            }
        }

        // --- METAL BLADE SELECTION ---
        if (!errorFound && blade.blade === "Over") {
            // NEW: Apply the filter!
            let validMetals = filterPoolByType(poolMetalBlades, "metalBlade", bladerType);
            
            if(validMetals.length === 0) errorFound = true;
            else {
                const mIndex = Math.floor(Math.random() * validMetals.length);
                let rawMetal = validMetals[mIndex];
                metalBlade = Array.isArray(rawMetal) ? rawMetal[Math.floor(Math.random() * rawMetal.length)] : rawMetal;
                
                const realMIndex = poolMetalBlades.indexOf(rawMetal);
                if(realMIndex > -1) poolMetalBlades.splice(realMIndex, 1);
            }
        }

        // --- ASSIST SELECTION ---
        if (!errorFound && system.name === "CX" && (blade.astBlade === "Yes" || blade.blade === "Over")) {
            let validAssists = filterPoolByType(poolAssist, "assist", bladerType);
            if(validAssists.length === 0) errorFound = true;
            else {
                const rIndex = Math.floor(Math.random() * validAssists.length);
                let rawAssist = validAssists[rIndex];
                assist = Array.isArray(rawAssist) ? rawAssist[Math.floor(Math.random() * rawAssist.length)] : rawAssist;
                
                const realAIndex = poolAssist.indexOf(rawAssist);
                if(realAIndex > -1) poolAssist.splice(realAIndex, 1);
            }
        }

        // --- RATCHET SELECTION ---
        if (!errorFound) {
            let validRatchets = poolRatchets;
            if(blade.core !== "Any") {
                let filterKey = blade.core === "Round" ? "R" : "W";
                validRatchets = poolRatchets.filter(r => {
                     const check = Array.isArray(r) ? r[0] : r;
                     return check.core === filterKey;
                });
            }

            validRatchets = filterPoolByType(validRatchets, "ratchet", bladerType);
            if(validRatchets.length === 0) errorFound = true;
            else {
                const rIndex = Math.floor(Math.random() * validRatchets.length);
                let rawRatchet = validRatchets[rIndex];
                ratchet = Array.isArray(rawRatchet) ? rawRatchet[Math.floor(Math.random() * rawRatchet.length)] : rawRatchet;
                const realRIndex = poolRatchets.indexOf(rawRatchet);
                if(realRIndex > -1) poolRatchets.splice(realRIndex, 1);
            }
        }

        // --- BIT SELECTION ---
        if (!errorFound && ratchet && ratchet.bit !== "No") {
            let validBits = filterPoolByType(poolBits, "bit", bladerType);
            if(validBits.length === 0) errorFound = true;
            else {
                const bIndex = Math.floor(Math.random() * validBits.length);
                let rawBit = validBits[bIndex];
                bit = Array.isArray(rawBit) ? rawBit[Math.floor(Math.random() * rawBit.length)] : rawBit;
                
                const realBIndex = poolBits.indexOf(rawBit);
                if(realBIndex > -1) poolBits.splice(realBIndex, 1);
            }
        }

        // --- EVALUATE ATTEMPT ---
        if (!errorFound) {
            // SUCCESS! The Beyblade was successfully built.
            // Calculate stats and return. (The global pools keep the updated splices).
            const stats = { atk:0, def:0, sta:0, dash:0, burstR:0 };
            [blade, metalBlade, assist, ratchet, bit].forEach(p => {
                if(p) {
                    stats.atk += p.atk || 0;
                    stats.def += p.def || 0;
                    stats.sta += p.sta || 0;
                    stats.dash += p.dash || 0;
                    stats.burstR += p.burstR || 0;
                }
            });

            return { system, chip, blade, metalBlade, assist, ratchet, bit, stats };
        } else {
            // FAILED! This specific system ran out of parts.
            // Rollback the global pools to the snapshot so no parts are lost, 
            // and the loop will automatically try the next system!
            poolChips = backupChips;
            poolBlades = backupBlades;
            poolMetalBlades = backupMetal;
            poolAssist = backupAssist;
            poolRatchets = backupRatchets;
            poolBits = backupBits;
        }
    }

    // If the code reaches this point, it means it tried UX, BX, and CX, and ALL of them failed.
    return { error: `All Systems exhausted. Completely out of compatible parts for Type: ${bladerType}.` };
}

/* ================= UI BUILDER ================= */

function createStatBars(item, type) {
    if(!item) return "";
    
    let showStats = [];
    if(type === 'blade') showStats = ['atk', 'def', 'sta'];
    if(type === 'metalBlade') showStats = ['atk', 'def', 'sta']; 
    if(type === 'assist') showStats = ['atk', 'def', 'sta'];
    if(type === 'ratchet') {
        if(item.bit === "No") showStats = ['atk', 'def', 'sta', 'dash', 'burstR'];
        else showStats = ['atk', 'def', 'sta'];
    }
    if(type === 'bit') showStats = ['atk', 'def', 'sta', 'dash', 'burstR'];

    let html = `<div class="mini-stats">`;
    showStats.forEach(key => {
        let val = item[key] || 0;
        html += `<div class="stat-row">
            <span class="stat-label">${key.toUpperCase()}</span>
            <span class="stat-val-text">${val}</span>
            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.min(val, 100)}%"></div></div>
        </div>`;
    });
    html += `</div>`;
    return html;
}

function createCardHTML(type, item, blader = null) {
    let content = "";
    let className = "";
    let wrapperClass = "card-wrapper";
    let categoryLabel = "";
    let specificName = "";
    let showStats = true;
    let faceStyle = "";

    if (type === "blader") {
        className = "blader-face";
        content = `
            <img src="${blader.src}">
            <div class="blader-name-overlay">${blader.name}</div>
        `;
        showStats = false;
    } else {
        if(type === "chip") {
            categoryLabel = "Lock Chip";
            specificName = item.name;
            faceStyle = "justify-content: center;";
            // Keep the chip clean and simple!
            content = `
                <div class="card-category-top">${categoryLabel}</div>
                <div class="img-container">
                    <img src="${item.src}">
                </div>
                <div class="part-specific-name">${specificName}</div>
            `;
            showStats = false;
        } else if(type === "blade") {
            categoryLabel = item.blade === "Over" ? "Over Blade" : "Main Blade";
            specificName = item.displayName;
        } else if(type === "metalBlade") {
            categoryLabel = "Metal Blade";
            specificName = item.displayName;
        } else if(type === "assist") {
            categoryLabel = "Assist Blade";
            specificName = item.displayName;
        } else if(type === "ratchet") {
            categoryLabel = "Ratchet";
            specificName = item.name;
        } else if(type === "bit") {
            categoryLabel = "Bit";
            specificName = item.name; 
        }

        // Apply standard layout for everything with stats
        if (type !== "chip") {
            content = `
                <div class="card-category-top">${categoryLabel}</div>
                <div class="img-container">
                    <img src="${item.src}">
                </div>
                <div class="part-specific-name">${specificName}</div>
                ${createStatBars(item, type)}
            `;
        }
    }

    if(!showStats && type === "blader") {
        return `
        <div class="${wrapperClass} card-hidden">
            <div class="card">
                <div class="face ${className}" style="${faceStyle}">
                    ${content}
                </div>
            </div>
        </div>
        `;
    }

    return `
    <div class="${wrapperClass} card-hidden">
        <div class="card">
            <div class="face ${className}" style="${faceStyle}">
                ${content}
            </div>
        </div>
    </div>
    `;
}

function drawMiniChart(canvasId, stats, systemName) {
    const cvs = document.getElementById(canvasId);
    if(!cvs) return;
    const ctx = cvs.getContext('2d');
    const w = cvs.width;
    const h = cvs.height;
    const cx = w/2;
    const cy = h/2;
    const r = (Math.min(w,h)/2) - 45; 
    const max = 150;

    let color = "#0ff";
    if(systemName === "UX") color = "#ffaa00";
    if(systemName === "CX") color = "#ff0044";
    if(systemName === "BX") color = "#0066cc"; 

    const values = [stats.atk, stats.def, stats.sta, stats.dash, stats.burstR];
    const labels = ["ATK", "DEF", "STA", "DASH", "BR"];
    const count = 5;
    
    ctx.clearRect(0,0,w,h);
    
    ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; 
    ctx.lineWidth = 1;
    for(let i=1; i<=3; i++) {
        ctx.beginPath();
        for(let j=0; j<count; j++){
            const angle = (Math.PI*2/count)*j - Math.PI/2;
            const dist = (r/3)*i;
            const x = cx + Math.cos(angle)*dist;
            const y = cy + Math.sin(angle)*dist;
            j===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.closePath();
        ctx.stroke();
    }

    ctx.fillStyle = color + "44"; 
    ctx.strokeStyle = color;      
    ctx.lineWidth = 2;
    ctx.beginPath();
    for(let j=0; j<count; j++){
        const val = Math.min(values[j], max);
        const angle = (Math.PI*2/count)*j - Math.PI/2;
        const dist = (val/max)*r;
        const x = cx + Math.cos(angle)*dist;
        const y = cy + Math.sin(angle)*dist;
        j===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px sans-serif"; 
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    labels.forEach((l, i) => {
        const angle = (Math.PI*2/count)*i - Math.PI/2;
        const lx = cx + Math.cos(angle)*(r+24); 
        const ly = cy + Math.sin(angle)*(r+24);
        
        ctx.fillStyle = "#aaa";
        ctx.fillText(l, lx, ly - 10); 
        
        ctx.fillStyle = color;
        ctx.fillText(values[i], lx, ly + 8); 
    });
}

/* ================= MAIN ================= */

document.getElementById("app-title").addEventListener("click", () => {
    if(generatedBeyblades.length === 0) return; 

    const outputContainer = document.getElementById("data-output-container");
    const textArea = document.getElementById("data-textarea");
    
    let text = generatedBeyblades.map(obj => JSON.stringify(obj)).join(",\n");
    
    textArea.value = text;
    outputContainer.style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

document.getElementById("generateBtn").addEventListener("click", () => {
    const container = document.getElementById("results-container");
    const outputContainer = document.getElementById("data-output-container");
    
    container.innerHTML = ""; 
    outputContainer.style.display = "none"; 
    resetPools(); 
    
    const btn = document.getElementById("generateBtn");
    const loader = document.getElementById("loading");
    
    btn.remove();
    loader.style.display = "flex";

    setTimeout(() => {
        loader.style.display = "none"; 
        startGeneration(container);    
    }, 2000); 
});

function slowScrollToTop(duration) {
    const startPosition = window.scrollY;
    const startTime = performance.now();

    function animation(currentTime) {
        const timeElapsed = currentTime - startTime;
        const progress = Math.min(timeElapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 4); 

        window.scrollTo(0, startPosition * (1 - ease));

        if (timeElapsed < duration) {
            requestAnimationFrame(animation);
        }
    }
    requestAnimationFrame(animation);
}

function startGeneration(container) {
    let rowsData = [];

    bladers.forEach((blader, index) => {
        const bey = generateFullBeyblade(blader.type || "all");
        
        // --- NEW: ADVANCED ERROR DISPLAY ---
        if(!bey || bey.error) {
            const errDiv = document.createElement("div");
            errDiv.textContent = `🛑 ERROR FOR ${blader.name.toUpperCase()}: ${bey ? bey.error : 'Unknown error'}`;
            
            // Stylize the error box so it is clearly visible
            errDiv.style.color = "#ff4d4d";
            errDiv.style.backgroundColor = "rgba(255, 0, 0, 0.1)";
            errDiv.style.border = "2px solid #ff4d4d";
            errDiv.style.borderRadius = "8px";
            errDiv.style.fontWeight = "bold";
            errDiv.style.padding = "15px";
            errDiv.style.margin = "20px auto";
            errDiv.style.maxWidth = "800px";
            errDiv.style.fontSize = "18px";
            
            container.appendChild(errDiv);
            return; // Skip this blader and move to the next one
        }

        generatedBeyblades.push({
            name: blader.name,
            src: blader.src,
            system: bey.system.name,
            chip: bey.chip ? bey.chip.name : "",
            blade: bey.blade.name,
            metalBlade: bey.metalBlade ? bey.metalBlade.name : "",
            asst: bey.assist ? bey.assist.name : "",
            ratchet: bey.ratchet ? bey.ratchet.name : "",
            bit: bey.bit ? bey.bit.abbr : ""
        });

        const rowId = `row-${index}`;
        const canvasId = `chart-${index}`;
        
        const rowDiv = document.createElement("div");
        rowDiv.className = "blader-row";
        rowDiv.id = rowId;

        let fullName = "";
        if (bey.blade.blade === "Over") {
            if(bey.chip) fullName += bey.chip.name;
            if(bey.metalBlade) fullName += bey.metalBlade.displayName;
            fullName += "<br>"; // NEW: Drops to a new line
            if(bey.blade) fullName += bey.blade.displayName.charAt(0).toUpperCase();
            if(bey.assist) fullName += bey.assist.displayName.charAt(0).toUpperCase();
            if(bey.ratchet) fullName += bey.ratchet.name;
            if(bey.bit) fullName += bey.bit.abbr; 
        } else {
            if(bey.chip) fullName += bey.chip.name;
            fullName += bey.blade.displayName;
            fullName += "<br>"; // NEW: Drops to a new line
            if(bey.assist) fullName += bey.assist.displayName.charAt(0);
            if(bey.ratchet) fullName += bey.ratchet.name;
            if(bey.bit) fullName += bey.bit.abbr; 
        }

        let colorClass = "text-bx";
        if(bey.system.name === "UX") colorClass = "text-ux";
        if(bey.system.name === "CX") colorClass = "text-cx";

        let html = "";
        html += createCardHTML("blader", null, blader);
        if(bey.chip) html += createCardHTML("chip", bey.chip); // Reverted chip call
        html += createCardHTML("blade", bey.blade);
        if(bey.metalBlade) html += createCardHTML("metalBlade", bey.metalBlade);
        if(bey.assist) html += createCardHTML("assist", bey.assist);
        if(bey.ratchet) html += createCardHTML("ratchet", bey.ratchet);
        if(bey.bit) html += createCardHTML("bit", bey.bit);
        
        html += `
        <div class="card-wrapper card-hidden">
             <div class="card">
                 <div class="face" style="background:#000; border:1px solid #333; display:flex; flex-direction:column; justify-content: space-between; padding:0; position:relative;">
                    
                    <img src="${bey.system.src}" style="position:absolute; top:12px; left:12px; width:40px; height:auto; z-index:10; filter: drop-shadow(0 0 4px rgba(0,0,0,0.8));">
                    
                    <canvas id="${canvasId}" width="200" height="210" style="flex-grow:1; width:100%; object-fit:contain; position:relative; z-index:1;"></canvas>
                    <div class="bey-full-name ${colorClass}" style="line-height: 1.2; padding-bottom: 15px; position:relative; z-index:2;">${fullName}</div>
                 </div>
             </div>
        </div>`;

        rowDiv.innerHTML = html;
        container.appendChild(rowDiv);

        rowsData.push({
            id: rowId,
            canvasId: canvasId,
            stats: bey.stats,
            system: bey.system.name
        });
    });

    let globalDelay = 0;
    const CARD_DELAY = 250; 
    const ROW_DELAY = 3500;

    rowsData.forEach((data) => {
        const row = document.getElementById(data.id);
        
        setTimeout(() => {
            document.querySelectorAll('.blader-row').forEach(r => {
                if (r.id !== data.id) {
                    r.classList.add('dimmed');
                    r.classList.remove('focused');
                }
            });

            row.classList.remove("dimmed");
            row.classList.add("visible");
            row.classList.add("focused");
            
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, globalDelay);

        drawMiniChart(data.canvasId, data.stats, data.system);

        const cards = row.querySelectorAll(".card-hidden");
        
        cards.forEach((cardWrapper, i) => {
            setTimeout(() => {
                cardWrapper.classList.remove("card-hidden");
                cardWrapper.classList.add("card-reveal");
            }, globalDelay + (i * CARD_DELAY));
        });

        globalDelay += (cards.length * CARD_DELAY) + ROW_DELAY;
    });

    setTimeout(() => {
        document.querySelectorAll('.blader-row').forEach(r => {
            r.classList.remove('dimmed');
            r.classList.remove('focused');
            r.classList.add('visible'); 
        });

        setTimeout(() => {
            slowScrollToTop(16000);
        }, 1000);

    }, globalDelay);
}
</script>
