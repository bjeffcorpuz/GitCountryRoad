<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyblade Builder</title>
<script src="data.js"></script>
<style>
/* ================= STYLES ================= */
/* Hide scrollbar for Chrome, Safari and Opera */
html::-webkit-scrollbar, body::-webkit-scrollbar {
  display: none;
}

/* Hide scrollbar for IE, Edge and Firefox */
html, body {
  -ms-overflow-style: none;  /* IE and Edge */
  scrollbar-width: none;  /* Firefox */
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: radial-gradient(circle at top, #0c0c10, #1b1b2f);
  margin: 0;
  padding: 20px;
  color: #fff;
  text-align: center;
  min-height: 100vh;
}

/* === LIVELY TITLE STYLES (Shadow Only) === */
h1 {
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #ff9800 !important;
    text-shadow: 0 0 15px #ff9800 !important;
    margin: 20px 0;
  cursor: pointer; /* Indicates it's clickable */
  

}

h1:active {
    opacity: 0.7;
}

@keyframes glowPulse {
  0% {
    text-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
    filter: hue-rotate(0deg);
  }
  100% {
    text-shadow: 0 0 50px rgba(0, 212, 255, 0.6), 0 0 20px rgba(255, 153, 0, 0.4);
    filter: hue-rotate(15deg);
  }
}

/* === CONTROLS === */
#controls {
  margin-bottom: 40px;
  min-height: 60px; 
}

button {
    display: block;
    margin: 10px auto;
    padding: 12px 30px;
    font-size: 14px;
    border-radius: 50px;
    border: 2px solid #ff9800;
    background: transparent;
    color: #ff9800;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: bold;
    text-transform: uppercase;
    width: 20%;
}

button:hover {
    background: #ff9800;
    color: #000;
    box-shadow: 0 0 20px #ff9800;
}

/* === LOADING SPINNER === */
#loading {
    display: none; /* Hidden by default */
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255, 255, 255, 0.1);
    border-top: 5px solid #00d4ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
}

.loading-text {
    font-size: 1.2rem;
    font-weight: bold;
    color: #00d4ff;
    letter-spacing: 2px;
    animation: blink 1.5s infinite;
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }


/* === GENERATION CONTAINER === */
#results-container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 1800px;
  margin: 0 auto;
  text-align: left;
}

/* === ROWS === */
.blader-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  padding: 15px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 4px;
  border-left: 5px solid #444;
  opacity: 0;
  transform: translateY(20px);
  /* UPDATED: Added transitions for the highlight effects */
  transition: opacity 0.5s, transform 0.5s, background 0.5s, box-shadow 0.5s, border-left-color 0.5s;
}

.blader-row.visible {
  opacity: 1;
  transform: translateY(0);
}

/* === CARDS === */
.card-wrapper {
  perspective: 1000px;
  width: 200px;  
  /* Increased Height to 290px to prevent cutting */
  height: 290px; 
}

.card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.card-hidden .card { transform: rotateY(90deg); opacity: 0; }
.card-reveal .card { transform: rotateY(0deg); opacity: 1; }

/* General Face Style */
.face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 8px;
  align-items: center;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  overflow: hidden;
  background: #222;
  border: 1px solid #444;
  padding: 8px; 
  box-sizing: border-box;
}

/* === BLADER CARD STYLES === */
.blader-face {
  background: #151515;
  border: 1px solid #0ff;
  padding: 0;
  justify-content: center; 
}

.blader-face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  margin: 0;
  border-radius: 0;
}

.blader-name-overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.8);
  color: #0ff;
  font-weight: bold;
  font-size: 14px;
  text-align: center;
  padding: 8px 0;
  text-transform: uppercase;
}

/* === SYSTEM / PARTS STYLES === */

/* Top Category Label (e.g., "Main Blade") with Effect */
.card-category-top {
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: 8px; 
  text-align: center;
  width: 100%;
  letter-spacing: 1.5px;
  
  /* Gradient Text Effect */
  background: linear-gradient(90deg, #888, #ddd, #888);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  
  /* Slight Glow */
  text-shadow: 0 0 5px rgba(255,255,255,0.2);
  
  /* Border below to separate header */
  padding-bottom: 4px;
  border-bottom: 1px solid #444;
}

/* Image Container */
.img-container {
    height: 110px; 
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 5px;
    margin-top: 10px;
}

.img-container img {
    max-height: 100%;
    max-width: 95%;
    object-fit: contain;
}

/* System Image Special Case */
.system-face .img-container { height: 100%; margin: 0; }
.system-face img { height: 140px; }


/* Specific Part Name (e.g., "SharkScale") - Below Image */
.part-specific-name {
  font-size: 16px;
  font-weight: bold;
  color: #00d4ff; /* Cyan/Blue style */
  margin-bottom: 10px; 
  text-align: center;
  width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Stats Container - Pushed to bottom */
.mini-stats {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 4px; 
  margin-top: auto; 
}

.stat-row {
  display: flex;
  align-items: center;
  font-size: 12px;
  color: #ccc;
  width: 100%;
}

.stat-label { 
  width: 40px; 
  font-weight: bold; 
  text-align: left;
}

.stat-val-text {
  width: 25px;
  text-align: right;
  margin-right: 8px;
  font-family: monospace;
  color: #fff;
}

.stat-bar-bg { 
  flex-grow: 1; 
  height: 5px; 
  background: #444; 
  border-radius: 3px; 
}

.stat-bar-fill { 
  height: 100%; 
  background: linear-gradient(90deg, #00c6ff, #0072ff); 
  border-radius: 3px; 
}

/* === CHART & NAME === */
.bey-full-name {
  width: 100%;
  text-align: center;
  font-size: 16px;
  font-weight: bold;
  padding: 10px 4px; 
  border-top: 1px solid #444;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  background: #151515;
}

/* Dynamic Colors */
.text-ux { color: #ffaa00; }
.text-bx { color: #00c6ff; }
.text-cx { color: #ff0044; }

/* === JSON OUTPUT BOX === */
#data-output-container {
    display: none;
    width: 80%;
    margin: 0 auto 30px auto;
}

#data-textarea {
    width: 100%;
    height: 150px;
    background: #000;
    color: #0f0;
    border: 1px solid #333;
    padding: 10px;
    font-family: monospace;
    border-radius: 5px;
}

/* === ROWS === */
.blader-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  padding: 15px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 4px;
  border-left: 5px solid #444;
  opacity: 0;
  transform: translateY(20px);
  /* UPDATED: Added transitions for the highlight effects */
  transition: opacity 0.5s, transform 0.5s, background 0.5s, box-shadow 0.5s, border-left-color 0.5s;
}

.blader-row.visible {
  opacity: 1;
  transform: translateY(0);
}

/* NEW: Highlight effect for the currently generating row */
.blader-row.focused {
  opacity: 1 !important;
  transform: translateY(0) scale(1.02);
  box-shadow: 0 0 25px rgba(0, 212, 255, 0.25);
  border-left: 5px solid #00d4ff;
  background: rgba(255, 255, 255, 0.1);
  z-index: 10;
  position: relative;
}

/* NEW: Dim effect for rows not currently generating */
.blader-row.dimmed {
  opacity: 0.25 !important;
  transform: translateY(0) scale(0.98);
  filter: grayscale(40%);
}

/* Add this to your <style> block */

.card-hidden .card {
    opacity: 0;
    transform: translateY(-100px) rotateX(20deg);
}

.card-reveal .card {
    animation: heavyImpact 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
}

@keyframes heavyImpact {
    0% {
        opacity: 0;
        transform: translateY(-100px) rotateX(20deg);
    }
    60% {
        opacity: 1;
        transform: translateY(15px) rotateX(-10deg); /* Overshoots the drop */
    }
    80% {
        transform: translateY(-5px) rotateX(5deg); /* Bounces back up slightly */
    }
    100% {
        opacity: 1;
        transform: translateY(0) rotateX(0deg); /* Locks in */
    }
}



</style>
</head>
<body>

  <h1 id="app-title">Blade Assembly</h1>

  <div id="data-output-container">
      <textarea id="data-textarea" readonly></textarea>
  </div>

  <div id="controls">
    <button id="generateBtn">Bestow the Parts</button>
    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Randomizing...</div>
    </div>
  </div>

  <div id="results-container"></div>

<script>
/* ================= DATA ================= */
// Added the "type" property to the bladers array. 
// You can adjust these values as needed.
//["Def", "Atk", "Sta", "AtkDef", "AtkSta", "DefSta", "all"]
const bladers = [
    {"name":"Natsumi","src":"avatars/Natsumi.png","type":"Atk"},
    {"name":"Haruka","src":"avatars/Haruka.png","type":"Atk"},
    {"name":"Ryomaru","src":"avatars/Ryomaru.png","type":"Atk"},
    {"name":"Darius","src":"avatars/Darius.png","type":"Atk"},
    {"name":"Lucian","src":"avatars/Lucian.png","type":"AtkSta"},
    {"name":"Darian","src":"avatars/Darian.png","type":"AtkSta"},
    {"name":"Jaren","src":"avatars/Jaren.png","type":"AtkDef"},
    {"name":"Sasha","src":"avatars/Sasha.png","type":"AtkDef"}
]
// NEW STATIC VARIABLES FOR STAT THRESHOLDS
const blades_minAtk = 40;
const blades_minDef = 30;
const blades_minSta = 30;

const assist_minAtk = 13;
const assist_minDef = 13;
const assist_minSta = 10;

const ratchet_minAtk = 10;
const ratchet_minDef = 9;
const ratchet_minSta = 8;

const bit_minAtk = 25;
const bit_minDef = 25;
const bit_minSta = 20;

// remove blades from previous
let removeBlade = ["Hunt", "PhoenixRudder", "Dark", "TriceraPress", "KnightShield","SharkScale","HellsHammer","WizardRod"];

let poolSystem, poolBlades, poolRatchets, poolChips, poolAssist, poolBits;
let generatedBeyblades = []; // Store the generated data

function resetPools() {
    poolSystem = [...masterSystem];
    
    // NEW FILTER LOGIC: Apply the removeBlade ban list
    poolBlades = masterBlades.filter(bladeItem => {
        // Handle both single objects and arrays of variations
        const checkItem = Array.isArray(bladeItem) ? bladeItem[0] : bladeItem;
        
        // If the blade's displayName IS in the removeBlade array, return false to exclude it
        // If it is NOT in the array, return true to keep it (along with all its color/stat variations)
        return !removeBlade.includes(checkItem.displayName);
    });

    poolRatchets = [...masterRatchets];
    poolChips = [...masterChips];
    poolAssist = [...masterAssist];
    poolBits = [...masterBits];
    generatedBeyblades = []; // Reset storage
}

/* ================= LOGIC ================= */

function getRandomItem(pool, remove = true) {
    if (!pool || pool.length === 0) return null;
    const index = Math.floor(Math.random() * pool.length);
    let item = pool[index];
    let actualItem = Array.isArray(item) ? item[Math.floor(Math.random() * item.length)] : item;
    if (remove) pool.splice(index, 1);
    return { item: actualItem, raw: item };
}

// NEW HELPER FUNCTION: Filters a pool based on the blader's type and category thresholds
function filterPoolByType(pool, partCategory, type) {
    if (!pool || pool.length === 0) return pool;
    if (!type || type === "all") return pool; // "all" type skips filtering completely (Tr and Op stay here!)

    // --- NEW RULE: Exclude integrated-bit Ratchets (Tr, Op) for specialized types ---
    let workingPool = pool;
    if (partCategory === "ratchet") {
        workingPool = pool.filter(item => {
            const checkItem = Array.isArray(item) ? item[0] : item;
            // Keep it ONLY if it takes a bit. (Removes Tr, Op(Atk), Op(Def))
            return checkItem.bit !== "No";
        });
        
        // Safety check: if removing them somehow emptied the pool, revert
        if (workingPool.length === 0) workingPool = pool;
    }

    let minAtk = 0, minDef = 0, minSta = 0;

    // Determine thresholds based on part category
    if (partCategory === "blade") {
        minAtk = blades_minAtk; minDef = blades_minDef; minSta = blades_minSta;
    } else if (partCategory === "assist") {
        minAtk = assist_minAtk; minDef = assist_minDef; minSta = assist_minSta;
    } else if (partCategory === "ratchet") {
        minAtk = ratchet_minAtk; minDef = ratchet_minDef; minSta = ratchet_minSta;
    } else if (partCategory === "bit") {
        minAtk = bit_minAtk; minDef = bit_minDef; minSta = bit_minSta;
    } else {
        return workingPool; // Default fallback for unknown categories
    }

    // AI SCORING PROCESS
    let scoredPool = workingPool.map(item => {
        const checkItem = Array.isArray(item) ? item[0] : item;
        let atk = checkItem.atk || 0;
        let def = checkItem.def || 0;
        let sta = checkItem.sta || 0;

        // Normalize stats so they can be compared fairly
        let nAtk = minAtk > 0 ? atk / minAtk : 0;
        let nDef = minDef > 0 ? def / minDef : 0;
        let nSta = minSta > 0 ? sta / minSta : 0;

        let passes = false;
        let aiScore = 0;

        if (type === "Atk") {
            passes = atk >= minAtk;
        } else if (type === "Def") {
            passes = def >= minDef;
        } else if (type === "Sta") {
            passes = sta >= minSta;
        } 
        // --- AI BALANCE LOGIC FOR MIXED TYPES ---
        else if (type === "AtkDef") {
            passes = (atk >= minAtk || def >= minDef);
            aiScore = (nAtk + nDef) - Math.abs(nAtk - nDef); 
        } else if (type === "AtkSta") {
            passes = (atk >= minAtk || sta >= minSta);
            aiScore = (nAtk + nSta) - Math.abs(nAtk - nSta);
        } else if (type === "DefSta") {
            passes = (def >= minDef || sta >= minSta);
            aiScore = (nDef + nSta) - Math.abs(nDef - nSta);
        }

        return { original: item, passes: passes, score: aiScore };
    });

    // 1. Filter out parts that completely fail the basic threshold
    let validItems = scoredPool.filter(x => x.passes);

    // If the filtered pool is empty, revert to the workingPool (which still excludes Tr/Op for ratchets)
    if (validItems.length === 0) {
        return workingPool;
    }

    // 2. AI SELECTION: If it's a mixed type, ensure we get truly "balanced" parts
    if (type === "AtkDef" || type === "AtkSta" || type === "DefSta") {
        validItems.sort((a, b) => b.score - a.score);
        let topTierCount = Math.max(3, Math.ceil(validItems.length * 0.5));
        validItems = validItems.slice(0, topTierCount);
    }

    return validItems.map(x => x.original);
}

// UPDATED: Now accepts the bladerType as an argument
function generateFullBeyblade(bladerType) {
    const sysRes = getRandomItem(poolSystem, false);
    if(!sysRes) return null;
    const system = sysRes.item;

    let chip = null;
    if(system.name === "CX") {
        const chipRes = getRandomItem(poolChips, true);
        if(chipRes) chip = chipRes.item;
    }

    // --- BLADE SELECTION ---
    // 1. Filter by System first
    let validBlades = poolBlades.filter(b => {
        const check = Array.isArray(b) ? b[0] : b;
        return check.system === system.name;
    });
    
    // 2. NEW: Filter by Blader Type
    validBlades = filterPoolByType(validBlades, "blade", bladerType);

    if(validBlades.length === 0) return null;
    
    const bladeIndex = Math.floor(Math.random() * validBlades.length);
    let rawBlade = validBlades[bladeIndex];
    let blade = Array.isArray(rawBlade) ? rawBlade[Math.floor(Math.random() * rawBlade.length)] : rawBlade;
    
    const realIndex = poolBlades.indexOf(rawBlade);
    if(realIndex > -1) poolBlades.splice(realIndex, 1);

    // --- ASSIST SELECTION ---
    let assist = null;
    if(system.name === "CX" && blade.astBlade === "Yes") {
        // NEW: Filter by Blader Type before randomizing
        let validAssists = filterPoolByType(poolAssist, "assist", bladerType);
        
        const rIndex = Math.floor(Math.random() * validAssists.length);
        let rawAssist = validAssists[rIndex];
        assist = Array.isArray(rawAssist) ? rawAssist[Math.floor(Math.random() * rawAssist.length)] : rawAssist;
        
        const realAIndex = poolAssist.indexOf(rawAssist);
        if(realAIndex > -1) poolAssist.splice(realAIndex, 1);
    }

    // --- RATCHET SELECTION ---
    let validRatchets = poolRatchets;
    // 1. Filter by Core compatibility
    if(blade.core !== "Any") {
        let filterKey = blade.core === "Round" ? "R" : "W";
        validRatchets = poolRatchets.filter(r => {
             const check = Array.isArray(r) ? r[0] : r;
             return check.core === filterKey;
        });
    }

    // 2. NEW: Filter by Blader Type
    validRatchets = filterPoolByType(validRatchets, "ratchet", bladerType);

    let ratchet = null;
    if(validRatchets.length > 0) {
        const rIndex = Math.floor(Math.random() * validRatchets.length);
        let rawRatchet = validRatchets[rIndex];
        ratchet = Array.isArray(rawRatchet) ? rawRatchet[Math.floor(Math.random() * rawRatchet.length)] : rawRatchet;
        const realRIndex = poolRatchets.indexOf(rawRatchet);
        if(realRIndex > -1) poolRatchets.splice(realRIndex, 1);
    }

    // --- BIT SELECTION ---
    let bit = null;
    if(ratchet && ratchet.bit !== "No") {
        // NEW: Filter by Blader Type
        let validBits = filterPoolByType(poolBits, "bit", bladerType);
        
        const rIndex = Math.floor(Math.random() * validBits.length);
        let rawBit = validBits[rIndex];
        bit = Array.isArray(rawBit) ? rawBit[Math.floor(Math.random() * rawBit.length)] : rawBit;
        
        const realBIndex = poolBits.indexOf(rawBit);
        if(realBIndex > -1) poolBits.splice(realBIndex, 1);
    }

    const stats = { atk:0, def:0, sta:0, dash:0, burstR:0 };
    [blade, assist, ratchet, bit].forEach(p => {
        if(p) {
            stats.atk += p.atk || 0;
            stats.def += p.def || 0;
            stats.sta += p.sta || 0;
            stats.dash += p.dash || 0;
            stats.burstR += p.burstR || 0;
        }
    });

    return { system, chip, blade, assist, ratchet, bit, stats };
}

/* ================= UI BUILDER ================= */

function createStatBars(item, type) {
    if(!item) return "";
    
    let showStats = [];
    if(type === 'blade') showStats = ['atk', 'def', 'sta'];
    if(type === 'assist') showStats = ['atk', 'def', 'sta'];
    if(type === 'ratchet') {
        if(item.bit === "No") showStats = ['atk', 'def', 'sta', 'dash', 'burstR'];
        else showStats = ['atk', 'def', 'sta'];
    }
    if(type === 'bit') showStats = ['atk', 'def', 'sta', 'dash', 'burstR'];

    let html = `<div class="mini-stats">`;
    showStats.forEach(key => {
        let val = item[key] || 0;
        html += `<div class="stat-row">
            <span class="stat-label">${key.toUpperCase()}</span>
            <span class="stat-val-text">${val}</span>
            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.min(val, 100)}%"></div></div>
        </div>`;
    });
    html += `</div>`;
    return html;
}

function createCardHTML(type, item, blader = null) {
    let content = "";
    let className = "";
    let wrapperClass = "card-wrapper";
    let categoryLabel = "";
    let specificName = "";
    let showStats = true;
    let faceStyle = "";

    // Determine Category Label & Name
    if (type === "blader") {
        className = "blader-face";
        content = `
            <img src="${blader.src}">
            <div class="blader-name-overlay">${blader.name}</div>
        `;
        showStats = false;
    } else if (type === "system") {
        className = "system-face";
        content = `
            <div class="img-container">
                <img src="${item.src}">
            </div>
        `;
        showStats = false;
    } else {
        if(type === "chip") {
            categoryLabel = "Lock Chip";
            specificName = item.name;
            faceStyle = "justify-content: center;";
        } else if(type === "blade") {
            categoryLabel = "Main Blade";
            specificName = item.displayName;
        } else if(type === "assist") {
            categoryLabel = "Assist Blade";
            specificName = item.displayName;
        } else if(type === "ratchet") {
            categoryLabel = "Ratchet";
            specificName = item.name;
        } else if(type === "bit") {
            categoryLabel = "Bit";
            specificName = item.name; // Full name for card
        }

        // UNIFORM STRUCTURE: Title -> Image Container -> Name -> Stats
        content = `
            <div class="card-category-top">${categoryLabel}</div>
            <div class="img-container">
                <img src="${item.src}">
            </div>
            <div class="part-specific-name">${specificName}</div>
            ${createStatBars(item, type)}
        `;
    }

    if(!showStats && type === "system") {
        return `
        <div class="${wrapperClass} card-hidden">
            <div class="card">
                <div class="face ${className}" style="justify-content:center;">
                    ${content}
                </div>
            </div>
        </div>
        `;
    }
    
    if(!showStats && type === "blader") {
         return `
        <div class="${wrapperClass} card-hidden">
            <div class="card">
                <div class="face ${className}">
                    ${content}
                </div>
            </div>
        </div>
        `;
    }

    return `
    <div class="${wrapperClass} card-hidden">
        <div class="card">
            <div class="face ${className}" style="${faceStyle}">
                ${content}
            </div>
        </div>
    </div>
    `;
}

function drawMiniChart(canvasId, stats, systemName) {
    const cvs = document.getElementById(canvasId);
    if(!cvs) return;
    const ctx = cvs.getContext('2d');
    const w = cvs.width;
    const h = cvs.height;
    const cx = w/2;
    const cy = h/2;
    const r = (Math.min(w,h)/2) - 35; 
    const max = 150;

    let color = "#0ff";
    if(systemName === "UX") color = "#ffaa00";
    if(systemName === "CX") color = "#ff0044";
    if(systemName === "BX") color = "#0066cc"; 

    const values = [stats.atk, stats.def, stats.sta, stats.dash, stats.burstR];
    const labels = ["ATK", "DEF", "STA", "DASH", "BR"];
    const count = 5;
    
    ctx.clearRect(0,0,w,h);
    
    // Grid (The Spider Web) - WHITE LINES as requested
    ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; // Visible white lines
    ctx.lineWidth = 1;
    for(let i=1; i<=3; i++) {
        ctx.beginPath();
        for(let j=0; j<count; j++){
            const angle = (Math.PI*2/count)*j - Math.PI/2;
            const dist = (r/3)*i;
            const x = cx + Math.cos(angle)*dist;
            const y = cy + Math.sin(angle)*dist;
            j===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.closePath();
        ctx.stroke();
    }

    // Stat Polygon Fill - REVERTED TO TRANSPARENT COLOR
    ctx.fillStyle = color + "44"; // Semi-transparent system color
    ctx.strokeStyle = color;      // Solid system color outline
    ctx.lineWidth = 2;
    ctx.beginPath();
    for(let j=0; j<count; j++){
        const val = Math.min(values[j], max);
        const angle = (Math.PI*2/count)*j - Math.PI/2;
        const dist = (val/max)*r;
        const x = cx + Math.cos(angle)*dist;
        const y = cy + Math.sin(angle)*dist;
        j===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Labels + Values
    ctx.fillStyle = "#fff";
    ctx.font = "bold 14px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    labels.forEach((l, i) => {
        const angle = (Math.PI*2/count)*i - Math.PI/2;
        const lx = cx + Math.cos(angle)*(r+24);
        const ly = cy + Math.sin(angle)*(r+24);
        
        ctx.fillStyle = "#aaa";
        ctx.fillText(l, lx, ly - 10); 
        
        ctx.fillStyle = color;
        ctx.fillText(values[i], lx, ly + 8); 
    });
}

// CLICK HANDLER FOR TITLE TO EXPORT DATA
document.getElementById("app-title").addEventListener("click", () => {
    if(generatedBeyblades.length === 0) return; // Nothing generated yet

    const outputContainer = document.getElementById("data-output-container");

document.getElementById("generateBtn").addEventListener("click", () => {
    const container = document.getElementById("results-container");
    const outputContainer = document.getElementById("data-output-container");
    
    container.innerHTML = ""; 
    outputContainer.style.display = "none"; // Hide previous data output
    resetPools(); 
    
    const btn = document.getElementById("generateBtn");
    const loader = document.getElementById("loading");
    
    // 1. Remove Button
    btn.remove();
    
    // 2. Show Loader
    loader.style.display = "flex";

    // 3. Wait 2 Seconds, then Start Generation
    setTimeout(() => {
        loader.style.display = "none"; // Hide Loader
        startGeneration(container);    // Start Process
    }, 2000); 
});

// Helper function for a controlled, slow scroll to top
function slowScrollToTop(duration) {
    const startPosition = window.scrollY;
    const startTime = performance.now();

    function animation(currentTime) {
        const timeElapsed = currentTime - startTime;
        const progress = Math.min(timeElapsed / duration, 1);
        
        // Easing function (easeOutQuart) for a nice slowdown as it reaches the top
        const ease = 1 - Math.pow(1 - progress, 4); 

        window.scrollTo(0, startPosition * (1 - ease));

        if (timeElapsed < duration) {
            requestAnimationFrame(animation);
        }
    }
    requestAnimationFrame(animation);
}

function startGeneration(container) {
    let rowsData = [];

    bladers.forEach((blader, index) => {
        // UPDATED: Pass the blader's type to the generation function
        const bey = generateFullBeyblade(blader.type || "all");
        
        if(!bey) {
            const errDiv = document.createElement("div");
            errDiv.textContent = `Error for ${blader.name}`;
            container.appendChild(errDiv);
            return;
        }

        // SAVE DATA TO GLOBAL ARRAY
        generatedBeyblades.push({
            name: blader.name,
            src: blader.src,
            system: bey.system.name,
            chip: bey.chip ? bey.chip.name : "",
            blade: bey.blade.name,
            asst: bey.assist ? bey.assist.name : "",
            ratchet: bey.ratchet ? bey.ratchet.name : "",
            bit: bey.bit ? bey.bit.abbr : ""
        });

        const rowId = `row-${index}`;
        const canvasId = `chart-${index}`;
        
        const rowDiv = document.createElement("div");
        rowDiv.className = "blader-row";
        rowDiv.id = rowId;

        // Construct Name: [Chip][Blade] [AssistInitial][Ratchet][BitAbbr]
        let fullName = "";
        if(bey.chip) fullName += bey.chip.name;
        fullName += bey.blade.displayName;
        fullName += " ";
        if(bey.assist) fullName += bey.assist.displayName.charAt(0);
        if(bey.ratchet) fullName += bey.ratchet.name;
        if(bey.bit) fullName += bey.bit.abbr; 


        // Color Class
        let colorClass = "text-bx";
        if(bey.system.name === "UX") colorClass = "text-ux";
        if(bey.system.name === "CX") colorClass = "text-cx";

        // Build HTML
        let html = "";
        html += createCardHTML("blader", null, blader);
        html += createCardHTML("system", bey.system);
        if(bey.chip) html += createCardHTML("chip", bey.chip);
        html += createCardHTML("blade", bey.blade);
        if(bey.assist) html += createCardHTML("assist", bey.assist);
        if(bey.ratchet) html += createCardHTML("ratchet", bey.ratchet);
        if(bey.bit) html += createCardHTML("bit", bey.bit);
        
        // Chart Card with Flex Layout
        html += `
        <div class="card-wrapper card-hidden">
             <div class="card">
                 <div class="face" style="background:#000; border:1px solid #333; display:flex; flex-direction:column; justify-content: space-between; padding:0;">
                    <canvas id="${canvasId}" width="200" height="240" style="flex-grow:1; width:100%; object-fit:contain;"></canvas>
                    <div class="bey-full-name ${colorClass}">${fullName}</div>
                 </div>
             </div>
        </div>`;

        rowDiv.innerHTML = html;
        container.appendChild(rowDiv);

        rowsData.push({
            id: rowId,
            canvasId: canvasId,
            stats: bey.stats,
            system: bey.system.name
        });
    });

    // Animate
    let globalDelay = 0;
    const CARD_DELAY = 250; 
    const ROW_DELAY = 3500;

rowsData.forEach((data) => {
        const row = document.getElementById(data.id);
        
        setTimeout(() => {
            // Dim all OTHER rows and remove their focus
            document.querySelectorAll('.blader-row').forEach(r => {
                if (r.id !== data.id) {
                    r.classList.add('dimmed');
                    r.classList.remove('focused');
                }
            });

            // Highlight the current row
            row.classList.remove("dimmed");
            row.classList.add("visible");
            row.classList.add("focused");
            
            // AUTO SCROLL TO CENTER
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, globalDelay);

        drawMiniChart(data.canvasId, data.stats, data.system);

        const cards = row.querySelectorAll(".card-hidden");
        
        cards.forEach((cardWrapper, i) => {
            setTimeout(() => {
                cardWrapper.classList.remove("card-hidden");
                cardWrapper.classList.add("card-reveal");
            }, globalDelay + (i * CARD_DELAY));
        });

        // Calculate delay for the next row
        globalDelay += (cards.length * CARD_DELAY) + ROW_DELAY;
    });

    // FINAL RESET: Triggers exactly when all animations have finished
    setTimeout(() => {
        document.querySelectorAll('.blader-row').forEach(r => {
            r.classList.remove('dimmed');
            r.classList.remove('focused');
            r.classList.add('visible'); 
        });

// NEW: Wait 1 second (1000ms), then trigger the slow scroll to top
        setTimeout(() => {
            // The '2500' is the duration of the scroll in milliseconds (2.5 seconds)
            // You can increase this number to make the scroll even slower!
            slowScrollToTop(16000);
        }, 1000);

    }, globalDelay);

}
