<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Stats Tracker v13</title>
<style>
:root{
  --bg: #0f1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  
  /* Neon Theme */
  --neon-cyan: #00f0ff; 
  --neon-green: #0aff60;
  
  /* Stats Colors */
  --bar-bg: #2d333b;
  --fill-atk: #DC143C; 
  --fill-def: #4ade80; 
  --fill-sta: #60a5fa; 
  --fill-dash: #ffb570;
  --fill-burst: #8619ec;
  --fill-weight: #e879f9; 
}

body{
  margin:0;
  background: #090c10;
  font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color:var(--text);
  padding:20px;
}

.app{
  max-width:1850px;
  margin:auto;
  background:var(--card);
  border-radius:12px;
  padding:24px;
  border:1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1{ margin-top:0; border-bottom: 1px solid var(--border); padding-bottom: 15px; }

/* INPUT */
.input-section{ display:flex; gap:12px; margin-bottom:20px; }

input[type="text"]{
  flex:1;
  padding:14px;
  border-radius:6px;
  border:1px solid var(--border);
  background:#0d1117;
  color:var(--neon-cyan);
  font-family: monospace;
  font-size: 20px;
}
input[type="text"]:focus{ outline: 1px solid var(--neon-cyan); border-color: var(--neon-cyan); }

button.add-btn{
  padding:0 24px;
  background:var(--neon-cyan);
  border:none;
  border-radius:6px;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* TABLE */
.table-wrapper{ overflow-x:auto; border:1px solid var(--border); border-radius:8px; background: #0d1117; }
table{ width:100%; border-collapse:collapse; min-width: 1300px; }

th{
  background:#161b22;
  text-align:left;
  padding:15px;
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  border-bottom:1px solid var(--border);
}

td{ padding:15px; border-bottom:1px solid var(--border); vertical-align:top; }

/* --- COLUMN 1: BLADER --- */
.avatar-cell {
    width: 250px;
    text-align: center;
    background: #0b0e14;
    border-right: 1px solid var(--border);
}

.avatar-img {
    width: 200px;
    height: auto;
    aspect-ratio: 9/16;
    border: 1px solid var(--border);
    object-fit: cover;
    background: #161b22;
}

.avatar-name {
    color: var(--neon-cyan);
    font-weight: 800;
    font-size: 18px;
    text-transform: uppercase;
    margin-top: 12px;
}

/* --- COLUMN 2: ANALYSIS (SYSTEM ICON TOP LEFT) --- */
.analysis-cell {
    background: #10131a;
    position: relative; /* For absolute positioning of system icon */
}

.system-icon-overlay {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 70px;
    height: 70px;
    object-fit: contain;
    display: block !important;
    z-index: 10;
}

.chart-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 20px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
}

canvas.radar-chart { width: 300px; height: 300px; display: block; }

.combo-name-display {
  color: #fff; font-size: 16px; font-weight: bold; margin-top: 10px; text-align: center;
}

/* Updated Parts List: No Backgrounds/Borders */
.parts-grid-container {
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 20px;
}

.part-card {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 5px;
  /* Removed border and background */
}

.part-img {
  width: 100px;
  height: 100px;
  background: transparent;
  object-fit: contain;
  flex-shrink: 0;
}

.part-details { flex: 1; }
.part-name { 
  font-weight: bold; font-size: 14px; color: var(--neon-cyan); 
  text-transform: uppercase; margin-bottom: 8px;
}

/* Bigger Stats UI */
.stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.stat-label { width: 40px; font-size: 12px; color: var(--muted); font-weight: bold; }
.stat-num { width: 30px; font-size: 12px; color: #fff; text-align: right; font-family: monospace; }
.stat-track { flex: 1; height: 10px; background: var(--bar-bg); border-radius: 5px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 5px; }


/* --- COLUMN 3: RECORDS (Larger Text) --- */
.stats-cell { width: 300px; vertical-align: top; }
.stats-grid { display:flex; flex-direction: column; gap: 10px; }

.stats-row { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 8px; 
}

.stat-btn{
  font-size: 14px; /* UPDATED: 14px text */
  padding: 8px 4px; border-radius: 6px; text-align: center;
  cursor: pointer; user-select: none; border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.02);
  min-height: 55px;
}
.stat-btn:active { transform: scale(0.96); }
.stat-val { font-size: 18px; font-weight: bold; margin-top: 2px; color: #fff; }

/* Colors */
.selfko-win{ border-color: #7c3aed; color: #a78bfa; }
.spin-win{ border-color: #2563eb; color: #60a5fa; }
.over-win{ border-color: #f59e0b; color: #fbbf24; }
.burst-win{ border-color: #dc2626; color: #f87171; }
.extreme-win{ border-color: #16a34a; color: #4ade80; }

.action-group {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.action-btn{
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  text-transform: uppercase;
}
.copy-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
.delete-btn:hover { border-color: #ff0055; color: #ff0055; background: rgba(255,0,85,0.05); }

/* --- LOGGER STYLES --- */
#battleLogger {
    position: fixed;
    bottom: 0px;
    left: 20px;
    width: 250px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    transition: height 0.3s ease;
}

.logger-header {
    background: #1f242c;
    padding: 10px 15px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: bold;
    color: var(--neon-cyan);
}

.logger-body {
    height: 200px; /* Fixed height */
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    background: #0d1117;
    display: flex;
    flex-direction: column-reverse; /* Keeps latest logs at bottom/view */
}

.logger-minimized { height: 40px !important; overflow: hidden; }
.logger-minimized .logger-body { display: none; }

.log-entry {
    padding: 4px 0;
    border-bottom: 1px solid #21262d;
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Style for the Clear Button in the header */
.clear-log-btn {
    font-size: 10px;
    padding: 2px 8px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    transition: all 0.2s ease;
    cursor: pointer;
    z-index: 1001; /* Ensure it stays above the header toggle click area */
}

.clear-log-btn:hover {
    color: #ff0055;
    border-color: #ff0055;
    background: rgba(255, 0, 85, 0.1);
}

/* Ensure the header layout handles the two separate click areas */
.logger-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1f242c;
    padding: 10px 15px;
    border-bottom: 1px solid var(--border);
}

/* --- SCORING SYSTEM STYLES --- */
.score-container {
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
}

.score-display {
    width: 60px;
    background: #0d1117;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    text-align: center;
    font-weight: bold;
    padding: 5px;
    border-radius: 4px;
    font-size: 18px;
}

.score-controls {
    display: flex;
    gap: 5px;
    width: 100%;
}

.score-btn {
    flex: 1;
    cursor: pointer;
    background: #1f242c;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 16px;
}

.score-btn:hover { background: #2d333b; border-color: var(--muted); }

.reset-all-btn {
    width: 100%;
    margin-top: 5px;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid #f87171;
    color: #f87171;
    font-size: 10px;
    padding: 4px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: bold;
}

.reset-all-btn:hover { background: #f87171; color: white; }



</style>
</head>

    blade: masterBlades.flat(),
    ratchet: masterRatchets.flat(),
    bit: masterBits.flat(),
    assist: masterAssist.flat(),
    chip: masterChips.flat()
};

function findPart(type, name) {
    if (!name) return null;
    const cleanName = name.trim().toLowerCase();
    return allParts[type].find(p => 
        p.name.toLowerCase() === cleanName || 
        (p.abbr && p.abbr.toLowerCase() === cleanName)
    );
}

function getSystemColor(system){
    if(!system) return '#ffffff';
    const sys = system.toUpperCase();
    if(sys === 'CX') return '#ef4444';
    if(sys === 'UX') return '#f59e0b';
    if(sys === 'BX') return '#3b82f6';
    return '#ffffff';
}

function safeCopy(text) {
    if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
    } else {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        return new Promise((resolve, reject) => {
            document.execCommand('copy') ? resolve() : reject();
            textArea.remove();
        });
    }
}

/* --- UPDATED: Process Multiple Inputs --- */
function processInput(){
    const input = document.getElementById("jsonInput");
    const rawVal = input.value.trim();
    if(!rawVal) return alert("Please enter JSON");
    
    let dataArray;
    try {
        // Automatically wrap in brackets if user provided comma-separated objects
        dataArray = JSON.parse("[" + rawVal + "]");
    } catch(e) {
        try {
            dataArray = JSON.parse(rawVal);
            if(!Array.isArray(dataArray)) dataArray = [dataArray];
        } catch(e2) {
            return alert("Invalid JSON format.");
        }
    }

    dataArray.forEach(rawData => {
        let data = {};
        Object.keys(rawData).forEach(k => {
            const lowerKey = k.toLowerCase();
            data[lowerKey] = rawData[k];
        });

        if(data['asst']) data['assist'] = data['asst'];

        const parts = [];
        let totalStats = { atk:0, def:0, sta:0, dash:0, burstR:0, weight:0 };
        let mainSystem = data['system'] || null; 

        ['chip','blade','assist','ratchet','bit'].forEach(type => {
            if(data[type]){
                const found = findPart(type, data[type]);
                if(found){
                    parts.push({type: type, ...found});
                    if(!mainSystem && type === 'blade' && found.system) mainSystem = found.system;

                    totalStats.atk += (found.atk || 0);
                    totalStats.def += (found.def || 0);
                    totalStats.sta += (found.sta || 0);
                    totalStats.dash += (found.dash || 0);
                    totalStats.burstR += (found.burstR || 0);
                    totalStats.weight += (found.weight || 0);
                }
            }
        });

        if(parts.length > 0) renderRow(rawData, parts, totalStats, mainSystem);
    });
    
    input.value = "";
}

function renderRow(originalJson, parts, totals, system){

    img.src = originalJson.src || "";

        this.style.display='none'; 
        const fb = document.createElement("div");
        fb.style.cssText = "width:200px; aspect-ratio:9/16; background:#333; display:flex; align-items:center; justify-content:center; color:#555; font-weight:bold; border:1px solid #444;";
        fb.innerText = "NO IMAGE";
        avatarWrapper.insertBefore(fb, this.nextSibling);
    };

    const nameDiv = document.createElement("div");
    nameDiv.className = "avatar-name";
    nameDiv.textContent = originalJson.name || "Unknown";

    const scoreContainer = document.createElement("div");
    scoreContainer.className = "score-container";

    const scoreInput = document.createElement("input");
    scoreInput.type = "text";
    scoreInput.className = "score-display";
    scoreInput.value = 0;
    scoreInput.disabled = true;

    const resetBtn = document.createElement("button");
    resetBtn.className = "reset-all-btn";
    resetBtn.textContent = "Reset All Scores";
    resetBtn.onclick = resetAllScores;

    scoreContainer.appendChild(scoreInput);
    scoreContainer.appendChild(resetBtn);

    avatarWrapper.appendChild(img);
    avatarWrapper.appendChild(nameDiv);
    avatarWrapper.appendChild(scoreContainer); 
    avatarTd.appendChild(avatarWrapper);
    tr.appendChild(avatarTd);

    // --- 2. ANALYSIS COLUMN ---
    const analysisTd = document.createElement("td");
    analysisTd.className = "analysis-cell";
    // ... (rest of analysis logic remains the same)
    if(system){
        const sysImg = document.createElement("img");
        sysImg.className = "system-icon-overlay";
        sysImg.src = `images/system/${system.toUpperCase()}.png`;
        sysImg.onerror = () => sysImg.style.display = 'none';
        analysisTd.appendChild(sysImg);
    }
    const chartSection = document.createElement("div");
    chartSection.className = "chart-section";
    const canvas = document.createElement("canvas");
    canvas.width = 300; canvas.height = 300;
    canvas.className = "radar-chart";
    chartSection.appendChild(canvas);

    const getP = (t) => parts.find(p => p.type === t);
    const pChip = getP('chip'); const pBlade = getP('blade');
    const pAssist = getP('assist'); const pRatchet = getP('ratchet'); const pBit = getP('bit');

    let displayName = "";
    if(pChip) displayName += pChip.name;
    if(pBlade) displayName += pBlade.displayName;
    displayName += " ";
    if(pAssist) displayName += pAssist.displayName.charAt(0);
    if(pRatchet) displayName += pRatchet.name;
    if(pBit) displayName += (pBit.abbr || pBit.name);

    const sysColor = getSystemColor(system);
    const nameDisplay = document.createElement("div");
    nameDisplay.className = "combo-name-display";
    nameDisplay.style.color = sysColor;
    nameDisplay.innerHTML = `${displayName} <br> <span style="color:#8b949e; font-size:11px;">WEIGHT: ${totals.weight.toFixed(1)}g</span>`;
    chartSection.appendChild(nameDisplay);
    analysisTd.appendChild(chartSection);
    setTimeout(() => drawRadarChart(canvas, totals, sysColor), 0);

    const partsGrid = document.createElement("div");
    partsGrid.className = "parts-grid-container";
    parts.forEach(p => {
        const card = document.createElement("div");
        card.className = "part-card";
        let statsHtml = '';
        let namef = p.displayName ? p.displayName : p.name
        const makeRow = (label, val, colorVar) => `<div class="stat-row"><span class="stat-label">${label}</span><span class="stat-num">${val}</span><div class="stat-track"><div class="stat-fill" style="width:${Math.min((val/100)*100, 100)}%; background:var(${colorVar})"></div></div></div>`;
        if(p.atk) statsHtml += makeRow('ATK', p.atk, '--fill-atk');
        if(p.def) statsHtml += makeRow('DEF', p.def, '--fill-def');
        if(p.sta) statsHtml += makeRow('STA', p.sta, '--fill-sta');
        if(p.dash) statsHtml += makeRow('DSH', p.dash, '--fill-dash');
        if(p.burstR) statsHtml += makeRow('BURST', p.burstR, '--fill-burst');
        if(p.weight) statsHtml += makeRow('WGT', p.weight, '--fill-weight');
        card.innerHTML = `<img src="${p.src}" class="part-img" onerror="this.style.background='#333'"><div class="part-details"><div class="part-name">${namef}</div><div>${statsHtml}</div></div>`;
        partsGrid.appendChild(card);
    });
    analysisTd.appendChild(partsGrid);
    tr.appendChild(analysisTd);

    // --- 3. RECORDS & ACTIONS (THE UPDATED LOGIC) ---
    const statsTd = document.createElement("td");
    statsTd.className = "stats-cell";
    const statsGrid = document.createElement("div");
    statsGrid.className = "stats-grid";
    
    const rowStats = {}; 
    const statGroups = [["SelfKOWin","SelfKOLose","SpinWin","SpinLose"], ["OverWin","OverLose","BurstWin","BurstLose"], ["ExtremeWin","ExtremeLose"]];

    // Point Weight Mapping
    const pointWeights = {
        "SpinWin": 1,
        "SelfKOWin": 2,
        "OverWin": 2,
        "BurstWin": 2,
        "ExtremeWin": 3
    };

    statGroups.forEach((group) => {
        const rowDiv = document.createElement("div");
        rowDiv.className = "stats-row";
        group.forEach(key => {
            const savedVal = originalJson[key] || 0;
            rowStats[key] = savedVal;
            const btn = document.createElement("div");
            btn.className = `stat-btn ${key.replace("Win","").replace("Lose","").toLowerCase()}-${key.includes("Win") ? "win" : "lose"}`;
            btn.innerHTML = `<span>${key.replace("Win"," W").replace("Lose"," L")}</span><span class="stat-val">${savedVal}</span>`;
            
            // --- LEFT CLICK: ADD POINT & UPDATE SCORE ---
            btn.onclick = () => { 
                rowStats[key]++; 
                btn.querySelector(".stat-val").textContent = rowStats[key]; 
                
                let logMsg = key.replace("Win"," W").replace("Lose"," L");
                addLog(originalJson.name || "Unknown", logMsg, "+1");

                // Check if this button has a score weight
                if(pointWeights[key]) {
                    let currentScore = parseInt(scoreInput.value);
                    scoreInput.value = currentScore + pointWeights[key];
                    addLog(originalJson.name || "Unknown", "Scoring", `+${pointWeights[key]}`);
                }
            };

            // --- RIGHT CLICK: REDUCE POINT & UPDATE SCORE ---
            btn.oncontextmenu = (e) => { 
                e.preventDefault(); 
                if(rowStats[key] > 0) { 
                    rowStats[key]--; 
                    btn.querySelector(".stat-val").textContent = rowStats[key]; 
                    
                    let logMsg = key.replace("Win"," W").replace("Lose"," L");
                    addLog(originalJson.name || "Unknown", logMsg, "-1");

                    // Deduct from score if applicable
                    if(pointWeights[key]) {
                        let currentScore = parseInt(scoreInput.value);
                        scoreInput.value = Math.max(0, currentScore - pointWeights[key]);
                    }
                }
            };
            rowDiv.appendChild(btn);
        });
        statsGrid.appendChild(rowDiv);
    });

    const actionGroup = document.createElement("div");
    actionGroup.className = "action-group";
    const copyBtn = document.createElement("button");
    copyBtn.className = "action-btn copy-btn";
    copyBtn.innerText = "Copy JSON";
    copyBtn.onclick = () => {
        safeCopy(JSON.stringify({...originalJson, ...rowStats})).then(() => {
            copyBtn.innerText = "COPIED!";
            setTimeout(() => copyBtn.innerText = "COPY JSON", 1000);
        });
    };
    const delBtn = document.createElement("button");
    delBtn.className = "action-btn delete-btn";
    delBtn.innerText = "Remove Entry";
    delBtn.onclick = () => tr.remove();

    actionGroup.appendChild(copyBtn);
    actionGroup.appendChild(delBtn);
    statsGrid.appendChild(actionGroup);
    statsTd.appendChild(statsGrid);
    tr.appendChild(statsTd);

    document.getElementById("tableBody").appendChild(tr);
}

/* --- UPDATED: Show Total Stats on Chart Labels --- */
function drawRadarChart(canvas, stats, color){
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height, cx = w/2, cy = h/2, radius = 90; 
    const axes = [
        {l:"ATK",v:stats.atk}, 
        {l:"DEF",v:stats.def}, 
        {l:"STA",v:stats.sta}, 
        {l:"DSH",v:stats.dash}, 
        {l:"BURST",v:stats.burstR}
    ];
    const angleStep = (Math.PI * 2) / 5, startAngle = -Math.PI / 2; 

    ctx.clearRect(0,0,w,h);
    
    // Grid lines
    ctx.strokeStyle = "#2a2f3a";
    for(let r=1; r<=4; r++){
        ctx.beginPath();
        for(let i=0; i<5; i++){
            const a = startAngle + (i * angleStep), d = (radius / 4) * r;
            ctx.lineTo(cx + Math.cos(a)*d, cy + Math.sin(a)*d);
        }
        ctx.closePath(); ctx.stroke();
    }

    // Text Labels + Values
    for(let i=0; i<5; i++){
        const a = startAngle + (i * angleStep);
        const x = cx + Math.cos(a)*(radius+25);
        const y = cy + Math.sin(a)*(radius+25);
        
        ctx.fillStyle = "#8b949e"; ctx.font = "bold 11px monospace";
        ctx.textAlign = "center";
        // Show Name and Value (e.g., ATK: 85)
        ctx.fillText(`${axes[i].l}: ${axes[i].v}`, x, y);
    }

    // Shape
    ctx.beginPath();
    axes.forEach((ax, i) => {
        const a = startAngle + (i * angleStep), d = (Math.min(ax.v, 100) / 100) * radius;
        i === 0 ? ctx.moveTo(cx + Math.cos(a)*d, cy + Math.sin(a)*d) : ctx.lineTo(cx + Math.cos(a)*d, cy + Math.sin(a)*d);
    });
    ctx.closePath();
    ctx.fillStyle = color + "44"; ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
}

function toggleLogger() {
    const logger = document.getElementById('battleLogger');
    const btn = document.getElementById('loggerToggleBtn');
    logger.classList.toggle('logger-minimized');
    btn.innerText = logger.classList.contains('logger-minimized') ? "+" : "−";
}

function addLog(bladerName, action, value) {
    const content = document.getElementById('logContent');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    // Logic: If value is +1, show green, if -1 show red
    const color = value.includes('+') ? '#4ade80' : '#f87171';
    entry.innerHTML = `${bladerName} <span style="color:var(--neon-cyan)">${action}</span> <span style="color:${color}">${value}</span>`;
    content.appendChild(entry);
    
    // Auto-scroll to bottom
    const body = document.getElementById('loggerBody');
    body.scrollTop = body.scrollHeight;
}

function clearLog() {
    const logContent = document.getElementById('logContent');
    // Clear the inner HTML
    logContent.innerHTML = '';
    
    // Optional: Add a subtle confirmation log
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.style.color = 'var(--muted)';
    entry.style.fontStyle = 'italic';
    entry.innerText = '-- Log Cleared --';
    logContent.appendChild(entry);
}

function resetAllScores() {
    if(confirm("Reset all blader points to 0?")) {
        const scoreInputs = document.querySelectorAll('.score-display');
        scoreInputs.forEach(input => {
            input.value = 0;
        });
        if(typeof addLog === "function") {
            addLog("SYSTEM", "All Scores Reset", "0");
        }
    }
}
