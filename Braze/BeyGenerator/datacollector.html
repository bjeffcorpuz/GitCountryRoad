<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Stats Tracker v15</title>
<script src="data.js"></script>
<style>
:root{
  --bg: #0f1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  
  /* Neon Theme */
  --neon-cyan: #00f0ff; 
  --neon-green: #0aff60;
  
  /* Stats Colors */
  --bar-bg: #2d333b;
  --fill-atk: #DC143C; 
  --fill-def: #4ade80; 
  --fill-sta: #60a5fa; 
  --fill-dash: #ffb570;
  --fill-burst: #8619ec;
  --fill-weight: #e879f9; 
}

body{
  margin:0;
  background: #090c10;
  font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color:var(--text);
  padding:20px;
}

.app{
  max-width:1850px;
  margin:auto;
  background:var(--card);
  border-radius:12px;
  padding:24px;
  border:1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1{ margin-top:0; border-bottom: 1px solid var(--border); padding-bottom: 15px; }

/* INPUT */
.input-section{ display:flex; gap:12px; margin-bottom:20px; }

input[type="text"]{
  flex:1;
  padding:14px;
  border-radius:6px;
  border:1px solid var(--border);
  background:#0d1117;
  color:var(--neon-cyan);
  font-family: monospace;
  font-size: 20px;
}
input[type="text"]:focus{ outline: 1px solid var(--neon-cyan); border-color: var(--neon-cyan); }

button.add-btn{
  padding:0 24px;
  background:var(--neon-cyan);
  border:none;
  border-radius:6px;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* TABLE */
.table-wrapper{ overflow-x:auto; border:1px solid var(--border); border-radius:8px; background: #0d1117; }
table{ width:100%; border-collapse:collapse; min-width: 1300px; }

th{
  background:#161b22;
  text-align:left;
  padding:15px;
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  border-bottom:1px solid var(--border);
}

td{ padding:15px; border-bottom:1px solid var(--border); vertical-align:top; }

/* --- COLUMN 1: BLADER --- */
.avatar-cell {
    width: 250px;
    text-align: center;
    background: #0b0e14;
    border-right: 1px solid var(--border);
}

.avatar-img {
    width: 200px;
    height: auto;
    aspect-ratio: 9/16;
    border: 1px solid var(--border);
    object-fit: cover;
    background: #161b22;
}

.avatar-name {
    color: var(--neon-cyan);
    font-weight: 800;
    font-size: 18px;
    text-transform: uppercase;
    margin-top: 12px;
}

/* --- COLUMN 2: ANALYSIS (SYSTEM ICON TOP LEFT) --- */
.analysis-cell {
    background: #10131a;
    position: relative; /* For absolute positioning of system icon */
}

.system-icon-overlay {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 70px;
    height: 70px;
    object-fit: contain;
    display: block !important;
    z-index: 10;
}

.chart-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 20px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
}

canvas.radar-chart { width: 300px; height: 300px; display: block; }

.combo-name-display {
  color: #fff; font-size: 16px; font-weight: bold; margin-top: 10px; text-align: center;
}

/* Updated Parts List: No Backgrounds/Borders */
.parts-grid-container {
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 20px;
}

.part-card {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 5px;
  /* Removed border and background */
}

.part-img {
  width: 100px;
  height: 100px;
  background: transparent;
  object-fit: contain;
  flex-shrink: 0;
}

.part-details { flex: 1; }
.part-name { 
  font-weight: bold; font-size: 14px; color: var(--neon-cyan); 
  text-transform: uppercase; margin-bottom: 8px;
}

/* Bigger Stats UI */
.stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.stat-label { width: 40px; font-size: 12px; color: var(--muted); font-weight: bold; }
.stat-num { width: 30px; font-size: 12px; color: #fff; text-align: right; font-family: monospace; }
.stat-track { flex: 1; height: 10px; background: var(--bar-bg); border-radius: 5px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 5px; }


/* --- COLUMN 3: RECORDS (Larger Text) --- */
.stats-cell { width: 300px; vertical-align: top; }
.stats-grid { display:flex; flex-direction: column; gap: 10px; }

.stats-row { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 8px; 
}

.stat-btn{
  font-size: 14px; /* UPDATED: 14px text */
  padding: 8px 4px; border-radius: 6px; text-align: center;
  cursor: pointer; user-select: none; border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.02);
  min-height: 55px;
}
.stat-btn:active { transform: scale(0.96); }
.stat-val { font-size: 18px; font-weight: bold; margin-top: 2px; color: #fff; }

/* Colors */
.selfko-win{ border-color: #7c3aed; color: #a78bfa; }
.spin-win{ border-color: #2563eb; color: #60a5fa; }
.over-win{ border-color: #f59e0b; color: #fbbf24; }
.burst-win{ border-color: #dc2626; color: #f87171; }
.extreme-win{ border-color: #16a34a; color: #4ade80; }

.action-group {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.action-btn{
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  text-transform: uppercase;
}
.copy-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
.delete-btn:hover { border-color: #ff0055; color: #ff0055; background: rgba(255,0,85,0.05); }

/* --- LOGGER STYLES --- */
#battleLogger {
    position: fixed;
    bottom: 0px;
    left: 20px;
    width: 250px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    transition: height 0.3s ease;
}

.logger-header {
    background: #1f242c;
    padding: 10px 15px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: bold;
    color: var(--neon-cyan);
}

.logger-body {
    height: 200px; /* Fixed height */
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    background: #0d1117;
    display: flex;
    flex-direction: column-reverse; /* Keeps latest logs at bottom/view */
}

.logger-minimized { height: 40px !important; overflow: hidden; }
.logger-minimized .logger-body { display: none; }

.log-entry {
    padding: 4px 0;
    border-bottom: 1px solid #21262d;
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Style for the Clear Button in the header */
.clear-log-btn {
    font-size: 10px;
    padding: 2px 8px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    transition: all 0.2s ease;
    cursor: pointer;
    z-index: 1001; /* Ensure it stays above the header toggle click area */
}

.clear-log-btn:hover {
    color: #ff0055;
    border-color: #ff0055;
    background: rgba(255, 0, 85, 0.1);
}

/* Ensure the header layout handles the two separate click areas */
.logger-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1f242c;
    padding: 10px 15px;
    border-bottom: 1px solid var(--border);
}

/* --- SCORING SYSTEM STYLES --- */
.score-container {
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
}

.score-display {
    width: 60px;
    background: #0d1117;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    text-align: center;
    font-weight: bold;
    padding: 5px;
    border-radius: 4px;
    font-size: 18px;
}

.score-controls {
    display: flex;
    gap: 5px;
    width: 100%;
}

.score-btn {
    flex: 1;
    cursor: pointer;
    background: #1f242c;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 16px;
}

.score-btn:hover { background: #2d333b; border-color: var(--muted); }

.reset-all-btn {
    width: 100%;
    margin-top: 5px;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid #f87171;
    color: #f87171;
    font-size: 10px;
    padding: 4px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: bold;
}

.reset-all-btn:hover { background: #f87171; color: white; }

/* --- MATCHUP MODAL STYLES --- */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
    display: none; justify-content: center; align-items: center; z-index: 2000;
}
.modal-content {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; width: 95%; max-width: 1400px; max-height: 95vh;
    overflow-y: auto; padding: 20px; position: relative;
}
.modal-header {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;
}
.modal-header h2 { margin: 0; color: var(--neon-cyan); text-transform: uppercase; }
.close-modal-btn {
    background: #ff0055; color: white; border: none; padding: 8px 16px;
    border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;
}
.matchup-selectors {
    display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px;
}
.matchup-selectors select {
    flex: 1; padding: 12px; background: #0d1117; color: var(--neon-cyan);
    border: 1px solid var(--border); border-radius: 6px; font-size: 16px;
    font-weight: bold; outline: none; text-transform: uppercase;
}
.matchup-arena {
    display: flex; gap: 20px; justify-content: space-between;
}
.matchup-player {
    flex: 1; background: #0b0e14; border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; display: flex; flex-direction: column; align-items: center;
}
.matchup-avatar { width: 150px; height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); background: #161b22; }
.matchup-score-display {
    font-size: 48px; font-weight: 900; color: var(--neon-green);
    margin: 10px 0; font-family: monospace; text-shadow: 0 0 10px rgba(10, 255, 96, 0.3);
}
.matchup-controls-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; margin-top: 15px;
}
.matchup-btn {
    padding: 10px; font-weight: bold; font-size: 14px; text-align: center;
    cursor: pointer; border-radius: 6px; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); color: white; transition: 0.1s;
}
.matchup-btn:active { transform: scale(0.95); }
.matchup-btn.win-row { border-bottom-width: 3px; }
.matchup-btn.loss-row { border-top-width: 3px; opacity: 0.8; }
.win-spin { border-color: #2563eb; color: #60a5fa; }
.win-over { border-color: #f59e0b; color: #fbbf24; }
.win-burst { border-color: #dc2626; color: #f87171; }
.win-extreme { border-color: #16a34a; color: #4ade80; }

/* --- MATCHUP SCORE ALERT ANIMATION --- */
@keyframes matchPointAlert {
    0% { color: #ff0055; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; transform: scale(1); }
    50% { color: #ffeb3b; text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffeb3b; transform: scale(1.15); }
    100% { color: #ff0055; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; transform: scale(1); }
}

.score-alert-anim {
    animation: matchPointAlert 0.8s infinite alternate !important;
    transition: all 0.2s ease-in-out;
}

/* --- MATCHUP ROUND COUNTER --- */
.matchup-round-counter {
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    color: #ffb570; /* Using your dash fill color for a nice orange accent */
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(255, 181, 112, 0.4);
}

/* --- RESTORE MODAL STYLES --- */
.restore-item {
    display: flex; justify-content: space-between; align-items: center;
    background: #0d1117; padding: 12px 15px; border: 1px solid var(--border);
    border-radius: 6px;
}
.restore-item div { display: flex; flex-direction: column; gap: 4px; }

/* --- GLOBAL SUMMARY DASHBOARD --- */
.global-summary { display: flex; gap: 15px; margin-bottom: 20px; }
.summary-card { 
    flex: 1; background: #0d1117; border: 1px solid var(--border); 
    border-radius: 8px; padding: 15px; text-align: center; 
}
.summary-card.spin-card { border-bottom: 3px solid #2563eb; }
.summary-card.over-card { border-bottom: 3px solid #f59e0b; }
.summary-card.burst-card { border-bottom: 3px solid #dc2626; }
.summary-card.extreme-card { border-bottom: 3px solid #16a34a; }

.summary-title { font-weight: bold; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-size: 13px; margin-bottom: 8px; }
.summary-stats { font-size: 15px; font-weight: bold; color: #fff; }
.summary-stats span { color: var(--neon-cyan); font-family: monospace; font-size: 18px; }

/* --- SCROLL TO TOP BUTTON --- */
.scroll-top-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: var(--neon-cyan);
    color: #000;
    border: none;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 240, 255, 0.4);
    display: none; /* Hidden by default at the top */
    justify-content: center;
    align-items: center;
    z-index: 1500; /* Stays above the table but below modals */
    transition: transform 0.2s ease, background 0.2s ease;
}

.scroll-top-btn:hover {
    transform: scale(1.1);
    background: #fff;
}

.scroll-top-btn:active {
    transform: scale(0.95);
}

</style>
</head>
<body>

<div class="app">
  <h1>Battle Stats Tracker v15</h1>

    <!-- GLOBAL SUMMARY DASHBOARD -->
  <div class="global-summary">
      <div class="summary-card spin-card">
          <div class="summary-title">SPIN WINS</div>
          <div class="summary-stats">Total: <span id="gs-total-spin">0</span> | Unique: <span id="gs-unique-spin">0</span></div>
      </div>
      <div class="summary-card over-card">

      <div class="summary-card burst-card">
          <div class="summary-title">BURST WINS</div>
          <div class="summary-stats">Total: <span id="gs-total-burst">0</span> | Unique: <span id="gs-unique-burst">0</span></div>
      </div>
      <div class="summary-card extreme-card">
          <div class="summary-title">XTREME WINS</div>
          <div class="summary-stats">Total: <span id="gs-total-extreme">0</span> | Unique: <span id="gs-unique-extreme">0</span></div>
      </div>
  </div>
  
  <div class="input-section">
    <input type="text" id="jsonInput" 
      placeholder='{"name":"Ruddy","src":"avatars/Ruddy.png","chip":"Pegasus","blade":"Might","ratchet":"6-80","bit":"UN"}'>
    <button class="add-btn" onclick="processInput()">+ Add Combo</button>
    <button class="add-btn" style="background: var(--neon-green);" onclick="openMatchupModal()">Matchup</button>

  </div>

  <div class="table-wrapper">

      <thead>
        <tr>
          <th>Blader</th>
          <th>Analysis & Equipment</th>

        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div id="battleLogger" class="logger-minimized">
    <div class="logger-header">
        <div style="cursor: pointer; flex: 1;" onclick="toggleLogger()">
            <span>Battle Log</span>
            <span id="loggerToggleBtn">+</span>
        </div>
        <span class="clear-log-btn" onclick="clearLog()">CLEAR</span>
    </div>
    <div id="loggerBody" class="logger-body">
        <div id="logContent"></div>
    </div>
</div>

<div id="matchupModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Matchup Arena</h2>
            <div style="display: flex; gap: 10px;">
                <button class="add-btn" style="background: var(--neon-green); color: black; font-weight: bold;" onclick="saveAndDeclare()">SAVE & DECLARE</button>
                <button class="close-modal-btn" onclick="closeMatchupModal()">CLOSE</button>
            </div>
        </div>
        
        <div class="matchup-selectors">
            <select id="p1Select" onchange="loadMatchupPlayer(1)"><option value="">-- Select Player 1 --</option></select>
            <select id="p2Select" onchange="loadMatchupPlayer(2)"><option value="">-- Select Player 2 --</option></select>

        <div class="matchup-arena" id="matchupArena" style="display:none;">

            <div class="matchup-player" id="matchupP2"></div>

</div>

<div id="restoreModal" class="modal-overlay">

        <div class="modal-header">
            <h2>Archive / Restore</h2>
            <button class="close-modal-btn" onclick="closeRestoreModal()">CLOSE</button>
        </div>
        <div id="restoreListContainer" style="display: flex; flex-direction: column; gap: 10px;">
            </div>
    </div>
</div>

<!-- SCROLL TO TOP BUTTON -->
<button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()">▲</button>

<script>
const allParts = {
    blade: masterBlades.flat(),
    ratchet: masterRatchets.flat(),
    bit: masterBits.flat(),
    assist: masterAssist.flat(),
    chip: masterChips.flat(),
    metalblade: typeof masterMetalBlade !== 'undefined' ? masterMetalBlade.flat() : []
};

function findPart(type, name) {
    if (!name) return null;
    const cleanName = name.trim().toLowerCase();
    return allParts[type].find(p => 
        p.name.toLowerCase() === cleanName || 
        (p.abbr && p.abbr.toLowerCase() === cleanName)
    );
}

function getSystemColor(system){
    if(!system) return '#ffffff';
    const sys = system.toUpperCase();
    if(sys === 'CX') return '#ef4444';
    if(sys === 'UX') return '#f59e0b';
    if(sys === 'BX') return '#3b82f6';
    return '#ffffff';
}

function safeCopy(text) {
    if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
    } else {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        return new Promise((resolve, reject) => {
            document.execCommand('copy') ? resolve() : reject();
            textArea.remove();
        });
    }
}

/* --- GLOBAL SUMMARY LOGIC --- */
/* --- GLOBAL SUMMARY LOGIC --- */
function updateGlobalSummary() {
    let totals = { spin:0, over:0, burst:0, extreme:0 };
    let uniques = { spin:0, over:0, burst:0, extreme:0 };

    // Helper function to tally stats from any given row
    const processRowStats = (tr) => {
        if (tr.rowStats) {
            totals.spin += tr.rowStats['SpinWin'] || 0;
            totals.over += tr.rowStats['OverWin'] || 0;
            totals.burst += tr.rowStats['BurstWin'] || 0;
            totals.extreme += tr.rowStats['ExtremeWin'] || 0;

            uniques.spin += tr.rowStats['UniqueSpinWin'] || 0;
            uniques.over += tr.rowStats['UniqueOverWin'] || 0;
            uniques.burst += tr.rowStats['UniqueBurstWin'] || 0;
            uniques.extreme += tr.rowStats['UniqueExtremeWin'] || 0;
        }
    };

    // 1. Tally stats from all ACTIVE players currently on the main table
    document.querySelectorAll('#tableBody tr').forEach(processRowStats);

    // 2. Tally stats from all REMOVED players in the archive (Keeps scores retained!)
    if (typeof archivedEntries !== 'undefined') {
        archivedEntries.forEach(entry => processRowStats(entry.rowElement));
    }

    // Update the dashboard UI
    document.getElementById('gs-total-spin').innerText = totals.spin;
    document.getElementById('gs-unique-spin').innerText = uniques.spin;
    
    document.getElementById('gs-total-over').innerText = totals.over;
    document.getElementById('gs-unique-over').innerText = uniques.over;
    
    document.getElementById('gs-total-burst').innerText = totals.burst;
    document.getElementById('gs-unique-burst').innerText = uniques.burst;
    
    document.getElementById('gs-total-extreme').innerText = totals.extreme;

function processInput(){
    const input = document.getElementById("jsonInput");
    const rawVal = input.value.trim();
    if(!rawVal) return alert("Please enter JSON");
    
    let dataArray;
    try {
        dataArray = JSON.parse("[" + rawVal + "]");
    } catch(e) {
        try {
            dataArray = JSON.parse(rawVal);
            if(!Array.isArray(dataArray)) dataArray = [dataArray];
        } catch(e2) {
            return alert("Invalid JSON format.");
        }
    }

    dataArray.forEach(rawData => {
        let data = {};
        Object.keys(rawData).forEach(k => {
            const lowerKey = k.toLowerCase();
            data[lowerKey] = rawData[k];
        });

        if(data['asst']) data['assist'] = data['asst'];

        const parts = [];
        let totalStats = { atk:0, def:0, sta:0, dash:0, burstR:0, weight:0 };
        let mainSystem = data['system'] || null; 

        ['chip','blade','metalblade','assist','ratchet','bit'].forEach(type => {
            if(data[type]){
                const found = findPart(type, data[type]);
                if(found){
                    parts.push({type: type, ...found});
                    if(!mainSystem && type === 'blade' && found.system) mainSystem = found.system;

                    totalStats.atk += (found.atk || 0);
                    totalStats.def += (found.def || 0);
                    totalStats.sta += (found.sta || 0);
                    totalStats.dash += (found.dash || 0);
                    totalStats.burstR += (found.burstR || 0);
                    totalStats.weight += (found.weight || 0);
                }
            }
        });

        if(parts.length > 0) renderRow(rawData, parts, totalStats, mainSystem);
    });
    
    input.value = "";
}

function drawRadarChart(canvas, stats, color){
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height, cx = w/2, cy = h/2, radius = 90; 
    const axes = [ {l:"ATK",v:stats.atk}, {l:"DEF",v:stats.def}, {l:"STA",v:stats.sta}, {l:"DSH",v:stats.dash}, {l:"BURST",v:stats.burstR} ];
    const angleStep = (Math.PI * 2) / 5, startAngle = -Math.PI / 2; 

    ctx.clearRect(0,0,w,h);
    
    ctx.strokeStyle = "#2a2f3a";
    for(let r=1; r<=4; r++){
        ctx.beginPath();
        for(let i=0; i<5; i++){
            const a = startAngle + (i * angleStep), d = (radius / 4) * r;
            ctx.lineTo(cx + Math.cos(a)*d, cy + Math.sin(a)*d);
        }
        ctx.closePath(); ctx.stroke();
    }

    for(let i=0; i<5; i++){
        const a = startAngle + (i * angleStep);
        const x = cx + Math.cos(a)*(radius+25);
        const y = cy + Math.sin(a)*(radius+25);
        ctx.fillStyle = "#8b949e"; ctx.font = "bold 11px monospace";
        ctx.textAlign = "center";
        ctx.fillText(`${axes[i].l}: ${axes[i].v}`, x, y);
    }

    ctx.beginPath();
    axes.forEach((ax, i) => {
        const a = startAngle + (i * angleStep), d = (Math.min(ax.v, 100) / 100) * radius;
        i === 0 ? ctx.moveTo(cx + Math.cos(a)*d, cy + Math.sin(a)*d) : ctx.lineTo(cx + Math.cos(a)*d, cy + Math.sin(a)*d);
    });
    ctx.closePath();
    ctx.fillStyle = color + "44"; ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
}

function handleMatchupAction(event, actingPlayerNum, type, isWin) {
    if (event && event.button !== 0 && event.button !== 2) return;
    const isRightClick = event && event.button === 2;
    const oppNum = actingPlayerNum === 1 ? 2 : 1;
    
    let points = 0;
    if (type === 'Spin') points = 1;
    if (type === 'Over' || type === 'Burst') points = 2;
    if (type === 'Extreme') points = 3;

    const actingStatKey = type.toLowerCase() + (isWin ? 'W' : 'L');
    
    if (isWin) {
        const oppStatKey = type.toLowerCase() + 'L';
        if (isRightClick) {
            if (matchupState[`p${actingPlayerNum}Stats`][actingStatKey] > 0) {
                matchupState[`p${actingPlayerNum}Stats`][actingStatKey]--;
                matchupState[`p${actingPlayerNum}Score`] -= points;
                matchupState[`p${oppNum}Stats`][oppStatKey]--;
                matchupState.currentRound = Math.max(1, matchupState.currentRound - 1);
            }
        } else {
            matchupState[`p${actingPlayerNum}Stats`][actingStatKey]++;
            matchupState[`p${actingPlayerNum}Score`] += points;
            matchupState[`p${oppNum}Stats`][oppStatKey]++;
            matchupState.currentRound++;
        }
    } else {
        handleMatchupAction(event, oppNum, type, true); 
        return; 
    }
    
    updateMatchupUI();
}

            document.getElementById(`m-extremeL-${pNum}`).innerText = stats.extremeL;
        }
    });
}

function triggerMainTableClick(pNum, buttonTextMatch) {
    const pData = matchupState[`p${pNum}`];
    if (!pData || !pData.originalRow) return;
    
    const buttons = pData.originalRow.querySelectorAll('.stat-btn');
    buttons.forEach(btn => {
        if (btn.innerText.toUpperCase().includes(buttonTextMatch.toUpperCase())) {
            btn.click(); 
        }
    });
}

function copyMatchupJson(pNum) {
    const pData = matchupState[`p${pNum}`];
    if(pData && pData.originalRow) {
        const copyBtn = pData.originalRow.querySelector('.copy-btn');
        if(copyBtn) copyBtn.click();
    }
}

/* --- ARCHIVE & RESTORE LOGIC --- */
let archivedEntries = [];

function archiveEntry(btn) {
    const row = btn.closest('tr');
    const name = row.querySelector('.avatar-name').innerText;
    const comboName = row.querySelector('.combo-name-display').innerText;
    
    archivedEntries.push({ name: name, comboName: comboName, rowElement: row });
    row.remove();
    updateGlobalSummary(); // UPDATE SUMMARY
}

function openRestoreModal() {
    if (archivedEntries.length === 0) {
        alert("No deleted entries to restore!");
        return;
    }
    document.getElementById('restoreModal').style.display = 'flex';
    populateRestoreList();
}

function closeRestoreModal() {
    document.getElementById('restoreModal').style.display = 'none';
}

function populateRestoreList() {
    const container = document.getElementById('restoreListContainer');
    container.innerHTML = '';
    
    archivedEntries.forEach((entry, index) => {
        const div = document.createElement('div');
        div.className = 'restore-item';
        div.innerHTML = `
            <div>
                <strong style="color:var(--neon-cyan)">${entry.name}</strong>
                <span style="color:var(--muted); font-size:12px;">${entry.comboName}</span>
            </div>
            <button class="add-btn" style="padding: 8px 15px; font-size:12px; background: #e879f9;" onclick="restoreEntry(${index})">RESTORE</button>
        `;
        container.appendChild(div);
    });
}

function restoreEntry(index) {
    const entry = archivedEntries[index];
    document.getElementById('tableBody').appendChild(entry.rowElement);
    archivedEntries.splice(index, 1);
    populateRestoreList();
    if (archivedEntries.length === 0) { closeRestoreModal(); }
    updateGlobalSummary(); // UPDATE SUMMARY
}

function saveAndDeclare() {
    const p1Score = matchupState.p1Score;
    const p2Score = matchupState.p2Score;

    if (p1Score === p2Score) {
        alert("The match is tied! Both players will retain their current stats. Break the tie before declaring a winner.");
        return;
    }

    saveMatchupStats();

    let winnerNum = p1Score > p2Score ? 1 : 2;
    let loserNum = p1Score > p2Score ? 2 : 1;
    
    const winnerRow = matchupState[`p${winnerNum}`].originalRow;
    const loserData = matchupState[`p${loserNum}`];
    
    if (loserData && loserData.originalRow) {
        const deleteBtn = loserData.originalRow.querySelector('.delete-btn');
        if (deleteBtn) deleteBtn.click(); 
    }

    populateMatchupDropdowns(); 
    let newWinnerIndex = loadedPlayers.findIndex(p => p.originalRow === winnerRow);
    
    document.getElementById(`p${winnerNum}Select`).value = newWinnerIndex !== -1 ? newWinnerIndex : "";
    document.getElementById(`p${loserNum}Select`).value = "";
    
    loadMatchupPlayer(1);
    loadMatchupPlayer(2);
}

/* --- SCROLL TO TOP LOGIC --- */
window.onscroll = function() {
    const scrollBtn = document.getElementById("scrollTopBtn");
    // Show the button if the user scrolls down more than 300 pixels
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        scrollBtn.style.display = "flex";
    } else {
        scrollBtn.style.display = "none";
    }
};

function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: 'smooth' /* This gives it that nice gliding animation */
    });
}
