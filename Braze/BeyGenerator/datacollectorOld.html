<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Stats Tracker v9</title>
<style>
:root{
  --bg: #0f1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  
  /* Neon Theme */
  --neon-cyan: #00f0ff; 
  --neon-green: #0aff60;
  
  /* Stats Colors */
  --bar-bg: #2d333b;
  --fill-atk: #0aff60;
  --fill-def: #0aff60;
  --fill-sta: #0aff60;
  --fill-weight: #00f0ff; 
}

body{
  margin:0;
  background: #090c10;
  font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color:var(--text);
  padding:20px;
}

.app{
  max-width:1800px;
  margin:auto;
  background:var(--card);
  border-radius:12px;
  padding:24px;
  border:1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1{ margin-top:0; border-bottom: 1px solid var(--border); padding-bottom: 15px; }

/* INPUT */
.input-section{ display:flex; gap:12px; margin-bottom:20px; }

input[type="text"]{
  flex:1;
  padding:14px;
  border-radius:6px;
  border:1px solid var(--border);
  background:#0d1117;
  color:var(--neon-cyan);
  font-family: monospace;
  font-size: 14px;
}
input[type="text"]:focus{ outline: 1px solid var(--neon-cyan); border-color: var(--neon-cyan); }

button.add-btn{
  padding:0 24px;
  background:var(--neon-cyan);
  border:none;
  border-radius:6px;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
}
button.add-btn:hover { box-shadow: 0 0 10px var(--neon-cyan); }

/* TABLE */
.table-wrapper{ overflow-x:auto; border:1px solid var(--border); border-radius:8px; background: #0d1117; }
table{ width:100%; border-collapse:collapse; min-width: 1200px; }

th{
  background:#161b22;
  text-align:left;
  padding:15px;
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  border-bottom:1px solid var(--border);
  letter-spacing: 1px;
}

td{ padding:15px; border-bottom:1px solid var(--border); vertical-align:top; }

/* 1. CHART COLUMN */
.chart-cell { width: 330px; text-align: center; background: #0b0e14; vertical-align: middle; }
canvas.radar-chart { width: 300px; height: 300px; margin: auto; display: block; }

.combo-name-display {
  color: #fff; 
  font-size: 16px; 
  font-weight: bold; 
  margin-top: 15px; 
  letter-spacing: 0.5px;
}
.total-weight-label {
  color: var(--muted); font-size:12px; font-weight:normal; display: block; margin-top: 4px;
}

/* 2. PARTS COLUMN (Grid 2 per row) */
.parts-cell { min-width: 500px; padding: 15px; }

.parts-grid-container {
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 10px;
}

.part-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #12151c;
  border: 1px solid #2a2f3a;
  border-left: 3px solid var(--neon-cyan);
  padding: 10px;
  border-radius: 6px;
  min-width: 200px;
}

.part-img {
  width: 45px;
  height: 45px;
  background: #000;
  border-radius: 50%;
  border: 1px solid var(--border);
  object-fit: contain;
  flex-shrink: 0;
}

.part-details { flex: 1; }
.part-name { 
  font-weight: bold; font-size: 13px; color: var(--neon-cyan); 
  text-transform: uppercase; margin-bottom: 4px;
}

/* Stat Rows */
.stat-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
.stat-label { width: 35px; font-size: 9px; color: var(--muted); font-weight: bold; }
.stat-num { width: 25px; font-size: 10px; color: #fff; text-align: right; font-family: monospace; }
.stat-track { flex: 1; height: 3px; background: var(--bar-bg); border-radius: 2px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 2px; }

/* 3. RECORDS COLUMN */
.stats-cell { width: 240px; vertical-align: middle; }
.stats-grid { display:flex; flex-direction: column; gap: 10px; }

.stats-row { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 8px; 
}

.stat-btn{
  font-size:10px; padding:8px 4px; border-radius:6px; text-align:center;
  cursor:pointer; user-select:none; border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.02);
  transition: all 0.1s;
  min-height: 50px;
}
.stat-btn:active { transform: scale(0.98); }
.stat-val { font-size: 14px; font-weight: bold; margin-top: 4px; color: #fff; }

/* BUTTON COLORS */
.selfko-win{ border-color: #7c3aed; box-shadow: inset 0 0 10px rgba(124, 58, 237, 0.2); }
.selfko-lose{ border-color: #4c1d95; opacity: 0.7; }
.spin-win{ border-color: #2563eb; box-shadow: inset 0 0 10px rgba(37, 99, 235, 0.2); }
.spin-lose{ border-color: #1e3a8a; opacity: 0.7; }
.over-win{ border-color: #f59e0b; box-shadow: inset 0 0 10px rgba(245, 158, 11, 0.2); }
.over-lose{ border-color: #92400e; opacity: 0.7; }
.burst-win{ border-color: #dc2626; box-shadow: inset 0 0 10px rgba(220, 38, 38, 0.2); }
.burst-lose{ border-color: #7f1d1d; opacity: 0.7; }
.extreme-win{ border-color: #16a34a; box-shadow: inset 0 0 10px rgba(22, 163, 74, 0.2); }
.extreme-lose{ border-color: #14532d; opacity: 0.7; }

/* ACTIONS */
.action-cell { width: 90px; vertical-align: middle; }
.action-btn{
  display: block; width: 100%; margin-bottom: 8px;
  padding: 8px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text); cursor: pointer; font-size: 11px;
}
.action-btn:hover { background: var(--card); border-color: var(--neon-cyan); color: var(--neon-cyan); }
.delete-btn:hover { border-color: #ff0055; color: #ff0055; }

</style>
</head>

function findPart(type, name) {
    if (!name) return null;
    const cleanName = name.trim().toLowerCase();
    return allParts[type].find(p => 
        p.name.toLowerCase() === cleanName || 
        (p.abbr && p.abbr.toLowerCase() === cleanName)
    );
}

function getSystemColor(system){
    if(!system) return '#ffffff';
    const sys = system.toUpperCase();
    if(sys === 'CX') return '#ef4444';
    if(sys === 'UX') return '#f59e0b';
    if(sys === 'BX') return '#3b82f6';
    return '#ffffff';
}

// --- SAFE COPY FUNCTION ---
function safeCopy(text) {
    if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
    } else {
        // Fallback for local files
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        return new Promise((resolve, reject) => {
            document.execCommand('copy') ? resolve() : reject();
            textArea.remove();
        });
    }
}

function processInput(){
    const input = document.getElementById("jsonInput");

    catch(e){ return alert("Invalid JSON"); }

    let data = {};
    Object.keys(rawData).forEach(k => {
        const lowerKey = k.toLowerCase();
        data[lowerKey] = rawData[k];
    });

    if(data['asst']) data['assist'] = data['asst'];

    const parts = [];
    let totalStats = { atk:0, def:0, sta:0, dash:0, burstR:0, weight:0 };
    let mainSystem = null;

        if(data[type]){
            const found = findPart(type, data[type]);
            if(found){
                parts.push({type: type, ...found});
                if(type === 'blade' && found.system) mainSystem = found.system;

                totalStats.atk += (found.atk || 0);
                totalStats.def += (found.def || 0);
                totalStats.sta += (found.sta || 0);
                totalStats.dash += (found.dash || 0);
                totalStats.burstR += (found.burstR || 0);
                totalStats.weight += (found.weight || 0);
            }
        }
    });

    if(parts.length === 0) return alert("No parts found.");
    
    renderRow(rawData, parts, totalStats, mainSystem);
    input.value = "";
}

function renderRow(originalJson, parts, totals, system){
    const tr = document.createElement("tr");

    // 1. CHART
    const chartTd = document.createElement("td");
    chartTd.className = "chart-cell";
    
    const canvas = document.createElement("canvas");
    canvas.width = 300; 
    canvas.height = 300;
    canvas.className = "radar-chart";
    chartTd.appendChild(canvas);
    
    // Naming Logic
    const getP = (t) => parts.find(p => p.type === t);
    const pChip = getP('chip');
    const pBlade = getP('blade');
    const pAssist = getP('assist');
    const pRatchet = getP('ratchet');
    const pBit = getP('bit');

    let displayName = "";
    if(pChip) displayName += pChip.name;
    if(pBlade) displayName += pBlade.name;
    displayName += " ";
    if(pAssist) displayName += pAssist.name.charAt(0);
    if(pRatchet) displayName += pRatchet.name;
    if(pBit) displayName += (pBit.abbr || pBit.name);

    if(displayName.trim() === "") displayName = "Unknown Combo";
    const sysColor = getSystemColor(system);

    const nameDisplay = document.createElement("div");
    nameDisplay.className = "combo-name-display";
    nameDisplay.style.color = sysColor;
    nameDisplay.innerHTML = `
        ${displayName}
        <span class="total-weight-label">TOTAL WEIGHT: ${totals.weight.toFixed(1)}g(Approx.)</span>
    `;
    chartTd.appendChild(nameDisplay);
    tr.appendChild(chartTd);

    setTimeout(() => drawRadarChart(canvas, totals, sysColor), 0);

    // 2. PARTS
    const partsTd = document.createElement("td");
    partsTd.className = "parts-cell";
    const partsGrid = document.createElement("div");
    partsGrid.className = "parts-grid-container";
    
    parts.forEach(p => {
        const card = document.createElement("div");
        card.className = "part-card";
        
        let statsHtml = '';
        const maxVal = 80; 
        const makeRow = (label, val, colorVar) => `
            <div class="stat-row">
                <span class="stat-label">${label}</span>
                <span class="stat-num">${val}</span>
                <div class="stat-track">
                    <div class="stat-fill" style="width:${Math.min((val/maxVal)*100, 100)}%; background:var(${colorVar})"></div>
                </div>
            </div>`;

        if(p.atk) statsHtml += makeRow('ATK', p.atk, '--fill-atk');
        if(p.def) statsHtml += makeRow('DEF', p.def, '--fill-def');
        if(p.sta) statsHtml += makeRow('STA', p.sta, '--fill-sta');
        if(p.weight) statsHtml += makeRow('WGT', p.weight, '--fill-weight');

        card.innerHTML = `
            <img src="${p.src}" class="part-img" onerror="this.style.background='#333'">
            <div class="part-details">
                <div class="part-name">${p.name}</div>
                <div>${statsHtml}</div>
            </div>
        `;
        partsGrid.appendChild(card);
    });
    partsTd.appendChild(partsGrid);
    tr.appendChild(partsTd);

    // 3. STATS (Logic + Storage)
    const statsTd = document.createElement("td");
    statsTd.className = "stats-cell";
    const statsGrid = document.createElement("div");
    statsGrid.className = "stats-grid";
    
    // Object to track live stats for this row
    const rowStats = {}; 

    const statGroups = [
      ["SelfKOWin","SelfKOLose","SpinWin","SpinLose"],
      ["OverWin","OverLose","BurstWin","BurstLose"],
      ["ExtremeWin","ExtremeLose"]
    ];

    statGroups.forEach((group) => {
        const rowDiv = document.createElement("div");
        rowDiv.className = "stats-row";
        group.forEach(key => {
            // Initialize count
            rowStats[key] = 0;

            const btn = document.createElement("div");
            const type = key.replace("Win","").replace("Lose","").toLowerCase();
            const res = key.includes("Win") ? "win" : "lose";
            
            btn.className = `stat-btn ${type}-${res}`;
            const label = key.replace("Win"," W").replace("Lose"," L");
            btn.innerHTML = `<span>${label}</span><span class="stat-val">0</span>`;
            
            const updateVal = (newVal) => {
                rowStats[key] = newVal;
                btn.querySelector(".stat-val").textContent = newVal;
            };

            btn.onclick = (e) => { 
                e.preventDefault(); 
                updateVal(rowStats[key] + 1); 
            };
            btn.oncontextmenu = (e) => { 
                e.preventDefault(); 
                if(rowStats[key] > 0) updateVal(rowStats[key] - 1); 
            };
            
            rowDiv.appendChild(btn);
        });
        statsGrid.appendChild(rowDiv);
    });
    statsTd.appendChild(statsGrid);
    tr.appendChild(statsTd);

    // 4. ACTION (Copy Logic)
    const actionTd = document.createElement("td");
    actionTd.className = "action-cell";
    
    const copyBtn = document.createElement("button");
    copyBtn.className = "action-btn";
    copyBtn.innerHTML = "Copy JSON";
    
    copyBtn.onclick = () => { 
        // Merge Original Data + Current Stats
        const finalData = { ...originalJson, ...rowStats };
        const jsonString = JSON.stringify(finalData);

        safeCopy(jsonString)
            .then(() => {
                copyBtn.textContent = "Copied!";
                copyBtn.style.borderColor = "var(--neon-green)";
                setTimeout(()=> {
                    copyBtn.textContent = "Copy JSON";
                    copyBtn.style.borderColor = "var(--border)";
                }, 1000);
            })
            .catch(() => alert("Copy failed. Browser restricted?"));
    };
    
    const delBtn = document.createElement("button");
    delBtn.className = "action-btn delete-btn";
    delBtn.innerHTML = "Remove";
    delBtn.onclick = () => tr.remove();

    actionTd.appendChild(copyBtn);
    actionTd.appendChild(delBtn);
    tr.appendChild(actionTd);

    document.getElementById("tableBody").appendChild(tr);
}

// Chart
function drawRadarChart(canvas, stats, color){
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    const cx = w/2;
    const cy = h/2;
    const radius = 100; 
    
    const axes = [
        {label:"ATK", val: stats.atk},
        {label:"DEF", val: stats.def},
        {label:"STA", val: stats.sta},
        {label:"DASH", val: stats.dash},
        {label:"BURST", val: stats.burstR}
    ];
    
    const maxVal = 100; 
    const angleStep = (Math.PI * 2) / 5;
    const startAngle = -Math.PI / 2; 

    ctx.clearRect(0,0,w,h);

    // Grid
    ctx.strokeStyle = "#2a2f3a";
    ctx.lineWidth = 1;
    for(let r=1; r<=4; r++){
        ctx.beginPath();
        for(let i=0; i<5; i++){
            const angle = startAngle + (i * angleStep);
            const dist = (radius / 4) * r;
            ctx.lineTo(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist);
        }
        ctx.closePath();
        ctx.stroke();
    }

    // Labels
    ctx.fillStyle = "#fff";
    ctx.font = "bold 11px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    
    for(let i=0; i<5; i++){
        const angle = startAngle + (i * angleStep);
        ctx.beginPath();
        ctx.strokeStyle = "#333";
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle)*radius, cy + Math.sin(angle)*radius);
        ctx.stroke();
        
        const labelDist = radius + 25;
        const lx = cx + Math.cos(angle)*labelDist;
        const ly = cy + Math.sin(angle)*labelDist;
        
        ctx.fillStyle = "#8b949e";
        ctx.fillText(`${axes[i].label} (${axes[i].val})`, lx, ly);
    }

    // Shape
    ctx.beginPath();
    for(let i=0; i<5; i++){
        const angle = startAngle + (i * angleStep);
        const val = Math.min(axes[i].val, maxVal);
        const dist = (val / maxVal) * radius;
        if(i===0) ctx.moveTo(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist);
        else ctx.lineTo(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist);
    }
    ctx.closePath();
    
    const hex2rgba = (hex, alpha = 1) => {
        const [r, g, b] = hex.match(/\w\w/g).map(x => parseInt(x, 16));
        return `rgba(${r},${g},${b},${alpha})`;
    };

    ctx.fillStyle = hex2rgba(color, 0.25);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.fill();
    ctx.stroke();
    
    // Points
    ctx.fillStyle = "#ffffff";
    for(let i=0; i<5; i++){
        const angle = startAngle + (i * angleStep);
        const val = Math.min(axes[i].val, maxVal);
        const dist = (val / maxVal) * radius;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist, 3, 0, Math.PI*2);
        ctx.fill();
    }
}
