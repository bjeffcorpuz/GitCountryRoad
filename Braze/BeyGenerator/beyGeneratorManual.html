body{
  margin:0;

  background:radial-gradient(circle at top,#0c0c10,#1b1b2f);
  color:white;
}

h1{
  text-align:center;
  padding:20px;
  margin:0;
  text-shadow:0 0 10px #00f;
}

.layout{
  display:grid;
  grid-template-columns:1fr 1.5fr 1fr;
  gap:20px;
  padding:20px;
}

.column{
  background:rgba(0,0,0,0.3);
  padding:15px;
  border-radius:12px;
}

.dropdown{
  position:relative;
  margin-bottom:20px;
}

.dropdown button{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  text-align:left;
}

.dropdown.disabled button{
  background:#444;
  cursor:not-allowed;
}

.dropdown-content{
  display:none;
  position:absolute;
  width:100%;
  background:#111;
  border-radius:6px;
  max-height:250px;
  overflow:auto;
  z-index:5;
  padding:5px;
}

.dropdown-content input{
  width:100%;
  padding:6px;
  margin-bottom:5px;
  border:none;
  border-radius:4px;
}

.dropdown-content div{
  padding:6px;
  cursor:pointer;
}

.dropdown-content div:hover{
  background:#222;
}

.part{
  display:flex;
  gap:15px;
  margin-bottom:20px;
  padding:10px;
  background:#111;
  border-radius:10px;
}

.part img{
  width:120px;
  height:120px;
  object-fit:contain;
}

.stats{
  flex:1;
  font-size:13px;
}

.stat-row{
  margin-bottom:6px;
}

.bar-bg{
  background:#2a2a2a;
  height:6px;
  border-radius:4px;
  overflow:hidden;
}

.bar-fill{
  height:100%;
  background:linear-gradient(90deg,#6dd5fa,#00c6ff);
}

canvas{
  display:block;
  margin:auto;
}

#totalWeight{
  text-align:center;
  font-size:18px;
  margin-top:15px;
  color:#6dd5fa;
}

#beyName{
  margin-top:15px;
  text-align:center;
  font-size:20px;
  font-weight:600;
  color:#66ccff;
  letter-spacing:1px;
}

.downloadBtn {
  display: block;
  margin: 15px auto 0 auto;
  padding: 10px 20px;
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(90deg, #6dd5fa, #00c6ff);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  text-shadow: 0 0 5px #000;
  transition: all 0.2s ease;
}

.downloadBtn:hover {
  background: linear-gradient(90deg, #00c6ff, #6dd5fa);
  transform: scale(1.05);
}

.dropdown button {
  width: 100%;
  padding: 10px 15px;
  border-radius: 8px;
  border: 2px solid #00c6ff;
  background: linear-gradient(145deg, #111, #1b1b2f);
  color: #66ccff;
  font-weight: bold;
  text-align: left;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
}

.dropdown button::after {
  content: '▼';
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: #66ccff;
  transition: transform 0.25s ease;
}

.dropdown button.active::after {
  transform: translateY(-50%) rotate(180deg);
}

.dropdown-content {
  display: none;
  position: absolute;
  width: 100%;
  background: #0c0c10;
  border-radius: 8px;
  max-height: 250px;
  overflow-y: auto;
  box-shadow: 0 8px 16px rgba(0,0,0,0.6);
  padding: 5px 0;
  z-index: 10;
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.dropdown-content.show {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

.dropdown-content input {
  width: 90%;
  margin: 0 auto 8px auto;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #00c6ff;
  background: #111;
  color: #66ccff;
  display: block;
}

.dropdown-content div {
  padding: 8px 12px;
  cursor: pointer;
  color: #fff;
  transition: background 0.2s ease;
}

.dropdown-content div:hover {
  background: #00c6ff22;
}

</style>
</head>

/* ===== UTIL ===== */

function flattenArray(arr){
  return arr.flatMap(item => Array.isArray(item)?item:[item]);
}

/* ===== STATE ===== */

let selected={blade:null,assist:null,ratchet:null,bit:null};

/* ===== DISPLAY ===== */


function createPart(part){
  if(!part) return "";

  const baseStats = ["atk","def","sta"];
  const extraStats = ["dash","burstR"];
  
  // Start with base stats
  let statsToShow = baseStats.slice();

  // Add extra stats if they exist
  statsToShow = statsToShow.concat(extraStats.filter(stat => part[stat] !== undefined));

  // Finally, always add weight at the end
  statsToShow.push("weight");

  return `
  <div class="part">
    <img src="${part.src}">
    <div class="stats">
      <strong>${part.name}</strong>
      ${statsToShow.map(s=>`
      <div class="stat-row">
        ${s.toUpperCase()}: ${part[s] || 0}
        <div class="bar-bg">
          <div class="bar-fill" style="width:${Math.min(part[s] || 0,100)}%"></div>
        </div>
      </div>`).join("")}
    </div>
  </div>`;
}

/* ===== MAIN UPDATE ===== */

function updateAll(){

  const displayColumn = document.getElementById("displayColumn");
  const totalWeightDiv = document.getElementById("totalWeight");

  displayColumn.innerHTML="";

  if(selected.blade) displayColumn.innerHTML+=createPart(selected.blade);
  if(selected.assist) displayColumn.innerHTML+=createPart(selected.assist);
  if(selected.ratchet) displayColumn.innerHTML+=createPart(selected.ratchet);
  if(selected.bit) displayColumn.innerHTML+=createPart(selected.bit);

  // weight handled here ONLY
  let weightTotal = 0;
  Object.values(selected).forEach(p=>{
    if(p) weightTotal += p.weight || 0;
  });

  totalWeightDiv.textContent = "Total Weight: "+weightTotal.toFixed(1)+"g";

  updateSpiderChart();
  updateBeyName();
}

/* ===== NAME FUNCTION ===== */

function updateBeyName(){

  const nameDiv = document.getElementById("beyName");

  if(!selected.blade || !selected.ratchet){
    nameDiv.textContent="";
    return;
  }

  let name = selected.blade.name + " ";

  if(selected.assist){
    name += selected.assist.name.charAt(0);
  }

  name += selected.ratchet.name;

  if(selected.bit){
    name += selected.bit.abbr;
  }

  nameDiv.textContent=name;
}

/* ===== RADAR CHART ===== */

let spiderChart;

function updateSpiderChart(){

  const parts = Object.values(selected);

  const stats={
    atk:0,def:0,sta:0,dash:0,burstR:0
  };

  parts.forEach(p=>{
    if(p){
      stats.atk+=p.atk||0;
      stats.def+=p.def||0;
      stats.sta+=p.sta||0;
      stats.dash+=p.dash||0;
      stats.burstR+=p.burstR||0;
    }
  });

  const labels=[
    `ATK (${stats.atk})`,
    `DEF (${stats.def})`,
    `STA (${stats.sta})`,
    `DASH (${stats.dash})`,
    `BURST R (${stats.burstR})`
  ];

  const config={
    type:'radar',
    data:{
      labels:labels,
      datasets:[{
        data:Object.values(stats),
        fill:true,
        backgroundColor:'rgba(102,204,255,0.35)',
        borderColor:'#66ccff',
        borderWidth:2,
        pointBackgroundColor:'#66ccff'
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{
        r:{
          beginAtZero:true,
          max:150,
          grid:{color:'rgba(255,255,255,0.4)',circular:false},
          angleLines:{color:'rgba(255,255,255,0.7)'},
          pointLabels:{color:'#fff'},
          ticks:{display:false,stepSize:30}
        }
      }
    }
  };

  if(spiderChart) spiderChart.destroy();

  const ctx=document.getElementById("spiderChart").getContext("2d");
  spiderChart=new Chart(ctx,config);
}

    const itemsDiv = container.querySelector(".items");

        itemsDiv.innerHTML = "";
        dataArray
            .filter(item => item.name.toLowerCase().includes(filter.toLowerCase()))
            .forEach(item => {
                const div = document.createElement("div");
                div.textContent = item.name;
                div.onclick = () => {
                    selected[type] = item;
                    button.textContent = item.name;
                    content.classList.remove("show");
                    button.classList.remove("active");

                    handleDependencies(type);
                    updateAll();
                };
                itemsDiv.appendChild(div);
            });
    }

    populateList();

    // Fancy dropdown toggle must stay here
button.onclick = () => {
    if(container.classList.contains("disabled")) return;

    const isVisible = content.classList.contains("show");
    
    // Close other dropdowns if needed
    document.querySelectorAll('.dropdown-content.show').forEach(dc => {
        if(dc !== content) {
            dc.classList.remove('show');
            dc.previousElementSibling.classList.remove('active');
        }
    });

    content.classList.toggle("show", !isVisible);
    button.classList.toggle("active", !isVisible);
};
    searchInput.oninput = e => populateList(e.target.value);

    document.addEventListener("click", e => {
        if(!container.contains(e.target)){
            content.classList.remove("show");
            button.classList.remove("active");
        }
    });
}

/* ===== DEPENDENCY LOGIC ===== */

function handleDependencies(type){

  const assistDropdown=document.getElementById("assistDropdown");
  const bitDropdown=document.getElementById("bitDropdown");

  // Assist depends on blade
  if(type==="blade"){
    selected.assist=null;
    if(selected.blade && selected.blade.astBlade==="Yes"){
      assistDropdown.classList.remove("disabled");
    }else{
      assistDropdown.classList.add("disabled");
    }
  }

  // Bit depends on ratchet
  if(type==="ratchet"){
    selected.bit=null;
    if(selected.ratchet && selected.ratchet.bit==="Yes"){
      bitDropdown.classList.remove("disabled");
    }else{
      bitDropdown.classList.add("disabled");
    }
  }
}

document.getElementById("downloadBtn").addEventListener("click", function () {
    const target = document.getElementById("downloadArea");
    const nameElement = document.getElementById("beyName");

    // Get name text
    let fileName = nameElement.textContent.trim() || "Beyblade";
    fileName = fileName.replace(/\s+/g, "_");

    // Calculate scale to make width exactly 450px
    const targetWidth = 450;
    const scale = targetWidth / target.offsetWidth;

    html2canvas(target, {
        backgroundColor: null,
        scale: scale
    }).then(canvas => {
        const link = document.createElement("a");
        link.download = fileName + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
});


document.getElementById("downloadPartsBtn").addEventListener("click", function() {
    const target = document.getElementById("displayColumn"); // column 2
    const nameElement = document.getElementById("beyName");

    let fileName = nameElement.textContent.trim() || "Beyblade";
    fileName = fileName.replace(/\s+/g, "_") + "_parts";

    html2canvas(target, {
        backgroundColor: null,
        scale: 2,
        useCORS: true // important for images
    }).then(canvas => {
        const link = document.createElement("a");
        link.download = fileName + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }).catch(err => console.error(err));
});
