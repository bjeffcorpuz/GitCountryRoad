<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyblade Builder Multi</title>

<style>
/* ================= GLOBAL THEME ================= */
:root {
  --neon-blue: #00f3ff;
  --neon-green: #00ff41;
  --neon-pink: #ff0055;
  --bg-dark: #0a0a12;
  --panel-bg: rgba(20, 20, 35, 0.85); /* Slightly more opaque for grouping */
  --border-color: rgba(0, 243, 255, 0.3);
}

body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(circle at center top, #1a1a2e, #000);
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden; 
  padding-bottom: 100px; /* Space for add button */
}

/* ================= TITLE ANIMATION ================= */
h1 {
  text-align: center;
  padding: 30px 0;
  margin: 0;
  font-size: 3rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: #fff;
  position: relative;
  animation: lightning 3s infinite alternate;
}

@keyframes lightning {
  0%, 18%, 22%, 25%, 53%, 57%, 100% {
    text-shadow: 0 0 4px #fff, 0 0 10px #fff, 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
    opacity: 1;
  }
  20%, 24%, 55% { text-shadow: none; opacity: 0.6; }
}

/* ================= BUILD ROW CONTAINER (THE GROUP) ================= */
#builders-list {
  max-width: 1600px;
  margin: 0 auto;
  padding: 0 20px;
}

.build-row {
  position: relative;
  background: rgba(255, 255, 255, 0.03);
  border: 2px solid var(--border-color);
  border-radius: 20px;
  margin-bottom: 50px;
  padding: 20px;
  box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
  animation: fadeIn 0.5s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.row-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.row-title {
  font-size: 1.5rem;
  font-weight: bold;
  color: var(--neon-blue);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.delete-row-btn {
  background: transparent;
  border: 1px solid var(--neon-pink);
  color: var(--neon-pink);
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
}

.delete-row-btn:hover {
  background: var(--neon-pink);
  color: white;
  box-shadow: 0 0 15px var(--neon-pink);
}

/* ================= 3-COLUMN LAYOUT (Inside Row) ================= */
.layout {
  display: grid;
  grid-template-columns: 350px 1fr 400px;
  gap: 25px;
  align-items: start;
}

.column {
  background: var(--panel-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  min-width: 0; 
}

/* System Logo */
.systemLogo {
  display: none;
  width: 100%;
  max-width: 220px;
  height: auto;
  object-fit: contain;
  margin: 0 auto 25px auto;
  filter: drop-shadow(0 0 10px var(--neon-blue));
}

/* ================= DROPDOWNS ================= */
.dropdown {
  position: relative;
  margin-bottom: 15px;
  z-index: 10;
  transition: z-index 0s linear 0.2s;
}

.dropdown.is-open {
  z-index: 1000;
  transition: z-index 0s;
}

.dropdown.disabled {
  opacity: 0.4;
  pointer-events: none;
  filter: grayscale(1);
}

.dropdown button {
  width: 100%;
  padding: 14px 20px;
  border-radius: 8px;
  border: 1px solid var(--neon-blue);
  background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(0,0,0,0.4));
  color: #fff;
  font-weight: 600;
  font-size: 1rem;
  text-align: left;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}

.dropdown button:hover {
  background: rgba(0, 243, 255, 0.2);
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
}

.dropdown button::after {
  content: '▼';
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.8rem;
  color: var(--neon-blue);
  transition: transform 0.3s;
}

.dropdown button.active::after {
  transform: translateY(-50%) rotate(180deg);
}

.dropdown-content {
  display: none;
  position: absolute;
  top: 110%;
  left: 0;
  width: 100%; 
  min-width: 300px;
  background: #0c0c10; 
  border: 1px solid var(--neon-blue);
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 10px 40px rgba(0,0,0,1);
  z-index: 100;
}

.dropdown-content.show {
  display: block;
  animation: slideDown 0.2s ease-out;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.dropdown-content input {
  width: 100%;
  box-sizing: border-box;
  margin-bottom: 10px;
  padding: 10px;
  background: #1f1f2e; 
  border: 1px solid #444;
  color: #fff;
  border-radius: 6px;
  outline: none;
}

.dropdown-content input:focus { border-color: var(--neon-blue); }

.items-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  max-height: 300px;
  overflow-y: auto;
}

.items-grid::-webkit-scrollbar { width: 6px; }
.items-grid::-webkit-scrollbar-track { background: #111; }
.items-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

.grid-item {
  background: #1a1a24;
  border-radius: 8px;
  padding: 6px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #333;
  transition: all 0.2s;
}

.grid-item:hover { background: #2a2a34; border-color: #fff; }
.grid-item.selected {
  border-color: var(--neon-blue);
  background: #1a3a4a;
  box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
}

.grid-item img {
  width: 100%;
  height: 60px;
  object-fit: contain;
  display: block;
  margin-bottom: 5px;
}

.grid-item span {
  font-size: 0.75rem;
  color: #ddd;
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ================= PARTS DISPLAY ================= */
.displayColumnContainer {
  overflow-y: auto;
  max-height: 80vh; 
}

.part {
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(0,0,0,0.4);
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 12px;
  border-left: 4px solid var(--neon-blue);
  transition: transform 0.2s;
}

.part:hover {
  transform: translateX(5px);
  background: rgba(0,0,0,0.6);
}

.part img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
}

.stats { flex: 1; }
.stats strong {
  display: block;
  font-size: 1.2rem;
  color: var(--neon-blue);
  margin-bottom: 8px;
  text-transform: uppercase;
}

.stat-row {
  display: flex;
  align-items: center;
  margin-bottom: 4px;
  font-size: 0.85rem;
  color: #aaa;
}

.bar-bg {
  flex: 1;
  background: #222;
  height: 6px;
  border-radius: 3px;
  margin-left: 10px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
}

/* ================= RIGHT COLUMN (Stats) ================= */
.downloadArea {
  background: #000;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  border: 1px solid #333;
}

.chart-wrapper {
  position: relative;
  height: 350px; 
  width: 100%;
  margin: 0 auto;
}

.beyName {
  margin-top: 15px;
  font-size: 1.5rem;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 10px var(--neon-blue);
  letter-spacing: 1px;
  min-height: 1.5em; 
}

.totalWeight {
  color: #888;
  font-size: 0.9rem;
  margin-top: 5px;
  text-transform: uppercase;
}

/* ================= ACTION BUTTONS ================= */
button.downloadBtn {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  font-size: 1rem;
  font-weight: bold;
  text-transform: uppercase;
  color: #000;
  background: var(--neon-blue);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
  transition: all 0.2s;
}

button.downloadBtn:hover {
  background: #fff;
  box-shadow: 0 0 25px rgba(0, 243, 255, 0.8);
  transform: scale(1.02);
}

/* MAIN ADD BUTTON */
#addBuildBtn {
  display: block;
  width: 300px;
  margin: 40px auto;
  padding: 20px;
  font-size: 1.2rem;
  font-weight: 900;
  text-transform: uppercase;
  background: linear-gradient(135deg, #00ff41, #008f11);
  color: #fff;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}

#addBuildBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0, 255, 65, 0.6);
}

/* ================= MOBILE RESPONSIVE ================= */
@media (max-width: 1100px) {
  .layout {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
  }
  .column:nth-child(3) { grid-column: span 2; }
}

@media (max-width: 768px) {
  .layout {
    grid-template-columns: 1fr;
    padding: 0;
  }
  .column:nth-child(3) { grid-column: span 1; }
  .items-grid { grid-template-columns: repeat(4, 1fr); }
  h1 { font-size: 2rem; }
}
</style>
</head>

/* =========================================================================
   CLASS: BeyBuilder (Logic for ONE Row)
   ========================================================================= */
let builderCount = 0;

class BeyBuilder {
    constructor() {
        this.id = ++builderCount;
        this.selected = {chip:null, blade:null, assist:null, ratchet:null, bit:null};
        this.chartInstance = null;
        
        this.initDOM();
        this.initLogic();
    }

    // 1. CREATE HTML STRUCTURE
    initDOM() {
        const wrapper = document.createElement('div');
        wrapper.className = 'build-row';
        wrapper.innerHTML = `
            <div class="row-header">
                <div class="row-title">Build #${this.id}</div>
                <button class="delete-row-btn">DELETE ROW</button>
            </div>
            
            <div class="layout">
                <div class="column">
                    <img class="systemLogo" src="" alt="System Logo">
                    <div class="dropdown" data-type="blade"></div>
                    <div class="dropdown disabled" data-type="chip"></div>
                    <div class="dropdown disabled" data-type="assist"></div>
                    <div class="dropdown" data-type="ratchet"></div>
                    <div class="dropdown" data-type="bit"></div>
                    <button class="resetBtn" style="width:100%; margin-top:auto; padding:12px; background:transparent; border:1px solid #ff4444; color:#ff4444; border-radius:8px; cursor:pointer; font-weight:bold;">RESET BUILD</button>
                </div>

                <div class="column displayColumnContainer">
                    <div class="displayColumn"></div>
                    <button class="downloadBtn dl-parts">Download Parts List</button>
                </div>

                <div class="column">
                    <div class="downloadArea">
                        <div class="chart-wrapper">
                            <canvas></canvas>
                        </div>
                        <div class="beyName"></div>
                        <div class="totalWeight"></div>
                    </div>
                    <button class="downloadBtn dl-card">Download Graph Card</button>
                </div>
            </div>
        `;

        document.getElementById('builders-list').appendChild(wrapper);
        this.el = wrapper;
        
        // Element Refs scoped to this row
        this.els = {
            logo: wrapper.querySelector('.systemLogo'),
            display: wrapper.querySelector('.displayColumn'),
            weight: wrapper.querySelector('.totalWeight'),
            name: wrapper.querySelector('.beyName'),
            canvas: wrapper.querySelector('canvas'),
            downloadArea: wrapper.querySelector('.downloadArea'),
            dropdowns: {
                blade: wrapper.querySelector('.dropdown[data-type="blade"]'),
                chip: wrapper.querySelector('.dropdown[data-type="chip"]'),
                assist: wrapper.querySelector('.dropdown[data-type="assist"]'),
                ratchet: wrapper.querySelector('.dropdown[data-type="ratchet"]'),
                bit: wrapper.querySelector('.dropdown[data-type="bit"]'),
            }
        };

        // Bind Buttons
        wrapper.querySelector('.delete-row-btn').onclick = () => this.destroy();
        wrapper.querySelector('.resetBtn').onclick = () => this.reset();
        
        wrapper.querySelector('.dl-card').onclick = () => this.downloadImage(this.els.downloadArea);
        wrapper.querySelector('.dl-parts').onclick = () => this.downloadImage(wrapper.querySelector('.displayColumnContainer'), true);
    }

    // 2. SETUP DROPDOWNS & CHART
    initLogic() {
        this.createDropdown(this.els.dropdowns.blade, "Select Main Blade", blades, "blade");
        this.createDropdown(this.els.dropdowns.chip, "Select Lock Chip", chips, "chip");
        this.createDropdown(this.els.dropdowns.assist, "Select Assist Blade", assist, "assist");
        this.createDropdown(this.els.dropdowns.ratchet, "Select Ratchet", ratchets, "ratchet");
        this.createDropdown(this.els.dropdowns.bit, "Select Bit", bits, "bit");

        this.updateChart();
    }

    destroy() {
        if(this.chartInstance) this.chartInstance.destroy();
        this.el.remove();
    }

    reset() {
        this.selected = {chip:null, blade:null, assist:null, ratchet:null, bit:null};
        
        this.els.logo.style.display = "none";
        this.els.display.innerHTML = "";
        this.els.weight.textContent = "";
        this.els.name.textContent = "";

        // Reset Dropdown States
        Object.entries(this.els.dropdowns).forEach(([key, d]) => {
            d.classList.remove("disabled", "is-open");
            const btn = d.querySelector("button");
            // Set Default Text
            const labels = {
                blade: "Select Main Blade", chip: "Select Lock Chip",
                assist: "Select Assist Blade", ratchet: "Select Ratchet", bit: "Select Bit"
            };
            btn.textContent = labels[key];
        });

        // Lock dependents
        this.els.dropdowns.chip.classList.add("disabled");
        this.els.dropdowns.assist.classList.add("disabled");

        // Reset Data Source for Ratchets
        const rDrop = this.els.dropdowns.ratchet;
        rDrop.currentData = ratchets;
        rDrop.updateList(ratchets);

        this.updateChart();
    }

    // 3. DROPDOWN CREATION (Scoped)
    createDropdown(container, label, dataArray, type) {
        // Init UI
        container.innerHTML = `
            <button>${label}</button>
            <div class="dropdown-content">
                <input type="text" placeholder="Search...">
                <div class="items-grid"></div>
            </div>
        `;
        
        const button = container.querySelector("button");
        const content = container.querySelector(".dropdown-content");
        const grid = container.querySelector(".items-grid");
        const input = container.querySelector("input");

        // Dynamic List Function
        container.updateList = (newData) => {
            grid.innerHTML = "";
            if(!newData.length) {
                grid.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:10px;color:#666;'>No items</div>";
                return;
            }
            newData.sort((a,b)=>a.name.localeCompare(b.name)).forEach(item => {
                const div = document.createElement("div");
                div.className = "grid-item";
                if(this.selected[type] === item) div.classList.add("selected");
                div.innerHTML = `<img src="${item.src}" loading="lazy"><span>${item.displayName || item.name}</span>`;
                
                div.onclick = () => {
                    this.selected[type] = item;
                    button.textContent = (item.displayName || item.name);
                    this.closeDropdown(container);
                    this.handleDependencies(type);
                    this.updateAll();
                };
                grid.appendChild(div);
            });
        };

        // Initial populate
        container.updateList(dataArray);

        // Toggle Logic
        button.onclick = (e) => {
            e.stopPropagation();
            if(container.classList.contains("disabled")) return;
            
            const isOpen = container.classList.contains("is-open");
            
            // Close all dropdowns in THIS row first
            Object.values(this.els.dropdowns).forEach(d => this.closeDropdown(d));

            if(!isOpen) {
                container.classList.add("is-open");
                content.classList.add("show");
                button.classList.add("active");
                // Reset list if filtered
                container.updateList(container.currentData || dataArray);
            }
        };

        input.oninput = (e) => {
            const filter = e.target.value.toLowerCase();
            const source = container.currentData || dataArray;
            const filtered = source.filter(i => i.name.toLowerCase().includes(filter));
            container.updateList(filtered);
        };
        
        // Global click to close is handled via document listener at bottom
    }

    closeDropdown(container) {
        container.classList.remove("is-open");
        container.querySelector(".dropdown-content").classList.remove("show");
        container.querySelector("button").classList.remove("active");
    }

    // 4. DEPENDENCY LOGIC
    handleDependencies(type) {
        if(type === 'blade' && this.selected.blade) {
            const sys = this.selected.blade.system;
            this.els.logo.src = `images/system/${sys.toLowerCase()}.png`;
            this.els.logo.style.display = 'block';

            // CX Logic
            if(sys === "CX") {
                this.els.dropdowns.chip.classList.remove("disabled");
                this.els.dropdowns.assist.classList.remove("disabled");
            } else {
                this.els.dropdowns.chip.classList.add("disabled");
                this.els.dropdowns.assist.classList.add("disabled");
                this.selected.chip = null;
                this.selected.assist = null;
                this.els.dropdowns.chip.querySelector("button").textContent = "Select Lock Chip";
                this.els.dropdowns.assist.querySelector("button").textContent = "Select Assist Blade";
            }

            // Ratchet Filter (Core)
            let validRatchets = ratchets;
            if(this.selected.blade.core === "Round") validRatchets = ratchets.filter(r => r.core === "R");
            
            const rDrop = this.els.dropdowns.ratchet;
            rDrop.currentData = validRatchets;
            rDrop.updateList(validRatchets);

            // Reset Ratchet if invalid
            if(this.selected.ratchet && !validRatchets.includes(this.selected.ratchet)) {
                this.selected.ratchet = null;
                rDrop.querySelector("button").textContent = "Select Ratchet";
                this.selected.bit = null;
                this.els.dropdowns.bit.querySelector("button").textContent = "Select Bit";
            }
        }

        if(type === 'ratchet') {
            const bDrop = this.els.dropdowns.bit;
            bDrop.classList.remove("disabled");
            if(this.selected.ratchet && this.selected.ratchet.bit === "No") {
                bDrop.classList.add("disabled");
                this.selected.bit = null;
                bDrop.querySelector("button").textContent = "Select Bit";
            }
        }
    }

    // 5. UPDATE UI
    updateAll() {
        this.els.display.innerHTML = "";
        
        // Order: Chip, Blade, Assist, Ratchet, Bit
        const order = ['chip', 'blade', 'assist', 'ratchet', 'bit'];
        order.forEach(k => {
            if(this.selected[k]) this.els.display.innerHTML += this.createPartHTML(this.selected[k]);
        });

        // Weight
        let w = 0;
        Object.values(this.selected).forEach(p => { if(p) w += p.weight || 0; });
        this.els.weight.textContent = w > 0 ? `TOTAL WEIGHT: ${w.toFixed(1)}g (approx.)` : "";

        // Name
        let n = "";
        if(this.selected.blade && this.selected.ratchet) {
            if(this.selected.chip) n += this.selected.chip.name;
            n += (this.selected.blade.displayName || this.selected.blade.name) + " ";
            if(this.selected.assist) n += this.selected.assist.name.charAt(0);
            n += this.selected.ratchet.name;
            if(this.selected.bit) n += this.selected.bit.abbr;
        }
        this.els.name.textContent = n;

        this.updateChart();
    }

    createPartHTML(part) {
        const stats = ["atk","def","sta","dash","burstR"];
        let statRows = "";
        stats.forEach(s => {
            if(part[s] !== undefined) {
                statRows += `
                <div class="stat-row">
                    <span style="width:70px;">${s.toUpperCase()}</span>
                    <span>${part[s]}</span>
                    <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(part[s],100)}%"></div></div>
                </div>`;
            }
        });
        statRows += `
        <div class="stat-row">
            <span style="width:70px;">WEIGHT</span>
            <span>${part.weight}g</span>
            <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(part.weight*2,100)}%"></div></div>
        </div>`;

        return `
        <div class="part">
            <img src="${part.src}">
            <div class="stats">
                <strong>${part.displayName || part.name}</strong>
                ${statRows}
            </div>
        </div>`;
    }

    updateChart() {
        const stats = {atk:0, def:0, sta:0, dash:0, burstR:0};
        Object.values(this.selected).forEach(p => {
            if(p) {
                stats.atk += p.atk || 0;
                stats.def += p.def || 0;
                stats.sta += p.sta || 0;
                stats.dash += p.dash || 0;
                stats.burstR += p.burstR || 0;
            }
        });

        let color = '#00f3ff';
        if(this.selected.blade && this.selected.blade.system === "UX") color = '#ffaa00';
        if(this.selected.blade && this.selected.blade.system === "CX") color = '#ff0044';

        if(this.chartInstance) this.chartInstance.destroy();

        this.chartInstance = new Chart(this.els.canvas, {
            type: 'radar',
            data: {
                labels: [`ATK (${stats.atk})`, `DEF (${stats.def})`, `STA (${stats.sta})`, `DASH (${stats.dash})`, `BURST (${stats.burstR})`],
                datasets: [{
                    data: Object.values(stats),
                    backgroundColor: color + '40',
                    borderColor: color,
                    borderWidth: 2,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: color
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: {display:false} },
                scales: {
                    r: {
                        beginAtZero: true, max: 150,
                        grid: { color: 'rgba(255,255,255,0.8)', circular: false },
                        angleLines: { color: 'rgba(255,255,255,0.8)' },
                        pointLabels: { color: '#fff', font: {size:11, weight:'bold'} },
                        ticks: { display: false, stepSize: 30 }
                    }
                }
            }
        });
    }

    downloadImage(element, isPartList = false) {
        let name = this.els.name.textContent.trim() || "Beyblade";
        if(isPartList) name += "_parts";
        name = name.replace(/\s+/g, "_");

        html2canvas(element, { backgroundColor: null, scale: 2 }).then(canvas => {
            const link = document.createElement("a");
            link.download = name + ".png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
}

/* ================= APP INIT ================= */
const builders = [];

function addBuilder() {
    const builder = new BeyBuilder();
    builders.push(builder);
}

document.getElementById('addBuildBtn').onclick = addBuilder;

// Global listener to close dropdowns if clicking outside
document.addEventListener('click', (e) => {
    if(!e.target.closest('.dropdown')) {
        document.querySelectorAll('.dropdown.is-open').forEach(d => {
            d.classList.remove('is-open');
            d.querySelector('.dropdown-content').classList.remove('show');
            d.querySelector('button').classList.remove('active');
        });
    }
});

// Start with 1 builder
addBuilder();
