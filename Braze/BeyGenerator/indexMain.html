<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyblade X</title>

<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: radial-gradient(circle at top, #0c0c10, #1b1b2f);
  margin: 0;
  padding: 0;
  color: #fff;
  text-align: center;
  overflow-x: hidden;
}

.container {
  max-width: 1400px;
  width: 100%;
  margin: auto;
  padding: 30px 20px;
}

h2 {
  font-size: 2.2rem;
  margin-bottom: 10px;
  text-shadow: 0 0 10px #00f;
}

.arrow {
  width: 0;
  height: 0;
  margin: 15px auto 0px;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-top: 30px solid #ff0044;
  filter: drop-shadow(0 0 10px #ff0044);
  animation: pulse 1.2s infinite alternate;
}

@keyframes pulse {
  0% { transform: translateY(0); }
  100% { transform: translateY(-8px); }
}

/* GRID */

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  margin-top: 20px;
}

.cell {
  background: rgba(0,0,0,0.25);
  padding: 12px;
  border-radius: 14px;
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
  overflow: hidden;
}

@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}

/* ROULETTE */

.roulette-wrapper {
  overflow: hidden;
  background: #111;
  padding: 20px 0;
}

.roulette-label {
  margin-bottom: 10px;
  font-weight: bold;
  font-size: 1.2rem;
  text-shadow: 0 0 5px #0ff;
}

.roulette {
  display: flex;
  gap: 15px;
  will-change: transform;
}

/* CARD */

.card {
  width: 220px;
  height: 300px;
  flex-shrink: 0;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: 0.6s;
}

.card.flip .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #0ff;
  border-radius: 12px;
}

.front {
  background: #222;
  font-size: 4.5rem;
}

.back {
  background: #000;
  transform: rotateY(180deg);
  padding: 8px;
}

.back img {
  width: 100%;
  height: 110px;
  object-fit: contain;
  margin-top: 6px;
}

/* STATS */

.stats-box {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  text-align: left;
  font-size: 0.75rem;
}

.part-name {
  text-align: center;
  font-weight: bold;
  font-size: 0.9rem;
  margin-bottom: 6px;
  color: #6dd5fa;
}

.stat-row { margin-bottom: 5px; }
.stat-label { width: 55px; display: inline-block; }
.stat-value { width: 30px; display: inline-block; text-align: right; }

.bar-bg {
  width: 100%;
  height: 7px;
  background: #2a2a2a;
  border-radius: 5px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: linear-gradient(90deg,#6dd5fa,#00c6ff);
}

/* BUTTON */

button {
  margin-top: 30px;
  width: 320px;
  padding: 16px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #ff0055, #ff9900);
  color: white;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
}

#downloadBtn{
  margin-top: 1500px;
}

#downloadArea{
  max-width: 500px;
  width: 100%;
  margin:0 auto;
}
</style>
</head>

/* ================= HELPERS ================= */

function createCard(){
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <div class="inner">
      <div class="front">?</div>
      <div class="back"></div>
    </div>`;
  return card;
}

function buildCards(c){
  c.roulette.innerHTML="";
  for(let i=0;i<CARD_COUNT*2;i++) c.roulette.appendChild(createCard());
}

[...containers, assistContainer].forEach(buildCards);

function resolveAndRemove(arr){
  if(!arr.length) return null;
  const i=Math.floor(Math.random()*arr.length);
  const raw=arr.splice(i,1)[0];
  return Array.isArray(raw) ? raw[Math.floor(Math.random()*raw.length)] : raw;
}

function getClosestCard(wrapper){
  const cards=[...wrapper.querySelectorAll(".card")];
  const center=wrapper.getBoundingClientRect().left + wrapper.offsetWidth/2;
  let best=null, dist=Infinity;
  cards.forEach(card=>{
    const r=card.getBoundingClientRect();
    const d=Math.abs(center-(r.left+r.width/2));
    if(d<dist){ dist=d; best=card; }
  });
  return best;
}

/* ================= STATS ================= */

function createStatsHTML(item, label){
  let stats = ["atk","def","sta"];

  // 🟢 Bits always show full stats
  if(label === "Bits"){
    stats = ["atk","def","sta","dash","burstR"];
  }

  // 🟢 Ratchets with bit === "No" also show dash + burstR
  if(label === "Ratchets" && item.bit === "No"){
    stats = ["atk","def","sta","dash","burstR"];
  }

  return `
    <div class="stats-box">
      <div class="part-name">${item.name}</div>
      ${stats.map(s => `
        <div class="stat-row">
          <span class="stat-label">${s.toUpperCase()}</span>
          <span class="stat-value">${item[s] ?? 0}</span>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${Math.min(item[s] ?? 0,100)}%"></div>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

/* ================= ANIMATION (FIXED) ================= */

function animate(){
  if(rafId) return; // ⛔ prevent stacking

  function frame(){
    let active = false;

    [...containers, assistContainer].forEach(c=>{
      // 🚫 HARD STOP FOR BITS WHEN SKIPPED
      if(c.label==="Bits" && skipBit) return;

      if(c.spinning){
        active = true;

        c.pos -= c.vel * c.direction;

        // 🧈 smooth damping (prevents long-term jitter)
        c.vel *= 0.995;

        c.roulette.style.transform = `translateX(${c.pos}px)`;

        const limit = c.roulette.scrollWidth / 2;
        if(c.direction > 0 && c.pos <= -limit) c.pos = 0;
        if(c.direction < 0 && c.pos >= 0) c.pos = -limit;
      }
    });

    if(active){
      rafId = requestAnimationFrame(frame);
    } else {
      cancelAnimationFrame(rafId);
      rafId = null; // ✅ fully clean
    }
  }

  frame();
}



/* ================= STOP ================= */


function stopSpin(c){
  const chosen = resolveAndRemove(c.data);
  if(!chosen){ c.spinning=false; return; }

  c.spinning=false;

  const card = getClosestCard(c.wrapper);
  const w = c.wrapper.getBoundingClientRect();
  const r = card.getBoundingClientRect();
  c.pos -= (r.left + r.width/2) - (w.left + w.width/2);
  c.roulette.style.transform = `translateX(${c.pos}px)`;

  card.querySelector(".back").innerHTML =
    `<img src="${chosen.src}">${createStatsHTML(chosen,c.label)}`;
  card.classList.add("flip");

  // ✅ RATchet → HARD DISABLE BITS
  if(c.label==="Ratchets" && chosen.bit==="No"){
    skipBit = true;
    const bitC = containers.find(x=>x.label==="Bits");
    bitC.spinning = false;
    bitC.vel = 0;
    bitC.pos = 0;
    bitC.roulette.style.transform = "translateX(0)";
  }

  if(c.label==="Blades") allowAssist = chosen.astBlade==="Yes";

  if (c.label === "Blades") selectedParts.blade = chosen;
  if (c.label === "Assist Blade") selectedParts.assist = chosen;
  if (c.label === "Ratchets") selectedParts.ratchet = chosen;
  if (c.label === "Bits") selectedParts.bit = chosen;

  /* UPDATE RADAR */
  const total = { atk:0, def:0, sta:0, dash:0, burstR:0 };

  Object.values(selectedParts)
    .filter(Boolean)
    .forEach(p => {
      total.atk += p.atk || 0;
      total.def += p.def || 0;
      total.sta += p.sta || 0;
      total.dash += p.dash || 0;
      total.burstR += p.burstR || 0;
    });

  drawRadar(total);
  updateBeyName();
  
}

/* ================= BUTTON ================= */

spinBtn.onclick=()=>{

document.getElementById("beyName").textContent = "";

  selectedParts = {
    blade: null,
    assist: null,
    ratchet: null,
    bit: null
  };

  // 🔄 reset radar immediately
  drawRadar({ atk:0, def:0, sta:0, dash:0, burstR:0 });


  if(containers.some(c=>c.spinning) || assistContainer.spinning) return;

  skipBit=false;
  allowAssist=false;

  [...containers, assistContainer].forEach(c=>{
    c.spinning=false;
    c.pos=0;
    c.roulette.style.transform="translateX(0)";
    c.roulette.querySelectorAll(".card").forEach(card=>{
      card.classList.remove("flip");
      card.querySelector(".back").innerHTML="";
    });
  });

containers.forEach(c=>{
  c.spinning = true;
  c.vel = 3.8 + Math.random() * 1.5; // 🔥 faster but controlled
});

  animate();

  setTimeout(()=>stopSpin(containers[0]),2000);

  setTimeout(()=>{
    if(allowAssist){
      assistContainer.spinning=true;
      assistContainer.vel = 3.8 + Math.random() * 1.5;
      animate();
      setTimeout(()=>stopSpin(assistContainer),2000);
    }
  },2600);

  setTimeout(()=>stopSpin(containers[1]),2600);
  setTimeout(()=>{ if(!skipBit) stopSpin(containers[2]); },3200);
};


/* ================= RADAR GRAPH ================= */

const radar = document.getElementById("radarChart");
const ctx = radar.getContext("2d");

function drawRadar(stats) {
  ctx.clearRect(0, 0, radar.width, radar.height);

  const labels = ["ATK", "DEF", "STA", "DASH", "BURST RES"];
  const max = 150;
  const values = [
    Math.min(stats.atk, max),
    Math.min(stats.def, max),
    Math.min(stats.sta, max),
    Math.min(stats.dash, max),
    Math.min(stats.burstR, max)
  ];

  
  const cx = radar.width / 2;
  const cy = radar.height / 2;
  const radius = 150;
  const levels = 5;

  ctx.strokeStyle = "rgba(255,255,255,1)";
  ctx.lineWidth = 1;

  /* GRID */
  for (let i = 1; i <= levels; i++) {
    const r = (radius / levels) * i;
    ctx.beginPath();
    for (let j = 0; j < labels.length; j++) {
      const angle = (Math.PI * 2 / labels.length) * j - Math.PI / 2;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  /* AXES */
  labels.forEach((label, i) => {
    const angle = (Math.PI * 2 / labels.length) * i - Math.PI / 2;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.font = "12px Segoe UI";
    ctx.textAlign = "center";
    ctx.fillText(
      `${label} (${values[i]})`,
      cx + Math.cos(angle) * (radius + 22),
      cy + Math.sin(angle) * (radius + 22)
    );
  });

  /* DATA POLYGON */
  ctx.beginPath();
  values.forEach((val, i) => {
    const r = (val / max) * radius;
    const angle = (Math.PI * 2 / labels.length) * i - Math.PI / 2;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();

  ctx.fillStyle = "rgba(109,213,250,0.35)";
  ctx.strokeStyle = "#6dd5fa";
  ctx.lineWidth = 2;
  ctx.fill();
  ctx.stroke();
}

function updateBeyName() {
  if (!selectedParts.blade || !selectedParts.ratchet) return;

  let name = "";

  // Blade (required)
  name += selectedParts.blade.name + " ";

  // Assist first letter (if exists)
  if (selectedParts.assist) {
    name += selectedParts.assist.name.charAt(0);
  }

  // Ratchet (required)
  name += selectedParts.ratchet.name;

  // Bit (optional)
  if (selectedParts.bit) {
    name += selectedParts.bit.abbr;
  }

  document.getElementById("beyName").textContent = name;
}

document.getElementById("downloadBtn").addEventListener("click", function () {
    const target = document.getElementById("downloadArea");
    const nameElement = document.getElementById("beyName");

    // Get name text
    let fileName = nameElement.textContent.trim();

    // Replace spaces with underscores
    fileName = fileName.replace(/\s+/g, "_");

    html2canvas(target, {
        backgroundColor: null,
        scale: 2
    }).then(canvas => {

        const link = document.createElement("a");
        link.download = fileName + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();

    });

    outputBeyData();
});

function outputBeyData() {
  const data = {
    blade: selectedParts.blade ? selectedParts.blade.name : "",
    asst: selectedParts.assist ? selectedParts.assist.name.charAt(0) : "",
    ratchet: selectedParts.ratchet ? selectedParts.ratchet.name : "",
    bit: selectedParts.bit ? selectedParts.bit.abbr : ""
  };

  const jsonString = JSON.stringify(data);

  document.getElementById("beyDataOutput").textContent = jsonString;
}
