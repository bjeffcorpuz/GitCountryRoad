<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyblade X</title>

<style>
/* ================= STYLES ================= */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: radial-gradient(circle at top, #0c0c10, #1b1b2f);
  margin: 0;
  padding: 0;
  color: #fff;
  text-align: center;
  overflow-x: hidden;
  padding-bottom: 100px; /* Space for sticky button on mobile */
}

.container {
  max-width: 1400px;
  width: 100%;
  margin: auto;
  padding: 30px 20px;
}

h2 {
  font-size: 2.2rem;
  margin-bottom: 10px;
  text-shadow: 0 0 10px #00f;
}

.arrow {
  width: 0;
  height: 0;
  margin: 15px auto 0px;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-top: 30px solid #ff0044;
  filter: drop-shadow(0 0 10px #ff0044);
  animation: pulse 1.2s infinite alternate;
}

@keyframes pulse {
  0% { transform: translateY(0); }
  100% { transform: translateY(-8px); }
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  margin-top: 20px;
}

.cell {
  background: rgba(0,0,0,0.25);
  padding: 12px;
  border-radius: 14px;
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
  overflow: hidden;
  transition: opacity 0.3s, filter 0.3s;
  position: relative; /* For the N/A stamp */
}

/* ================= NEW CSS: DISABLED STATE ================= */
.cell.disabled {
    opacity: 0.4;
    filter: grayscale(100%);
    pointer-events: none; 
}

/* The "N/A" Stamp */
.cell.disabled::after {
    content: "N/A";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
    font-size: 3rem;
    font-weight: 900;
    color: #fff;
    border: 4px solid #fff;
    padding: 5px 20px;
    border-radius: 8px;
    opacity: 0.7;
    z-index: 10;
    letter-spacing: 4px;
}

@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}

.roulette-wrapper {
  overflow: hidden;
  background: #111;
  padding: 20px 0;
}

.roulette-label {
  margin-bottom: 10px;
  font-weight: bold;
  font-size: 1.2rem;
  text-shadow: 0 0 5px #0ff;
}

.roulette {
  display: flex;
  gap: 15px;
  will-change: transform;
}

.card {
  width: 220px;
  height: 300px;
  flex-shrink: 0;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: 0.6s;
}

.card.flip .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #0ff;
  border-radius: 12px;
}

.front {
  background: #222;
  font-size: 4.5rem;
}

.back {
  background: #000;
  transform: rotateY(180deg);
  padding: 8px;
}

.back img {
  width: 100%;
  height: 110px;
  object-fit: contain;
  margin-top: 6px;
}

.back.system-mode img {
  height: 160px; 
  margin: auto;
  display: block;
}

.back.chip-mode img {
  height: 110px;
  margin-top: 6px;
}

.stats-box {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  text-align: left;
  font-size: 0.75rem;
}

.part-name {
  text-align: center;
  font-weight: bold;
  font-size: 0.9rem;
  margin-bottom: 6px;
  color: #6dd5fa;
}

.stat-row { margin-bottom: 5px; }
.stat-label { width: 55px; display: inline-block; }
.stat-value { width: 30px; display: inline-block; text-align: right; }

.bar-bg {
  width: 100%;
  height: 7px;
  background: #2a2a2a;
  border-radius: 5px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: linear-gradient(90deg,#6dd5fa,#00c6ff);
}

/* ================= NEW CSS: STICKY BUTTON ================= */
button {
  margin-top: 30px;
  width: 320px;
  padding: 16px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #ff0055, #ff9900);
  color: white;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  transition: transform 0.1s;
}

button:active {
  transform: scale(0.98);
}

/* Sticky Button on Mobile */
@media (max-width: 600px) {
  #spinBtn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    width: 90%;
    margin-top: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
}

#downloadBtn{

}

#downloadArea{

  width: 100%;

#beyDataOutput {

  border-radius: 5px;
  font-family: monospace;
  word-break: break-all;
  color: #aaa;
  font-size: 0.8rem;
}
</style>
</head>

  {wrapper: wrapper3, roulette: roulette3, data: poolBits, label:"Bits", pos:0, vel:0, spinning:false, direction:1, remove: true}
];

const assistContainer = {
  wrapper: assistWrapper,
  roulette: rouletteAssist,
  data: poolAssist,
  label:"Assist Blade",
  pos:0, vel:0, spinning:false, direction:1, remove: true
};

/* ================= HELPERS ================= */

function createCard(){
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <div class="inner">
      <div class="front">?</div>
      <div class="back"></div>
    </div>`;
  return card;
}

function buildCards(c){
  c.roulette.innerHTML="";
  for(let i=0;i<CARD_COUNT*2;i++) c.roulette.appendChild(createCard());
}

[...containers, assistContainer].forEach(buildCards);

function resolveAndRemove(arr, shouldRemove = true){
  if(!arr || !arr.length) return null;
  const i=Math.floor(Math.random()*arr.length);
  
  let raw;
  if (shouldRemove) {
      raw = arr.splice(i,1)[0]; 
  } else {
      raw = arr[i]; 
  }

  const resolved = Array.isArray(raw) ? raw[Math.floor(Math.random()*raw.length)] : raw;
  
  return { item: resolved, raw: raw };
}

function getClosestCard(wrapper){
  const cards=[...wrapper.querySelectorAll(".card")];
  const center=wrapper.getBoundingClientRect().left + wrapper.offsetWidth/2;
  let best=null, dist=Infinity;
  cards.forEach(card=>{
    const r=card.getBoundingClientRect();
    const d=Math.abs(center-(r.left+r.width/2));
    if(d<dist){ dist=d; best=card; }
  });
  return best;
}

/* ================= STATS & ANIMATION ================= */

function createStatsHTML(item, label){
  let stats = ["atk","def","sta"];

  if(label === "Bits" || (label === "Ratchets" && item.bit === "No")){
    stats = ["atk","def","sta","dash","burstR"];
  }

  return `
    <div class="stats-box">
      <div class="part-name">${item.name}</div>
      ${stats.map(s => `
        <div class="stat-row">
          <span class="stat-label">${s.toUpperCase()}</span>
          <span class="stat-value">${item[s] ?? 0}</span>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${Math.min(item[s] ?? 0,100)}%"></div>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

function animate(){
  if(rafId) return;

  function frame(){
    let active = false;

    [...containers, assistContainer].forEach(c=>{
      if(c.label==="Bits" && skipBit) return;
      if(c.label==="Lock Chip" && skipChip && !c.spinning) return; 

      if(c.spinning){
        active = true;
        c.pos -= c.vel * c.direction;
        c.vel *= 0.995;
        c.roulette.style.transform = `translateX(${c.pos}px)`;

        const limit = c.roulette.scrollWidth / 2;
        if(c.direction > 0 && c.pos <= -limit) c.pos = 0;
        if(c.direction < 0 && c.pos >= 0) c.pos = -limit;
      }
    });

    if(active){
      rafId = requestAnimationFrame(frame);
    } else {
      cancelAnimationFrame(rafId);
      rafId = null; 
    }
  }

  frame();
}

/* ================= STOP LOGIC ================= */

function stopSpin(c){
  
  const result = resolveAndRemove(c.data, c.remove);
  
  // ⛔ DATA EMPTY: Disable and exit
  if(!result){ 
    c.spinning = false; 
    let cellId = "";
    if (c.label === "System") cellId = "cellSystem";
    else if (c.label === "Lock Chip") cellId = "cellChip";
    else if (c.label === "Blades") cellId = "cellBlade";
    else if (c.label === "Ratchets") cellId = "cellRatchet";
    else if (c.label === "Bits") cellId = "cellBit";
    else if (c.label === "Assist Blade") cellId = "cellAssist";
    if(cellId) document.getElementById(cellId).classList.add("disabled");
    return; 
  }

  const chosen = result.item;
  const rawChosen = result.raw;

  // === SYSTEM LOGIC ===
  if(c.label === "System") {
      selectedParts.system = chosen;
      
      let matchingBlades = poolBlades.filter(b => {
          const check = Array.isArray(b) ? b[0] : b;
          return check.system === chosen.name;
      });

      const bladeContainer = containers.find(x => x.label === "Blades");
      const bladeCell = document.getElementById("cellBlade");

      // ⛔ IF NO BLADES LEFT
      if (matchingBlades.length === 0) {
          bladeContainer.spinning = false;
          bladeContainer.vel = 0;
          bladeCell.classList.add("disabled");
          bladeContainer.data = []; 
          allowAssist = false; 
      } else {
          bladeContainer.data = matchingBlades; 
          bladeCell.classList.remove("disabled");
      }

      // Check Chip Availability
      const chipContainer = containers.find(x => x.label === "Lock Chip");
      const chipCell = document.getElementById("cellChip");
      
      if(chosen.name === "CX") {
          if (poolChips.length === 0) {
              skipChip = true;
              chipContainer.spinning = false; 
              chipCell.classList.add("disabled");
          } else {
              skipChip = false; 
              chipCell.classList.remove("disabled");
          }
      } else {
          skipChip = true;
          chipContainer.spinning = false; 
          chipContainer.vel = 0;
          chipCell.classList.add("disabled");
          chipContainer.roulette.style.transform = "translateX(0)"; 
      }
  }

  // === BLADE LOGIC ===
  if (c.label === "Blades") {
      const indexInPool = poolBlades.indexOf(rawChosen);
      if (indexInPool > -1) poolBlades.splice(indexInPool, 1);
      
      // Filter Ratchets
      const ratchetContainer = containers.find(x => x.label === "Ratchets");
      const ratchetCell = document.getElementById("cellRatchet");

      let validRatchets = poolRatchets;
      if (chosen.core !== "Any") {
          let filterKey = "";
          if (chosen.core === "Round") filterKey = "R";
          else if (chosen.core === "Strafe") filterKey = "W";
          
          if(filterKey) {
              validRatchets = poolRatchets.filter(r => {
                   const item = Array.isArray(r) ? r[0] : r;
                   return item.core === filterKey;
              });
          }
      }

      if (validRatchets.length === 0) {
          ratchetContainer.spinning = false;
          ratchetCell.classList.add("disabled");
          ratchetContainer.data = [];
      } else {
          ratchetContainer.data = validRatchets;
          ratchetCell.classList.remove("disabled");
      }

      // Assist Check
      const assistCell = document.getElementById("cellAssist");
      if (selectedParts.system && selectedParts.system.name === "CX" && chosen.astBlade === "Yes") {
          if (poolAssist.length > 0) {
              allowAssist = true;
              assistCell.classList.remove("disabled");
          } else {
              allowAssist = false;
              assistCell.classList.add("disabled");
              assistContainer.spinning = false;
          }
      } else {
          allowAssist = false;
          assistCell.classList.add("disabled");
          assistContainer.spinning = false; 
      }
  }

  // === RATCHET LOGIC ===
  if (c.label === "Ratchets") {
      const indexInPool = poolRatchets.indexOf(rawChosen);
      if (indexInPool > -1) poolRatchets.splice(indexInPool, 1);

      // ⛔ CHECK IF BIT IS NEEDED
      if(chosen.bit === "No"){
        skipBit = true;
        const bitContainer = containers.find(x => x.label === "Bits");
        const bitCell = document.getElementById("cellBit");
        
        // Stop spinning and visually disable
        bitContainer.spinning = false;
        bitContainer.vel = 0;
        bitContainer.roulette.style.transform = "translateX(0)";
        bitCell.classList.add("disabled");
      }
  }

  c.spinning=false;

  // Visual Alignment
  const card = getClosestCard(c.wrapper);
  const w = c.wrapper.getBoundingClientRect();
  const r = card.getBoundingClientRect();
  c.pos -= (r.left + r.width/2) - (w.left + w.width/2);
  c.roulette.style.transform = `translateX(${c.pos}px)`;

  // Render Card
  const backDiv = card.querySelector(".back");
  if (c.label === "System") {
      backDiv.classList.add("system-mode");
      backDiv.innerHTML = `<img src="${chosen.src}">`;
  } else if (c.label === "Lock Chip") {
      backDiv.classList.add("chip-mode");
      backDiv.innerHTML = `<img src="${chosen.src}"><div class="part-name">${chosen.name}</div>`;
  } else {
      backDiv.innerHTML = `<img src="${chosen.src}">${createStatsHTML(chosen,c.label)}`;
  }
  card.classList.add("flip");

  // Save Selection
  if (c.label === "System") selectedParts.system = chosen;
  if (c.label === "Lock Chip") selectedParts.chip = chosen;
  if (c.label === "Blades") selectedParts.blade = chosen;
  if (c.label === "Assist Blade") selectedParts.assist = chosen;
  if (c.label === "Ratchets") selectedParts.ratchet = chosen;
  if (c.label === "Bits") selectedParts.bit = chosen;

  /* UPDATE RADAR */
  const total = { atk:0, def:0, sta:0, dash:0, burstR:0 };
  Object.values(selectedParts).filter(Boolean).forEach(p => {
      total.atk += p.atk || 0;
      total.def += p.def || 0;
      total.sta += p.sta || 0;
      total.dash += p.dash || 0;
      total.burstR += p.burstR || 0;
  });
  drawRadar(total);
  updateBeyName();
}

/* ================= BUTTON ================= */

spinBtn.onclick=()=>{

  // 1. CLEAR ALL PENDING TIMERS
  spinTimeouts.forEach(clearTimeout);
  spinTimeouts = [];

  document.getElementById("beyName").textContent = "";

  selectedParts = {
    system: null,
    chip: null,
    blade: null,
    assist: null,
    ratchet: null,
    bit: null
  };

  drawRadar({ atk:0, def:0, sta:0, dash:0, burstR:0 });

  if(containers.some(c=>c.spinning) || assistContainer.spinning) return;

  // Reset Logic Flags
  skipBit = false;
  skipChip = true; 
  allowAssist = false;
  
  // Pointers to persistent pools
  containers[0].data = poolSystem; 
  containers[1].data = poolChips;
  containers[3].data = poolRatchets;
  containers[4].data = poolBits;
  assistContainer.data = poolAssist;

  // Reset visual styles
  [...containers, assistContainer].forEach(c=>{
    c.spinning=false;
    c.pos=0;
    c.roulette.style.transform="translateX(0)";
    c.roulette.querySelectorAll(".card").forEach(card=>{
      card.classList.remove("flip");
      card.querySelector(".back").innerHTML="";
      card.querySelector(".back").className = "back";
    });
  });
  
  document.querySelectorAll(".cell").forEach(el => el.classList.remove("disabled"));

  // Check Independent Pools
  if (poolRatchets.length === 0) document.getElementById("cellRatchet").classList.add("disabled");
  if (poolBits.length === 0) document.getElementById("cellBit").classList.add("disabled");
  if (poolSystem.length === 0) document.getElementById("cellSystem").classList.add("disabled");

  // Spin
  containers.forEach(c => {
      if (c.data && c.data.length > 0) {
          c.spinning = true;
          c.vel = 3.8 + Math.random() * 1.5; 
      }
  });

  animate();

  // === TIMINGS ===
  spinTimeouts.push(setTimeout(()=>stopSpin(containers[0]), 1200)); 
  spinTimeouts.push(setTimeout(()=>stopSpin(containers[2]), 2000)); 
  spinTimeouts.push(setTimeout(()=>{
      const rCont = containers[3];
      if(rCont.data.length > 0) stopSpin(rCont);
  }, 2700));
  spinTimeouts.push(setTimeout(()=>{ 
      if(!skipBit && poolBits.length > 0) stopSpin(containers[4]); 
  }, 3400));
  spinTimeouts.push(setTimeout(()=>{
    if(allowAssist){
      assistContainer.spinning=true;
      assistContainer.vel = 3.8 + Math.random() * 1.5;
      animate();
      stopSpin(assistContainer); 
    }
  }, 4000));
  spinTimeouts.push(setTimeout(()=>{
      if(!skipChip && poolChips.length > 0) stopSpin(containers[1]); 
      outputBeyData();
  }, 4600)); 
};


/* ================= RADAR GRAPH ================= */

const radar = document.getElementById("radarChart");
const ctx = radar.getContext("2d");

function drawRadar(stats) {
  ctx.clearRect(0, 0, radar.width, radar.height);

  const labels = ["ATK", "DEF", "STA", "DASH", "BURST RES"];
  const max = 150;
  const values = [
    Math.min(stats.atk, max),
    Math.min(stats.def, max),
    Math.min(stats.sta, max),
    Math.min(stats.dash, max),
    Math.min(stats.burstR, max)
  ];

  const cx = radar.width / 2;
  const cy = radar.height / 2;
  const radius = 150;
  const levels = 5;

  ctx.strokeStyle = "rgba(255,255,255,1)";
  ctx.lineWidth = 1;

  for (let i = 1; i <= levels; i++) {
    const r = (radius / levels) * i;
    ctx.beginPath();
    for (let j = 0; j < labels.length; j++) {
      const angle = (Math.PI * 2 / labels.length) * j - Math.PI / 2;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  labels.forEach((label, i) => {
    const angle = (Math.PI * 2 / labels.length) * i - Math.PI / 2;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.font = "12px Segoe UI";
    ctx.textAlign = "center";
    ctx.fillText(
      `${label} (${values[i]})`,
      cx + Math.cos(angle) * (radius + 22),
      cy + Math.sin(angle) * (radius + 22)
    );
  });

  ctx.beginPath();
  values.forEach((val, i) => {
    const r = (val / max) * radius;
    const angle = (Math.PI * 2 / labels.length) * i - Math.PI / 2;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();

  // Dynamic Color
  let color = "#6dd5fa"; 
  if(selectedParts.system) {
    if(selectedParts.system.name === "UX") color = "#ffaa00";
    if(selectedParts.system.name === "CX") color = "#ff0044";
  }
  ctx.fillStyle = color + "59"; 
  ctx.strokeStyle = color;
  ctx.fill();
  ctx.stroke();
}

function updateBeyName() {
  if (!selectedParts.blade || !selectedParts.ratchet) return;
  
  let name = "";
  if (selectedParts.chip) name += selectedParts.chip.name; 
  name += selectedParts.blade.name + " ";
  if (selectedParts.assist) name += selectedParts.assist.name.charAt(0);
  name += selectedParts.ratchet.name;
  if (selectedParts.bit) name += selectedParts.bit.abbr;
  
  document.getElementById("beyName").textContent = name;
}

document.getElementById("downloadBtn").addEventListener("click", function () {
    const target = document.getElementById("downloadArea");
    const nameElement = document.getElementById("beyName");
    let fileName = nameElement.textContent.trim();
    fileName = fileName.replace(/\s+/g, "_");

    html2canvas(target, { backgroundColor: null, scale: 2 }).then(canvas => {
        const link = document.createElement("a");
        link.download = fileName + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
    outputBeyData();
});

function outputBeyData() {
  const data = {
    system: selectedParts.system ? selectedParts.system.name : "",
    chip: selectedParts.chip ? selectedParts.chip.name : "",
    blade: selectedParts.blade ? selectedParts.blade.name : "",
    // Changed .charAt(0) to full .name
    asst: selectedParts.assist ? selectedParts.assist.name : "", 
    ratchet: selectedParts.ratchet ? selectedParts.ratchet.name : "",
    bit: selectedParts.bit ? selectedParts.bit.abbr : ""
  };
  document.getElementById("beyDataOutput").textContent = JSON.stringify(data);
}
